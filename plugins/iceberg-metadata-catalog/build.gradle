apply plugin: 'opensearch.opensearchplugin'

opensearchplugin {
  description = 'Apache Iceberg metadata catalog plugin: publishes OpenSearch index data to S3 Tables'
  classname = 'org.opensearch.plugin.iceberg.catalog.IcebergMetadataCatalogPlugin'
}

dependencies {
  // S3 blob container / blob store classes pre-packaged from repository-s3. 
  // TODO: move to a shared common-utils library
  api files('lib/s3-blob-container.jar')

  // Iceberg dependencies
  api "org.apache.iceberg:iceberg-api:1.6.1"
  api "org.apache.iceberg:iceberg-core:1.6.1"
  api "org.apache.iceberg:iceberg-common:1.6.1"
  api("org.apache.iceberg:iceberg-bundled-guava:1.6.1") {
    exclude group: 'org.apache.hadoop'
    exclude group: 'org.slf4j'
  }

  // HttpClient5
  api("org.apache.httpcomponents.client5:httpclient5:${versions.httpclient5}") {
    exclude group: 'org.slf4j'
  }
  api("org.apache.httpcomponents.core5:httpcore5:${versions.httpcore5}") {
    exclude group: 'org.slf4j'
  }
  api("org.apache.httpcomponents.core5:httpcore5-h2:${versions.httpcore5}") {
    exclude group: 'org.slf4j'
  }

  // Iceberg runtime-only deps (not on iceberg-core's compile classpath, but required at
  // runtime for manifest I/O and internal caches). Hitting NoClassDefFoundError without these.
  runtimeOnly "org.apache.avro:avro:1.11.3"
  runtimeOnly "com.github.ben-manes.caffeine:caffeine:2.9.3"

  // SLF4J and Log4j bridge
  api "org.slf4j:slf4j-api:${versions.slf4j}"
  runtimeOnly "org.apache.logging.log4j:log4j-slf4j2-impl:${versions.log4j}"

  // Jackson
  api "com.fasterxml.jackson.core:jackson-core:${versions.jackson}"
  api "com.fasterxml.jackson.core:jackson-databind:${versions.jackson_databind}"
  api "com.fasterxml.jackson.core:jackson-annotations:${versions.jackson}"

  // AWS SDK v2 stack
  api "software.amazon.awssdk:sdk-core:${versions.aws}"
  api "software.amazon.awssdk:aws-core:${versions.aws}"
  api "software.amazon.awssdk:auth:${versions.aws}"
  api "software.amazon.awssdk:identity-spi:${versions.aws}"
  api "software.amazon.awssdk:checksums:${versions.aws}"
  api "software.amazon.awssdk:checksums-spi:${versions.aws}"
  api "software.amazon.awssdk:http-auth:${versions.aws}"
  api "software.amazon.awssdk:http-auth-aws:${versions.aws}"
  api "software.amazon.awssdk:http-auth-spi:${versions.aws}"
  api "software.amazon.awssdk:retries:${versions.aws}"
  api "software.amazon.awssdk:retries-spi:${versions.aws}"
  api "software.amazon.awssdk:endpoints-spi:${versions.aws}"
  api "software.amazon.awssdk:http-client-spi:${versions.aws}"
  api "software.amazon.awssdk:apache-client:${versions.aws}"
  api "software.amazon.awssdk:metrics-spi:${versions.aws}"
  api "software.amazon.awssdk:profiles:${versions.aws}"
  api "software.amazon.awssdk:regions:${versions.aws}"
  api "software.amazon.awssdk:utils:${versions.aws}"
  api "software.amazon.awssdk:annotations:${versions.aws}"
  api "software.amazon.awssdk:protocol-core:${versions.aws}"
  api "software.amazon.awssdk:json-utils:${versions.aws}"
  api "software.amazon.awssdk:third-party-jackson-core:${versions.aws}"
  api "software.amazon.awssdk:signer:${versions.aws}"
  api "software.amazon.awssdk:s3:${versions.aws}"
  api "software.amazon.awssdk:aws-xml-protocol:${versions.aws}"
  api "software.amazon.awssdk:aws-json-protocol:${versions.aws}"
  api "software.amazon.awssdk:aws-query-protocol:${versions.aws}"
  api "software.amazon.awssdk:sts:${versions.aws}"
  api "software.amazon.awssdk:netty-nio-client:${versions.aws}"
  api "software.amazon.awssdk:crt-core:${versions.aws}"
  api "software.amazon.awssdk:aws-crt-client:${versions.aws}"
  api "software.amazon.awssdk.crt:aws-crt:${versions.awscrt}"

  // Netty
  api "io.netty:netty-buffer:${versions.netty}"
  api "io.netty:netty-codec:${versions.netty}"
  api "io.netty:netty-codec-http:${versions.netty}"
  api "io.netty:netty-codec-http2:${versions.netty}"
  api "io.netty:netty-common:${versions.netty}"
  api "io.netty:netty-handler:${versions.netty}"
  api "io.netty:netty-resolver:${versions.netty}"
  api "io.netty:netty-transport:${versions.netty}"
  api "io.netty:netty-transport-native-unix-common:${versions.netty}"
  api "io.netty:netty-transport-classes-epoll:${versions.netty}"

  // Reactive streams
  api "org.reactivestreams:reactive-streams:1.0.4"

  // Apache HTTP (legacy)
  api "org.apache.httpcomponents:httpclient:${versions.httpclient}"
  api "org.apache.httpcomponents:httpcore:${versions.httpcore}"
  api "commons-codec:commons-codec:${versions.commonscodec}"
  api "commons-logging:commons-logging:1.2"
}

configurations.all {
  resolutionStrategy.force "commons-codec:commons-codec:${versions.commonscodec}"
  resolutionStrategy.force "org.slf4j:slf4j-api:${versions.slf4j}"
  resolutionStrategy.force "com.fasterxml.jackson.core:jackson-core:${versions.jackson}"
  resolutionStrategy.force "com.fasterxml.jackson.core:jackson-databind:${versions.jackson_databind}"
  resolutionStrategy.force "com.fasterxml.jackson.core:jackson-annotations:${versions.jackson}"

  exclude group: 'org.slf4j', module: 'slf4j-log4j12'
  exclude group: 'log4j', module: 'log4j'
}

// Disable checks that are not needed for this plugin scaffold
tasks.named("licenseHeaders").configure { enabled = false }
tasks.named("dependencyLicenses").configure { enabled = false }
tasks.named("javadoc").configure { enabled = false }
tasks.named("missingJavadoc").configure { enabled = false }
tasks.named("thirdPartyAudit").configure { enabled = false }

// Disable YAML REST tests (none exist yet)
if (tasks.findByName("yamlRestTest") != null) {
  tasks.named("yamlRestTest").configure { enabled = false }
}

// Disable loggerUsageCheck since the pre-packaged s3-blob-container.jar may
// use logging patterns that this check doesn't recognize from compiled classes.
tasks.named("loggerUsageCheck").configure { enabled = false }
