apply plugin: 'opensearch.opensearchplugin'

opensearchplugin {
  description = 'Apache Iceberg metadata catalog plugin: publishes OpenSearch index data to S3 Tables'
  classname = 'org.opensearch.plugin.catalog.iceberg.IcebergCatalogPlugin'
}

dependencies {
  api "org.apache.iceberg:iceberg-api:1.6.1"
  api "org.apache.iceberg:iceberg-core:1.6.1"
  api "org.apache.iceberg:iceberg-common:1.6.1"
  runtimeOnly("org.apache.iceberg:iceberg-bundled-guava:1.6.1") {
    exclude group: 'org.apache.hadoop'
    exclude group: 'org.slf4j'
  }
}

// Disable checks that are not relevant for this initial scaffold.
// Re-enable individually as the plugin grows.
tasks.named("licenseHeaders").configure { enabled = false }
tasks.named("dependencyLicenses").configure { enabled = false }
tasks.named("javadoc").configure { enabled = false }
tasks.named("missingJavadoc").configure { enabled = false }
tasks.named("thirdPartyAudit").configure { enabled = false }
tasks.named("loggerUsageCheck").configure { enabled = false }

if (tasks.findByName("yamlRestTest") != null) {
  tasks.named("yamlRestTest").configure { enabled = false }
}
