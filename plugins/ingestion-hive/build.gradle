apply plugin: 'opensearch.internal-cluster-test'

opensearchplugin {
  description = 'Pull-based ingestion plugin to consume from Hive tables'
  classname = 'org.opensearch.plugin.hive.HiveIngestionPlugin'
}

versions << [
  'hadoopCommon': '3.4.1',
  'parquetHadoop': '1.15.0',
  'thrift': '0.22.0',
  'testcontainers': '2.0.5',
  'docker': '3.7.1',
  'ducttape': '1.0.8',
]

dependencies {
  // Thrift transport for Hive Metastore communication
  api "org.apache.thrift:libthrift:${versions.thrift}"

  // Hadoop FileSystem API for reading data files
  api "org.apache.hadoop:hadoop-client-api:${versions.hadoopCommon}"
  runtimeOnly "org.apache.hadoop:hadoop-client-runtime:${versions.hadoopCommon}"

  // Parquet reader (bundle includes all parquet modules in one jar, avoids jar hell)
  api "org.apache.parquet:parquet-hadoop-bundle:${versions.parquetHadoop}"
  runtimeOnly "org.xerial.snappy:snappy-java:1.1.10.7"

  // SLF4J required by Hadoop Configuration class initializer
  api "org.slf4j:slf4j-api:${versions.slf4j}"

  // test
  testImplementation "com.github.docker-java:docker-java-api:${versions.docker}"
  testImplementation "com.github.docker-java:docker-java-transport:${versions.docker}"
  testImplementation "com.github.docker-java:docker-java-transport-zerodep:${versions.docker}"
  testImplementation "com.fasterxml.jackson.core:jackson-annotations:${versions.jackson_annotations}"
  testImplementation "org.testcontainers:testcontainers:${versions.testcontainers}"
  testImplementation "org.rnorth.duct-tape:duct-tape:${versions.ducttape}"
  testImplementation "org.apache.commons:commons-compress:${versions.commonscompress}"
  testImplementation "org.apache.commons:commons-lang3:${versions.commonslang}"
  testImplementation "commons-io:commons-io:${versions.commonsio}"
  testImplementation "org.slf4j:slf4j-simple:${versions.slf4j}"
  testImplementation "org.apache.hadoop:hadoop-minikdc:3.4.3"
  testImplementation "org.apache.kerby:kerb-simplekdc:2.0.3"
  testImplementation "org.apache.kerby:kerb-client:2.0.3"
  testImplementation "org.apache.kerby:kerb-admin:2.0.3"
  testImplementation "org.apache.kerby:kerb-server:2.0.3"
  testImplementation "org.apache.kerby:kerb-identity:2.0.3"
  testImplementation "org.apache.kerby:kerb-common:2.0.3"
  testImplementation "org.apache.kerby:kerb-util:2.0.3"
  testImplementation "org.apache.kerby:kerby-config:2.0.3"
  testImplementation "org.apache.kerby:token-provider:2.0.3"
  testImplementation "org.apache.kerby:kerb-crypto:2.0.3"
  testImplementation "org.apache.kerby:kerb-core:2.0.3"
  testImplementation "org.apache.kerby:kerby-pkix:2.0.3"
  testImplementation "org.apache.kerby:kerby-xdr:2.0.3"
  testImplementation "org.apache.kerby:kerby-asn1:2.0.3"
  testImplementation "org.apache.kerby:kerby-util:2.0.3"
}

internalClusterTest {
  environment 'TESTCONTAINERS_RYUK_DISABLED', 'true'
  systemProperty 'tests.security.manager', 'false'
  jvmArgs '--add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED'
}

