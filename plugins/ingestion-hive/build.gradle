// Suppress warnings in generated Thrift code
tasks.withType(JavaCompile).configureEach {
  options.compilerArgs -= '-Werror'
}

tasks.register('generateThrift', Exec) {
  description = 'Regenerate Thrift client code from IDL (requires Docker)'
  commandLine './bin/generate-thrift.sh'
}

// Generated Thrift code lacks Javadoc; exclude from checks (same as ingestion-kafka)
tasks.matching { it.name == 'missingJavadoc' }.configureEach {
  enabled = false
}

// Generated Thrift code uses Java serialization (ObjectInputStream/ObjectOutputStream)
tasks.named('forbiddenApisMain').configure {
  excludes = ['org/opensearch/plugin/hive/metastore/**']
}

// Map hadoop-client-api and hadoop-client-runtime to shared hadoop license
tasks.named("dependencyLicenses").configure {
  mapping from: /hadoop-.*/, to: 'hadoop'
}
