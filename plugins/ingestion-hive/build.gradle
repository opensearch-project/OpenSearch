opensearchplugin {
  description = 'Pull-based ingestion plugin to consume from Hive tables'
  classname = 'org.opensearch.plugin.hive.HiveIngestionPlugin'
}

versions << [
  'hiveThrift': '2',
  'hadoopCommon': '3.4.1',
  'parquetHadoop': '1.15.0',
  'thrift': '0.22.0',
]

dependencies {
  // Hive Metastore Thrift client (Trino's lightweight compiled Thrift API, no Hadoop/Hive dependency)
  api "io.trino.hive:hive-thrift:${versions.hiveThrift}"
  api "org.apache.thrift:libthrift:${versions.thrift}"

  // Hadoop FileSystem API for reading data files
  api "org.apache.hadoop:hadoop-client-api:${versions.hadoopCommon}"
  runtimeOnly "org.apache.hadoop:hadoop-client-runtime:${versions.hadoopCommon}"

  // Parquet reader (bundle includes all parquet modules in one jar, avoids jar hell)
  api "org.apache.parquet:parquet-hadoop-bundle:${versions.parquetHadoop}"
  runtimeOnly "org.xerial.snappy:snappy-java:1.1.10.7"

  // SLF4J required by Hadoop Configuration class initializer
  api "org.slf4j:slf4j-api:${versions.slf4j}"
}

thirdPartyAudit.enabled = false

// PoC: skip javadoc checks
tasks.matching { it.name == "missingJavadoc" }.configureEach { enabled = false }

// PoC: skip javadoc validation
tasks.withType(Javadoc).configureEach { enabled = false }
project.tasks.matching { it.name == "missingJavadoc" }.configureEach { enabled = false }
