apply plugin: 'opensearch.yaml-rest-test'
apply plugin: 'opensearch.internal-cluster-test'

opensearchplugin {
  description = 'The Tamil Analysis plugin integrates Tamil language analysis components into OpenSearch.'
  classname = 'org.opensearch.plugin.analysis.tamil.AnalysisTamilPlugin'
}

restResources {
  restApi {
    includeCore '_common', 'indices', 'index', 'search'
  }
}
