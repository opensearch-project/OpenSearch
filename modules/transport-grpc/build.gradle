apply plugin: 'opensearch.testclusters'
apply plugin: 'opensearch.internal-cluster-test'
apply from: "$rootDir/gradle/fips.gradle"

opensearchplugin {
  description = 'gRPC based transport implementation'
  classname = 'org.opensearch.transport.grpc.GrpcPlugin'
}

testClusters {
  integTest {
    setting 'aux.transport.types', '[transport-grpc]'
  }
}

dependencies {
  api project('spi')
  compileOnly "com.google.code.findbugs:jsr305:3.0.2"
  runtimeOnly "com.google.guava:guava:${versions.guava}"
  implementation "com.google.guava:failureaccess:1.0.2"
  implementation "io.grpc:grpc-api:${versions.grpc}"
  implementation "io.grpc:grpc-core:${versions.grpc}"
  implementation "io.grpc:grpc-netty:${versions.grpc}"
  implementation "io.netty:netty-buffer:${versions.netty}"
  implementation "io.netty:netty-codec:${versions.netty}"
  implementation "io.netty:netty-codec-base:${versions.netty}"
  implementation "io.netty:netty-codec-http:${versions.netty}"
  implementation "io.netty:netty-codec-http2:${versions.netty}"
  implementation "io.netty:netty-common:${versions.netty}"
  implementation "io.netty:netty-handler:${versions.netty}"
  implementation "io.netty:netty-resolver:${versions.netty}"
  implementation "io.netty:netty-transport:${versions.netty}"
  implementation "io.netty:netty-transport-native-unix-common:${versions.netty}"
  implementation "io.grpc:grpc-protobuf-lite:${versions.grpc}"
  implementation "io.grpc:grpc-protobuf:${versions.grpc}"
  implementation "io.grpc:grpc-services:${versions.grpc}"
  implementation "io.grpc:grpc-stub:${versions.grpc}"
  implementation "io.grpc:grpc-util:${versions.grpc}"
  implementation "io.perfmark:perfmark-api:0.27.0"
  implementation "org.opensearch:protobufs:${versions.opensearchprotobufs}"
  testImplementation project(':test:framework')
  testFipsRuntimeOnly "org.bouncycastle:bc-fips:${versions.bouncycastle_jce}"
  testFipsRuntimeOnly "org.bouncycastle:bctls-fips:${versions.bouncycastle_tls}"
  testFipsRuntimeOnly "org.bouncycastle:bcutil-fips:${versions.bouncycastle_util}"
}

tasks.named("dependencyLicenses").configure {
  mapping from: /grpc-.*/, to: 'grpc'
  mapping from: /netty-.*/, to: 'netty'
}

thirdPartyAudit {
  ignoreMissingClasses(
    // from io.netty.logging.CommonsLoggerFactory (netty)
    'org.apache.commons.logging.Log',
    'org.apache.commons.logging.LogFactory',

    // from Log4j (deliberate, Netty will fallback to Log4j 2)
    'org.apache.log4j.Level',
    'org.apache.log4j.Logger',

    // from io.netty.handler.ssl.util.BouncyCastleSelfSignedCertGenerator (netty)
    'org.bouncycastle.cert.X509v3CertificateBuilder',
    'org.bouncycastle.cert.jcajce.JcaX509CertificateConverter',
    'org.bouncycastle.operator.jcajce.JcaContentSignerBuilder',
    'org.bouncycastle.openssl.PEMEncryptedKeyPair',
    'org.bouncycastle.openssl.PEMParser',
    'org.bouncycastle.openssl.jcajce.JcaPEMKeyConverter',
    'org.bouncycastle.openssl.jcajce.JceOpenSSLPKCS8DecryptorProviderBuilder',
    'org.bouncycastle.openssl.jcajce.JcePEMDecryptorProviderBuilder',
    'org.bouncycastle.pkcs.PKCS8EncryptedPrivateKeyInfo',

    // from io.netty.util.internal.logging.InternalLoggerFactory (netty) - it's optional
    'org.slf4j.helpers.FormattingTuple',
    'org.slf4j.helpers.MessageFormatter',
    'org.slf4j.Logger',
    'org.slf4j.LoggerFactory',
    'org.slf4j.spi.LocationAwareLogger',

    'com.google.gson.stream.JsonReader',
    'com.google.gson.stream.JsonToken',
    'com.google.protobuf.util.Durations',
    'com.google.protobuf.util.Timestamps',
    'com.google.rpc.Status',
    'com.google.rpc.Status$Builder',

    // from io.netty.handler.codec.http2 (references optional codec-compression)
    'io.netty.handler.codec.compression.Brotli',
    'io.netty.handler.codec.compression.BrotliOptions',
    'io.netty.handler.codec.compression.CompressionOptions',
    'io.netty.handler.codec.compression.DeflateOptions',
    'io.netty.handler.codec.compression.GzipOptions',
    'io.netty.handler.codec.compression.SnappyOptions',
    'io.netty.handler.codec.compression.StandardCompressionOptions',
    'io.netty.handler.codec.compression.ZlibCodecFactory',
    'io.netty.handler.codec.compression.ZlibWrapper',
    'io.netty.handler.codec.compression.Zstd',
    'io.netty.handler.codec.compression.ZstdOptions',

    // from io.netty.handler.ssl (references optional tcnative)
    'io.netty.internal.tcnative.AsyncSSLPrivateKeyMethod',
    'io.netty.internal.tcnative.AsyncTask',
    'io.netty.internal.tcnative.Buffer',
    'io.netty.internal.tcnative.CertificateCallback',
    'io.netty.internal.tcnative.CertificateCompressionAlgo',
    'io.netty.internal.tcnative.CertificateVerifier',
    'io.netty.internal.tcnative.Library',
    'io.netty.internal.tcnative.ResultCallback',
    'io.netty.internal.tcnative.SSL',
    'io.netty.internal.tcnative.SSLContext',
    'io.netty.internal.tcnative.SSLPrivateKeyMethod',
    'io.netty.internal.tcnative.SSLSession',
    'io.netty.internal.tcnative.SSLSessionCache',
    'io.netty.internal.tcnative.SessionTicketKey',
    'io.netty.internal.tcnative.SniHostNameMatcher',

    'org.conscrypt.AllocatedBuffer',
    'org.conscrypt.BufferAllocator',
    'org.conscrypt.Conscrypt',
    'org.conscrypt.HandshakeListener',

    'reactor.blockhound.BlockHound$Builder',
    'reactor.blockhound.integration.BlockHoundIntegration',

    'io.netty.pkitesting.CertificateBuilder',
    'io.netty.pkitesting.CertificateBuilder$Algorithm',
    'io.netty.pkitesting.X509Bundle'
  )

  ignoreViolations(
    // uses internal java api: sun.misc.Unsafe
    'com.google.common.cache.Striped64',
    'com.google.common.cache.Striped64$1',
    'com.google.common.cache.Striped64$Cell',
    'com.google.common.hash.Striped64',
    'com.google.common.hash.Striped64$1',
    'com.google.common.hash.Striped64$Cell',
    'com.google.common.hash.LittleEndianByteArray$UnsafeByteArray',
    'com.google.common.hash.LittleEndianByteArray$UnsafeByteArray$1',
    'com.google.common.hash.LittleEndianByteArray$UnsafeByteArray$2',
    'com.google.common.util.concurrent.AbstractFuture$UnsafeAtomicHelper',
    'com.google.common.util.concurrent.AbstractFuture$UnsafeAtomicHelper$1',
    'com.google.common.primitives.UnsignedBytes$LexicographicalComparatorHolder$UnsafeComparator',
    'com.google.common.primitives.UnsignedBytes$LexicographicalComparatorHolder$UnsafeComparator$1',

    'io.netty.buffer.AbstractAllocatorEvent',
    'io.netty.buffer.AbstractBufferEvent',
    'io.netty.buffer.AbstractChunkEvent',
    'io.netty.buffer.AdaptivePoolingAllocator$AdaptiveByteBuf',
    'io.netty.buffer.AdaptivePoolingAllocator$Chunk',
    'io.netty.buffer.AllocateBufferEvent',
    'io.netty.buffer.AllocateChunkEvent',
    'io.netty.buffer.FreeBufferEvent',
    'io.netty.buffer.FreeChunkEvent',
    'io.netty.buffer.PooledByteBufAllocator',
    'io.netty.buffer.ReallocateBufferEvent',

    'io.netty.util.internal.PlatformDependent0',
    'io.netty.util.internal.PlatformDependent0$1',
    'io.netty.util.internal.PlatformDependent0$2',
    'io.netty.util.internal.PlatformDependent0$3',
    'io.netty.util.internal.PlatformDependent0$5',
    'io.netty.util.internal.shaded.org.jctools.queues.BaseLinkedQueueConsumerNodeRef',
    'io.netty.util.internal.shaded.org.jctools.queues.BaseLinkedQueueProducerNodeRef',
    'io.netty.util.internal.shaded.org.jctools.queues.BaseMpscLinkedArrayQueueColdProducerFields',
    'io.netty.util.internal.shaded.org.jctools.queues.BaseMpscLinkedArrayQueueConsumerFields',
    'io.netty.util.internal.shaded.org.jctools.queues.BaseMpscLinkedArrayQueueProducerFields',
    'io.netty.util.internal.shaded.org.jctools.queues.LinkedQueueNode',
    'io.netty.util.internal.shaded.org.jctools.queues.MpmcArrayQueueConsumerIndexField',
    'io.netty.util.internal.shaded.org.jctools.queues.MpmcArrayQueueProducerIndexField',
    'io.netty.util.internal.shaded.org.jctools.queues.MpscArrayQueueConsumerIndexField',
    'io.netty.util.internal.shaded.org.jctools.queues.MpscArrayQueueProducerIndexField',
    'io.netty.util.internal.shaded.org.jctools.queues.MpscArrayQueueProducerLimitField',
    'io.netty.util.internal.shaded.org.jctools.queues.unpadded.MpscUnpaddedArrayQueueConsumerIndexField',
    'io.netty.util.internal.shaded.org.jctools.queues.unpadded.MpscUnpaddedArrayQueueProducerIndexField',
    'io.netty.util.internal.shaded.org.jctools.queues.unpadded.MpscUnpaddedArrayQueueProducerLimitField',
    'io.netty.util.internal.shaded.org.jctools.util.UnsafeAccess',
    'io.netty.util.internal.shaded.org.jctools.util.UnsafeLongArrayAccess',
    'io.netty.util.internal.shaded.org.jctools.util.UnsafeRefArrayAccess'
  )
}
