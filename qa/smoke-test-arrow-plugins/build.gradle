import org.opensearch.gradle.MavenFilteringHack

apply plugin: 'opensearch.testclusters'
apply plugin: 'opensearch.standalone-rest-test'
apply plugin: 'opensearch.rest-test'
apply plugin: 'opensearch.rest-resources'

def arrowPlugins = ['arrow-base', 'arrow-flight-rpc'] as Set

int pluginsCount = 0

testClusters.integTest {
  // Arrow's Netty allocation manager requires Unsafe access, which the default
  // launcher disables via -Dio.netty.noUnsafe=true.
  systemProperty 'io.netty.noUnsafe', 'false'

  project(':plugins').getChildProjects().each { pluginName, pluginProject ->
    if (arrowPlugins.contains(pluginName)) {
      plugin pluginProject.path
      pluginsCount += 1
    }
  }
}
assert pluginsCount > 0

ext.expansions = [
  'expected.plugins.count': pluginsCount
]

processTestResources {
  inputs.properties(expansions)
  MavenFilteringHack.filter(it, expansions)
}
