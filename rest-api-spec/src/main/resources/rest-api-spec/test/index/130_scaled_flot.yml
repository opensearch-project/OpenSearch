# The test setup includes two parts:
# part1: test mapping and indexing
# part2: test query
---
"Mappings and Indexing":

  # Create indices with constant_keyword field type
  - do:
      indices.create:
        index: test
        body:
          mappings:
            properties:
              genre:
                type: "scaled_float"
                scaling_factor: "100.0"

  # Index documents to test integer and string are both ok.
  - do:
      index:
        index: test
        id: 1
        body: {
          "genre": "92233720368547750"
        }

  - do:
      index:
        index: test
        id: 2
        body: {
          "genre": 92233720368547750
        }

  - do:
      index:
        index: test
        id: 3
        body: {
          "genre": 1.11
        }
  # Refresh
  - do:
      indices.refresh:
        index: test

  # Check mapping
  - do:
      indices.get_mapping:
        index: test
  - is_true: test.mappings
  - match: { test.mappings.properties.genre.type: scaled_float }

  # Verify Document Count
  - do:
      search:
        index: test
        body: {
          query: {
            match_all: {}
          }
        }

  - length: { hits.hits: 3 }

---
"Queries":
  - skip:
      version: " - 3.99.99"
      reason: "fixed in 3.0.0"

  # Test rangeQuery
  - do:
      search:
        index: test
        body: {
          query: {
            range: {
              genre: {
                gte: "92233720368547750"
              }
            }
          }
        }

  - length: { hits.hits: 2 }
  - match: { hits.hits.0._id: "1" }
  - match: { hits.hits.0._id: "2" }

  - do:
      search:
        index: test
        body: {
          query: {
            term: {
              "field0_BigDecimal": "92233720368547750"
            }
          }
        }

  - length: { hits.hits: 2 }
  - match: { hits.hits.0._id: "1" }
  - match: { hits.hits.0._id: "2" }

  - do:
      search:
        index: test
        body: {
          query: {
            terms: {
              "field0_BigDecimal": [ "92233720368547750" ]
            }
          }
        }

  - length: { hits.hits: 2 }
  - match: { hits.hits.0._id: "1" }
  - match: { hits.hits.0._id: "2" }

  # Delete Index when connection is teardown
  - do:
      indices.delete:
        index: test
