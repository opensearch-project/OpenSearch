apply plugin: 'opensearch.build'

dependencies {
  compileOnly project(":server")
  compileOnly project(":libs:opensearch-cli")
}

// This CLI uses com.sun.tools.attach (JMX Attach API) which is the standard
// mechanism for local JVM tooling (same as jcmd, jmap, etc.)
tasks.named('forbiddenApisMain').configure {
  replaceSignatureFiles 'jdk-signatures'
  // Allow com.sun.tools.attach — required for JMX Attach API
  bundledSignatures -= 'jdk-non-portable'
}

test.enabled = false
