apply plugin: 'opensearch.build'

description = 'Shared native bridge utilities for OpenSearch sandbox plugins'

dependencies {
    api project(':libs:opensearch-core')
    api project(':libs:opensearch-common')
    implementation "org.apache.logging.log4j:log4j-api:${versions.log4j}"
    compileOnly "org.apache.arrow:arrow-c-data:${versions.arrow}"

    testImplementation "com.carrotsearch.randomizedtesting:randomizedtesting-runner:${versions.randomizedrunner}"
    testImplementation "junit:junit:${versions.junit}"
    testImplementation "org.hamcrest:hamcrest:${versions.hamcrest}"
    testImplementation(project(":test:framework")) {
        exclude group: 'org.opensearch', module: 'opensearch-core'
        exclude group: 'org.opensearch', module: 'opensearch-common'
    }
}

tasks.named('forbiddenApisMain').configure {
    replaceSignatureFiles 'jdk-signatures'
}

jarHell.enabled = false

// FFM is stable since JDK 22. Override project-wide JDK 21 target for this module.
java {
    sourceCompatibility = JavaVersion.toVersion(25)
    targetCompatibility = JavaVersion.toVersion(25)
}

// missingJavadoc hardcodes --release 21 which hides FFM types (stable since JDK 22).
// Disable for this module until the framework supports per-project release overrides.
tasks.matching { it.name == 'missingJavadoc' }.configureEach {
    enabled = false
}

tasks.withType(Test).configureEach {
    jvmArgs += ['--enable-native-access=ALL-UNNAMED']
}

// ═══════════════════════════════════════════════════════════════════
// Unified Rust native library build (FFM)
// ═══════════════════════════════════════════════════════════════════

def osName = System.getProperty('os.name').toLowerCase()
def libPrefix = osName.contains('windows') ? '' : 'lib'
def libExtension = osName.contains('windows') ? '.dll' : (osName.contains('mac') ? '.dylib' : '.so')
def nativeLibName = "opensearch_native"
def buildType = project.hasProperty('rustDebug') ? 'debug' : 'release'
def rustWorkspaceDir = file("${projectDir}/rust")
def nativeLibFile = file("${rustWorkspaceDir}/target/${buildType}/${libPrefix}${nativeLibName}${libExtension}")

task buildRustLibrary(type: Exec) {
    description = 'Build the unified Rust native library from the Cargo workspace'
    group = 'build'
    workingDir rustWorkspaceDir

    def cargoExecutable = 'cargo'
    def possibleCargoPaths = [
        System.getenv('HOME') + '/.cargo/bin/cargo',
        '/usr/local/bin/cargo',
        'cargo'
    ]
    for (String path : possibleCargoPaths) {
        if (new File(path).exists()) { cargoExecutable = path; break }
    }

    def cargoArgs = [cargoExecutable, 'build', '-p', 'opensearch-native-lib']
    if (buildType == 'release') { cargoArgs.add('--release') }
    commandLine cargoArgs

    inputs.files fileTree("${rustWorkspaceDir}/common/src")
    inputs.files fileTree("${rustWorkspaceDir}/lib/src")
    inputs.file "${rustWorkspaceDir}/Cargo.toml"
    outputs.file nativeLibFile
}

// Expose the native lib path so plugins can reference it for tests
ext.nativeLibPath = nativeLibFile

test {
    systemProperty 'tests.security.manager', 'false'
    systemProperty 'native.lib.path', nativeLibFile.absolutePath
    jvmArgs += ['--enable-native-access=ALL-UNNAMED']
    dependsOn buildRustLibrary
}

tasks.named('thirdPartyAudit').configure {
    ignoreMissingClasses(
        'org.osgi.framework.Bundle',
        'org.osgi.framework.BundleActivator',
        'org.osgi.framework.BundleContext',
        'org.osgi.framework.BundleEvent',
        'org.osgi.framework.FrameworkUtil',
        'org.osgi.framework.ServiceReference',
        'org.osgi.framework.ServiceRegistration',
        'org.osgi.framework.SynchronousBundleListener',
        'org.osgi.framework.wiring.BundleRevision',
        'org.osgi.framework.wiring.BundleWire',
        'org.osgi.framework.wiring.BundleWiring'
    )
}
