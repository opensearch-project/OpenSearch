[workspace]
resolver = "2"
members = [
    "common",
    "macros",
    "lib",
]

[workspace.dependencies]
# Arrow / Parquet
arrow = { version = "57.3.0", features = ["ffi", "ipc_compression"] }
arrow-array = "57.3.0"
arrow-schema = "57.3.0"
arrow-buffer = "57.3.0"
parquet = "57.3.0"

# DataFusion
datafusion = "52.1.0"
datafusion-expr = "52.1.0"
datafusion-datasource = "52.1.0"
datafusion-common = "52.1.0"
datafusion-execution = "52.1.0"
datafusion-physical-expr = "52.1.0"
datafusion-substrait = "52.1.0"

# Async
tokio = { version = "1.0", features = ["full"] }
futures = "0.3"
tokio-stream = "0.1.17"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
prost = "0.14"
substrait = "=0.62.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
log = "0.4"

# Allocator
mimalloc = { version = "0.1.48", default-features = false }

# Misc
dashmap = "5.5"
num_cpus = "1.16"
object_store = "0.12.5"
url = "2.0"
tempfile = "3.0"
chrono = "0.4.41"
async-trait = "0.1.89"
bytes = "1.5"
itertools = "0.14.0"
rstest = "0.26.1"
regex = "1.11.2"
once_cell = "1.21.3"
parking_lot = "0.12.5"
lazy_static = "1.4.0"
criterion = { version = "0.5", features = ["async_tokio"] }
jni = "0.21"

# Internal
native-bridge-common = { path = "common" }

[profile.release]
lto = true
codegen-units = 1
panic = "abort"
incremental = true
debug = "line-tables-only"
strip = false

[profile.dev]
opt-level = 1
lto = false
codegen-units = 16
incremental = true
debug = "full"
strip = false
