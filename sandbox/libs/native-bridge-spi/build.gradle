apply plugin: 'opensearch.build'

description = 'Shared native bridge utilities for OpenSearch sandbox plugins'

dependencies {
    api project(':libs:opensearch-core')
    api project(':libs:opensearch-common')
    implementation "org.apache.logging.log4j:log4j-api:${versions.log4j}"
    compileOnly "org.apache.arrow:arrow-c-data:${versions.arrow}"

    testImplementation "com.carrotsearch.randomizedtesting:randomizedtesting-runner:${versions.randomizedrunner}"
    testImplementation "junit:junit:${versions.junit}"
    testImplementation "org.hamcrest:hamcrest:${versions.hamcrest}"
    testImplementation(project(":test:framework")) {
        exclude group: 'org.opensearch', module: 'opensearch-core'
        exclude group: 'org.opensearch', module: 'opensearch-common'
    }
}

tasks.named('forbiddenApisMain').configure {
    replaceSignatureFiles 'jdk-signatures'
}

jarHell.enabled = false

tasks.named('thirdPartyAudit').configure {
    ignoreMissingClasses(
        // from log4j
        'org.osgi.framework.Bundle',
        'org.osgi.framework.BundleActivator',
        'org.osgi.framework.BundleContext',
        'org.osgi.framework.BundleEvent',
        'org.osgi.framework.FrameworkUtil',
        'org.osgi.framework.ServiceReference',
        'org.osgi.framework.ServiceRegistration',
        'org.osgi.framework.SynchronousBundleListener',
        'org.osgi.framework.wiring.BundleRevision',
        'org.osgi.framework.wiring.BundleWire',
        'org.osgi.framework.wiring.BundleWiring'
    )
}
