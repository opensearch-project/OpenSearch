/*
 * page-cache lib (sandbox)
 *
 * Java lifecycle library for the Foyer disk page cache.
 *
 * Provides FoyerBridge, which wraps the two native lifecycle operations
 * (create and destroy) via the Java Foreign Function & Memory (FFM) API.
 * The underlying Rust implementation lives in sandbox/libs/page-cache/src/main/rust
 * and is compiled into the shared native library — no separate .so is produced.
 */

apply plugin: 'java'
apply plugin: 'opensearch.java'

java {
    sourceCompatibility = JavaVersion.toVersion(25)
    targetCompatibility = JavaVersion.toVersion(25)
}

dependencies {
    // NativeCall, NativeLibraryLoader (FFM helpers + libopensearch_native.so)
    implementation project(':sandbox:libs:dataformat-native')

    compileOnly "org.apache.logging.log4j:log4j-api:${versions.log4j}"

    testImplementation "junit:junit:${versions.junit}"
    testImplementation "org.apache.logging.log4j:log4j-api:${versions.log4j}"
}

validateNebulaPom.enabled = false
loggerUsageCheck.enabled  = false
licenseHeaders.enabled    = false
