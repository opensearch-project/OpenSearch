/*
 * block-cache lib (sandbox)
 *
 * Pure-Java SPI for a node-level block cache. Contains BlockCache (lifecycle),
 * BlockCacheHandle (DI wrapper), BlockCacheKey (namespaced cache key),
 * BlockCacheStats (counter snapshot), and BlockCacheProvider (SPI for
 * native-repository plugins). No FFM, no Rust, no cloud deps at runtime.
 *
 * Foyer-backed implementation (FoyerBlockCache, FoyerBridge) and the Rust
 * crate live in the sibling plugin :sandbox:plugins:block-cache-foyer.
 */

apply plugin: 'java'
apply plugin: 'opensearch.java'

java {
    sourceCompatibility = JavaVersion.toVersion(25)
    targetCompatibility = JavaVersion.toVersion(25)
}

dependencies {
    // RepositoryMetadata is referenced by the BlockCacheProvider SPI only
    // at compile time. Keeping this compileOnly preserves the lib's pure-Java,
    // zero-runtime-cloud-deps property (requirement 1.3).
    compileOnly project(':server')

    // BlockCacheHandle uses LogManager.getLogger; log4j-api is compile-only
    // because the runtime classpath is always an OpenSearch node which already
    // provides log4j.
    compileOnly "org.apache.logging.log4j:log4j-api:${versions.log4j}"

    testImplementation "junit:junit:${versions.junit}"
    testImplementation "org.hamcrest:hamcrest:${versions.hamcrest}"
    testImplementation "org.apache.logging.log4j:log4j-api:${versions.log4j}"
}

tasks.named('forbiddenApisMain').configure {
    replaceSignatureFiles 'jdk-signatures'
}

tasks.named('forbiddenApisTest').configure {
    replaceSignatureFiles 'jdk-signatures'
}

validateNebulaPom.enabled = false
loggerUsageCheck.enabled  = false
licenseHeaders.enabled    = false
// Tests use plain JUnit (the lib has no OpenSearch test-framework dep); testingConventions
// requires OpenSearchRestTestCase on the classpath which is out of scope for this pure-Java SPI lib.
testingConventions.enabled = false
