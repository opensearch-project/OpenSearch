opensearchplugin {
  description = 'Storage encryption orchestrator plugin providing generic encryption context and store decoration across data format engines.'
  classname = 'org.opensearch.crypto.engine.CryptoEnginePlugin'
}

apply plugin: 'opensearch.internal-cluster-test'

java { sourceCompatibility = JavaVersion.toVersion(21); targetCompatibility = JavaVersion.toVersion(21) }

dependencies {
  compileOnly project(':server')
  compileOnly project(':libs:opensearch-common')
  testImplementation project(':test:framework')
}
