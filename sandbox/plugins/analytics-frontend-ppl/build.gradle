apply plugin: 'opensearch.internal-cluster-test'

def calciteVersion = '1.41.0'

// SQL Unified Query API version (aligned with OpenSearch build version)
def sqlUnifiedQueryVersion = '3.6.0.0-SNAPSHOT'

opensearchplugin {
  description = 'Calcite-based query planning plugin with native execution across OpenSearch data nodes.'
  classname = 'org.opensearch.fe.PPLFrontEndPlugin'
  extendedPlugins = ['analytics-engine']
}

repositories {
  maven {
    name = 'OpenSearch Snapshots'
    url = 'https://ci.opensearch.org/ci/dbc/snapshots/maven/'
  }

}

dependencies {
  // Shared types and SPI interfaces (QueryPlanExecutor, EngineBridge, EngineCapabilities, etc.)
  api project(':sandbox:libs:analytics-framework')

  // Arrow Flight streaming transport
  api project(':plugins:arrow-flight-rpc')

  // Apache Calcite for query planning
  implementation "org.apache.calcite:calcite-core:${calciteVersion}"
  implementation "org.apache.calcite:calcite-linq4j:${calciteVersion}"
  implementation "org.apache.calcite.avatica:avatica-core:1.27.0"

  // Guava (required by Calcite internals)
  implementation "com.google.guava:guava:${versions.guava}"
  runtimeOnly "com.google.guava:failureaccess:1.0.2"

  // Calcite runtime dependencies
  runtimeOnly "org.apache.commons:commons-math3:3.6.1"
  runtimeOnly "com.jayway.jsonpath:json-path:2.9.0"
  runtimeOnly "org.codehaus.janino:janino:3.1.12"
  runtimeOnly "org.codehaus.janino:commons-compiler:3.1.12"
  runtimeOnly "org.slf4j:slf4j-api:${versions.slf4j}"
  runtimeOnly "commons-codec:commons-codec:${versions.commonscodec}"
  runtimeOnly "org.locationtech.jts:jts-core:${versions.jts}"
  runtimeOnly 'com.esri.geometry:esri-geometry-api:2.2.4'

  // Annotation dependencies (needed to suppress -Werror on Calcite/Arrow annotation warnings)
  compileOnly 'org.checkerframework:checker-qual:3.43.0'
  compileOnly 'org.apiguardian:apiguardian-api:1.1.2'
  compileOnly 'org.immutables:value:2.10.1'

  // SQL Unified Query API (sql/api) and its transitive dependencies for PPL-to-SQL translation
  implementation("org.opensearch.query:unified-query-api:${sqlUnifiedQueryVersion}") {
    exclude group: 'org.opensearch'
  }
  implementation("org.opensearch.query:unified-query-ppl:${sqlUnifiedQueryVersion}") {
    exclude group: 'org.opensearch'
  }
  implementation("org.opensearch.query:unified-query-common:${sqlUnifiedQueryVersion}") {
    exclude group: 'org.opensearch'
    exclude group: 'com.github.babbel'
  }
  implementation("org.opensearch.query:unified-query-core:${sqlUnifiedQueryVersion}") {
    exclude group: 'org.opensearch'
  }
  implementation("org.opensearch.query:unified-query-protocol:${sqlUnifiedQueryVersion}") {
    exclude group: 'org.opensearch'
    exclude group: 'com.github.babbel' // okhttp-aws-signer — not needed, avoids JitPack dependency
  }

  // ANTLR runtime (required by sql/ppl for PPL grammar parsing)
  implementation "org.antlr:antlr4-runtime:4.13.2"

  // Query engine hub plugin for integration tests
  internalClusterTestImplementation project(':sandbox:plugins:analytics-engine')
  // Query executor plugin for integration tests
  internalClusterTestImplementation project(':sandbox:plugins:analytics-engine-executor')
}

configurations.all {
  // Globally exclude okhttp-aws-signer — transitive from unified-query-common,
  // only published on JitPack, not needed for PPL parsing/planning
  exclude group: 'com.github.babbel', module: 'okhttp-aws-signer'

  resolutionStrategy {
    force 'com.google.guava:guava:33.4.0-jre'
    force 'com.google.guava:failureaccess:1.0.2'
    force 'com.google.errorprone:error_prone_annotations:2.36.0'
    force 'org.checkerframework:checker-qual:3.43.0'
    force "com.fasterxml.jackson.core:jackson-core:${versions.jackson}"
    force "com.fasterxml.jackson.core:jackson-databind:${versions.jackson_databind}"
    force "com.fasterxml.jackson.core:jackson-annotations:${versions.jackson_annotations}"
    force "com.fasterxml.jackson.dataformat:jackson-dataformat-cbor:${versions.jackson}"
    force "org.slf4j:slf4j-api:${versions.slf4j}"
    force "org.locationtech.jts:jts-core:${versions.jts}"
    force "commons-codec:commons-codec:${versions.commonscodec}"
    force "joda-time:joda-time:2.12.7"
    force "org.yaml:snakeyaml:2.4"
    force "org.apache.commons:commons-lang3:3.18.0"
    force "commons-logging:commons-logging:1.3.5"
    force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.21"
    force "org.jetbrains.kotlin:kotlin-stdlib-common:1.9.10"
    force "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:${versions.jackson}"
    force "org.apache.commons:commons-text:1.11.0"
    force "org.apache.httpcomponents.client5:httpclient5:5.6"
    force "org.apache.httpcomponents.core5:httpcore5:5.4"
    force "net.minidev:json-smart:2.5.2"
    force "com.squareup.okhttp3:okhttp:4.12.0"
    force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.21"
    force "org.jetbrains.kotlin:kotlin-stdlib:1.8.21"
  }
}

// Arrow/Flight requires these JVM flags
internalClusterTest {
  jvmArgs '--add-opens=java.base/java.nio=ALL-UNNAMED'
  jvmArgs '--add-opens=java.base/java.lang=ALL-UNNAMED'
  jvmArgs '--add-opens=java.base/sun.nio.ch=ALL-UNNAMED'
  jvmArgs '-Darrow.memory.debug.allocator=false'
  systemProperty 'io.netty.allocator.numDirectArenas', '1'
  systemProperty 'io.netty.noUnsafe', 'false'
  systemProperty 'io.netty.tryUnsafe', 'true'
  systemProperty 'io.netty.tryReflectionSetAccessible', 'true'
  jvmArgs += ["--add-opens", "java.base/java.nio=org.apache.arrow.memory.core,ALL-UNNAMED"]
}

tasks.named("dependencyLicenses").configure {
  mapping from: /calcite-.*/, to: 'calcite'
  mapping from: /jackson-.*/, to: 'jackson'
}
