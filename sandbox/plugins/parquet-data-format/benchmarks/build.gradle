apply plugin: 'opensearch.build'
apply plugin: 'application'

assemble.enabled = false

application {
  mainClass = 'org.openjdk.jmh.Main'
}

base {
  archivesName = 'parquet-data-format-benchmarks'
}

test.enabled = false
javadoc.enabled = false

dependencies {
  api(project(':sandbox:plugins:parquet-data-format')) {
    exclude group: 'net.sf.jopt-simple', module: 'jopt-simple'
  }
  api(project(':server')) {
    exclude group: 'net.sf.jopt-simple', module: 'jopt-simple'
  }

  // JMH dependencies
  api "org.openjdk.jmh:jmh-core:$versions.jmh"
  annotationProcessor "org.openjdk.jmh:jmh-generator-annprocess:$versions.jmh"

  // Dependencies of JMH
  runtimeOnly 'net.sf.jopt-simple:jopt-simple:5.0.4'
  runtimeOnly 'org.apache.commons:commons-math3:3.6.1'

  // Arrow dependencies for benchmark data generation
  api "org.apache.arrow:arrow-vector:${versions.arrow}"
  api "org.apache.arrow:arrow-memory-core:${versions.arrow}"
  api "org.apache.arrow:arrow-memory-unsafe:${versions.arrow}"
  api "org.apache.arrow:arrow-c-data:${versions.arrow}"
  api "org.apache.arrow:arrow-format:${versions.arrow}"

  api "com.google.flatbuffers:flatbuffers-java:${versions.flatbuffers}"

  // Logging dependencies required by Arrow
  api "org.slf4j:slf4j-api:${versions.slf4j}"
  api "org.apache.logging.log4j:log4j-api:${versions.log4j}"
  api "org.apache.logging.log4j:log4j-core:${versions.log4j}"
  api "org.apache.logging.log4j:log4j-slf4j-impl:${versions.log4j}"
}

// enable the JMH's BenchmarkProcessor to generate the final benchmark classes
compileJava.options.compilerArgs.addAll(["-processor", "org.openjdk.jmh.generators.BenchmarkProcessor"])

// Disable -Werror for benchmark compilation
compileJava.options.compilerArgs.removeAll(['-Werror'])

disableTasks('forbiddenApisMain')

tasks.named("dependencyLicenses").configure { it.enabled = false }
dependenciesInfo.enabled = false

thirdPartyAudit.ignoreViolations(
  'org.openjdk.jmh.util.Utils'
)

spotless {
  java {
    targetExclude 'src/main/generated/**/*.java'
  }
}

run.jvmArgs += [
  '--add-opens=java.base/java.nio=org.apache.arrow.memory.core,ALL-UNNAMED'
]

run.environment += [
  'RUST_BACKTRACE': 'full'
]
