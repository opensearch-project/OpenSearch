opensearchplugin {
  description = 'Parquet data format plugin for OpenSearch.'
  classname = 'org.opensearch.parquet.ParquetDataFormatPlugin'
  // Extend arrow-base so this plugin shares one Arrow classloader with any peer plugin
  // (analytics-engine, arrow-flight-rpc, …). Cross-plugin Arrow types only work when
  // loaded by the same classloader.
  extendedPlugins = ['arrow-base']
}

java { sourceCompatibility = JavaVersion.toVersion(25); targetCompatibility = JavaVersion.toVersion(25) }

dependencies {
  // Shared native bridge lib (provides the unified .so and FFM SymbolLookup)
  implementation project(':sandbox:libs:dataformat-native')

  // arrow-base exposes Arrow + Netty core / Jackson / flatbuffers / slf4j / commons-codec
  // as api deps, so a compileOnly project dep pulls them onto the compile classpath while
  // keeping them out of the bundled plugin zip (arrow-base ships them at runtime via the
  // extendedPlugins classloader chain, giving us a shared Arrow class identity for zero-copy).
  compileOnly project(':plugins:arrow-base')

  // arrow-c-data is NOT in arrow-base (only this plugin uses FFM via the C Data Interface),
  // so bundle it here.
  implementation "org.apache.arrow:arrow-c-data:${versions.arrow}"

  // checker-qual — Arrow references @EnsuresNonNullIf annotations; compile-only is enough.
  compileOnly 'org.checkerframework:checker-qual:3.43.0'

  // jackson-core is on the server classpath (not in arrow-base's api set).
  compileOnly "com.fasterxml.jackson.core:jackson-core:${versions.jackson}"

  // log4j runtime for parquet's own logging (not provided by arrow-base).
  implementation "org.apache.logging.log4j:log4j-api:${versions.log4j}"
  implementation "org.apache.logging.log4j:log4j-core:${versions.log4j}"
  implementation "org.apache.logging.log4j:log4j-slf4j2-impl:${versions.log4j}"

  // Unit tests run on a flat classpath (no plugin classloader), so pull arrow-base's runtime
  // jars in via the project dep — tests then use the same Arrow + Netty allocator as production.
  testRuntimeOnly project(':plugins:arrow-base')
}

// Netty + Arrow memory classes used to be bundled here — arrow-base now provides them.
// Any Unsafe violations belong to arrow-base's audit suppression, not this plugin.

configurations.all {
  resolutionStrategy {
    // Arrow-vector pulls older jackson + commons-codec transitively. Force the versions
    // matching OpenSearch's managed set so testRuntimeClasspath resolves cleanly.
    force "com.fasterxml.jackson.core:jackson-core:${versions.jackson}"
    force "com.fasterxml.jackson.core:jackson-databind:${versions.jackson_databind}"
    force "com.fasterxml.jackson.core:jackson-annotations:${versions.jackson_annotations}"
    force "com.fasterxml.jackson.datatype:jackson-datatype-jsr310:${versions.jackson}"
    force "com.fasterxml.jackson:jackson-bom:${versions.jackson}"
    force "commons-codec:commons-codec:${versions.commonscodec}"
    force "com.google.flatbuffers:flatbuffers-java:${versions.flatbuffers}"
    force "org.slf4j:slf4j-api:${versions.slf4j}"
  }
}

spotless {
    format 'misc', {
        targetExclude '**/src/main/rust/target/**'
    }
}

test {
  jvmArgs '--add-opens=java.base/java.nio=ALL-UNNAMED'
  jvmArgs '--add-opens=java.base/sun.nio.ch=ALL-UNNAMED'
  jvmArgs '--enable-native-access=ALL-UNNAMED'
  // Required by arrow-memory-netty for Unsafe / direct-memory access
  jvmArgs += ["--add-opens", "java.base/java.nio=org.apache.arrow.memory.core,ALL-UNNAMED"]
  systemProperty 'io.netty.allocator.numDirectArenas', '1'
  systemProperty 'io.netty.noUnsafe', 'false'
  systemProperty 'io.netty.tryUnsafe', 'true'
  systemProperty 'io.netty.tryReflectionSetAccessible', 'true'
  systemProperty 'native.lib.path', project(':sandbox:libs:dataformat-native').ext.nativeLibPath.absolutePath
  dependsOn ':sandbox:libs:dataformat-native:buildRustLibrary'
}

tasks.matching { it.name == 'missingJavadoc' }.configureEach {
    enabled = false
}
