\* TLC Model Configuration for ParquetWritePath
\*
\* Small constants for exhaustive model checking.
\* Increase for deeper exploration (at the cost of state space).

CONSTANTS
    MaxDocs = 6
    MaxRowsPerVSR = 3

SPECIFICATION Spec

\* --- Safety Invariants ---
INVARIANT TypeOK
INVARIANT VSRStateMachineInvariant
INVARIANT NoDoubleWrite
INVARIANT NoMemoryLeak
INVARIANT RowCountConservation
INVARIANT NativeWriterMonotonicity
INVARIANT NoWriteAfterFlush
INVARIANT FrozenSlotConsistency
INVARIANT BackgroundWriteSafety

\* --- Liveness Properties ---
PROPERTY AllDocsEventuallyWritten
PROPERTY PipelineTerminates
