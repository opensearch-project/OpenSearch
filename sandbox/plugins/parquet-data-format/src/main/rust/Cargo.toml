[package]
name = "parquet-dataformat-jni"
version = "0.1.0"
edition = "2021"

[features]
test-utils = []

[lib]
name = "parquet_dataformat_jni"
crate-type = ["cdylib", "lib"]

[dependencies]
arrow = { version = "58.0.0", features = ["ffi"] }
jni = "0.21"
lazy_static = "1.4.0"
dashmap = "6.1"
mimalloc = { version = "0.1.48", default-features = false }
tempfile = "3.0"
parquet = { version = "58.0.0", features = ["arrow"] }

tokio = { version = "1.0", features = ["rt-multi-thread", "sync"] }
rayon = "1.5"

native-bridge-spi = { path = "../../../../../libs/native-bridge-spi/src/main/rust" }

[dev-dependencies]
parquet_dataformat_jni = { path = ".", package = "parquet-dataformat-jni", features = ["test-utils"] }

[profile.release]
debug = "line-tables-only"
strip = false
