[package]
name = "parquet-dataformat-jni"
version = "0.1.0"
edition = "2021"

[features]
test-utils = []

[lib]
name = "parquet_dataformat_jni"
crate-type = ["cdylib", "lib"]

[dependencies]
arrow = { version = "54.0.0", features = ["ffi"] }
arrow-array = "54.0.0"
arrow-schema = "54.0.0"
arrow-buffer = "54.0.0"
jni = "0.21"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "1.0"
log = "0.4"
parquet = { version = "54.0.0", features = ["async", "object_store"] }
object_store = { version = "0.11", features = ["aws", "gcp", "azure"] }
tokio = { version = "1", features = ["rt-multi-thread"] }
bytes = "1"
futures = "0.3"
url = "2"
chrono = "0.4"
mimalloc = { version = "0.1.48", default-features = false }
tempfile = "3.0"

native-bridge-spi = { path = "../../../../../libs/native-bridge-spi/src/main/rust" }

[dev-dependencies]
parquet_dataformat_jni = { path = ".", package = "parquet-dataformat-jni", features = ["test-utils"] }

[profile.release]
debug = "line-tables-only"
strip = false
