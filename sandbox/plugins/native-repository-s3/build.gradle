opensearchplugin {
  description = 'Native (Rust) ObjectStore backend for the S3 repository plugin.'
  classname = 'org.opensearch.repositories.s3.native_store.S3NativeObjectStorePlugin'
  extendedPlugins = ['repository-s3', 'block-cache-foyer']
}

apply plugin: 'opensearch.internal-cluster-test'

java { sourceCompatibility = JavaVersion.toVersion(25); targetCompatibility = JavaVersion.toVersion(25) }

dependencies {
  // FFM helpers (NativeCall, NativeLibraryLoader) inherited at runtime from the
  // block-cache-foyer parent classloader via extendedPlugins. compileOnly here avoids
  // jar hell in checkBundleJarHell when both parent and child bundles carry the same classes.
  compileOnly project(':sandbox:libs:dataformat-native')
  // SPI classes (BlockCache, BlockCacheHandle, spi/*) also inherited from block-cache-foyer.
  compileOnly project(':sandbox:libs:block-cache')
  compileOnly project(':plugins:repository-s3')
  compileOnly project(':sandbox:plugins:block-cache-foyer')
  internalClusterTestImplementation project(':test:framework')
  internalClusterTestImplementation project(':plugins:repository-s3')
  internalClusterTestImplementation project(':sandbox:plugins:block-cache-foyer')
}

testingConventions.enabled = false

tasks.named('compileInternalClusterTestJava').configure {
  sourceCompatibility = JavaVersion.toVersion(25)
  targetCompatibility = JavaVersion.toVersion(25)
}

tasks.named('internalClusterTest').configure {
  jvmArgs += [
    '--enable-native-access=ALL-UNNAMED'
  ]
  systemProperty 'native.lib.path', project(':sandbox:libs:dataformat-native').ext.nativeLibPath.absolutePath
  dependsOn ':sandbox:libs:dataformat-native:buildRustLibrary'
}

tasks.named('test').configure {
  jvmArgs += ['--enable-native-access=ALL-UNNAMED']
  systemProperty 'native.lib.path', project(':sandbox:libs:dataformat-native').ext.nativeLibPath.absolutePath
  dependsOn ':sandbox:libs:dataformat-native:buildRustLibrary'
}

// missingJavadoc hardcodes --release 21 which hides FFM types (stable since JDK 22).
tasks.matching { it.name == 'missingJavadoc' }.configureEach {
    enabled = false
}
