opensearchplugin {
  description = 'Native (Rust) ObjectStore backend for the GCS repository plugin.'
  classname = 'org.opensearch.repositories.gcs.native_store.GcsNativeObjectStorePlugin'
  extendedPlugins = ['repository-gcs']
}

java { sourceCompatibility = JavaVersion.toVersion(25); targetCompatibility = JavaVersion.toVersion(25) }

dependencies {
  implementation project(':sandbox:libs:dataformat-native')
  compileOnly project(':plugins:repository-gcs')
}

testingConventions.enabled = false
