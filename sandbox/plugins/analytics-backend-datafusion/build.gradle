apply plugin: 'opensearch.internal-cluster-test'

opensearchplugin {
  description = 'DataFusion native execution engine plugin for the query engine.'
  classname = 'org.opensearch.be.datafusion.DataFusionPlugin'
  extendedPlugins = ['analytics-engine', 'arrow-flight-rpc']
}

// --- Rust JNI build integration ---
def jniDir = project.file('jni')
def rustProfile = project.hasProperty('rustDebug') ? 'debug' : 'release'
def rustTarget = rustProfile == 'debug' ? 'debug' : 'release'
def nativeLibName = org.gradle.internal.os.OperatingSystem.current().isLinux() ? 'libanalytics_datafusion_jni.so' : 'libanalytics_datafusion_jni.dylib'

task buildRustLibrary(type: Exec) {
    workingDir jniDir
    def cargoArgs = ['cargo', 'build']
    if (rustProfile == 'release') cargoArgs += ['--release']
    commandLine cargoArgs
    inputs.dir(jniDir.toPath().resolve('src'))
    inputs.file(jniDir.toPath().resolve('Cargo.toml'))
    outputs.file(jniDir.toPath().resolve("target/${rustTarget}/${nativeLibName}"))
}

task copyNativeLibrary(type: Copy, dependsOn: buildRustLibrary) {
    from jniDir.toPath().resolve("target/${rustTarget}/${nativeLibName}")
    into project.file('src/main/resources/native')
}

processResources.dependsOn copyNativeLibrary

configurations.all {
  resolutionStrategy {
    force "com.google.guava:guava:${versions.guava}"
    force 'com.google.guava:failureaccess:1.0.2'
  }
}

dependencies {
  api project(':sandbox:libs:analytics-framework')
  implementation project(':plugins:arrow-flight-rpc')
  implementation "org.apache.arrow:arrow-c-data:${versions.arrow}"

  // Integration test dependencies
  internalClusterTestImplementation project(':sandbox:plugins:analytics-engine')
}

// JVM args for Arrow memory access
tasks.withType(Test).configureEach {
  jvmArgs += ["--add-opens", "java.base/java.nio=ALL-UNNAMED"]
}

// Netty system properties required by FlightStreamPlugin
internalClusterTest {
  systemProperty 'io.netty.allocator.numDirectArenas', '1'
  systemProperty 'io.netty.noUnsafe', 'false'
  systemProperty 'io.netty.tryUnsafe', 'true'
  systemProperty 'io.netty.tryReflectionSetAccessible', 'true'
}

// TODO: Remove once back-end is built out with test suite
testingConventions.enabled = false

thirdPartyAudit.enabled = false
