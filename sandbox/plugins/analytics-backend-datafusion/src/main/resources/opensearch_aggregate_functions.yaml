%YAML 1.2
---
urn: extension:org.opensearch:aggregate_functions
aggregate_functions:
  - name: approx_distinct
    description: >-
      Approximate distinct count using HyperLogLog. Maps to DataFusion's
      approx_distinct aggregate function via its Substrait consumer.
    impls:
      - args:
          - value: any
            name: "input"
        return: i64
  - name: min
    description: >-
      Min of a set of string values. Standard substrait functions_arithmetic.yaml
      only defines min for i8..fp64; this overload extends it to strings so PPL
      `stats min(varchar_field)` can bind a Substrait call and dispatch to
      DataFusion's native min UDF, which supports Utf8 natively.
    impls:
      - args:
          - name: x
            value: "string"
        nullability: DECLARED_OUTPUT
        decomposable: MANY
        intermediate: "string?"
        return: "string?"
  - name: max
    description: >-
      Max of a set of string values. See min above.
    impls:
      - args:
          - name: x
            value: "string"
        nullability: DECLARED_OUTPUT
        decomposable: MANY
        intermediate: "string?"
        return: "string?"
  - name: take
    description: >-
      PPL `take(field, N)` — bounded, arrival-order array. Custom Rust UDAF in
      `rust/src/udaf/take.rs`. Distinct generics `any1`/`any2` because state
      and n have unrelated types.
    impls:
      - args:
          - name: x
            value: any1
          - name: n
            value: any2
        return: any1
      - args:
          - name: x
            value: any1
        return: any1
  - name: first_value
    description: PPL `first(field)` — DataFusion native first_value.
    impls:
      - args:
          - name: x
            value: any
        return: any
  - name: last_value
    description: PPL `last(field)` — DataFusion native last_value.
    impls:
      - args:
          - name: x
            value: any
        return: any
  - name: array_agg
    description: >-
      PPL `list(field)` (and `values(field)` with `INVOCATION_DISTINCT`) —
      DataFusion native array_agg.
    impls:
      - args:
          - name: x
            value: any
        return: any
