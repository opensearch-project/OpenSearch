%YAML 1.2
---
urn: extension:org.opensearch:scalar_functions
scalar_functions:
  - name: ilike
    description: >-
      Case-insensitive LIKE. datafusion-substrait maps the extension name `ilike`
      to a case-insensitive `LikeExpr`.
    impls:
      - args:
          - value: "varchar<L1>"
            name: "input"
          - value: "varchar<L2>"
            name: "match"
        return: boolean
      - args:
          - value: "string"
            name: "input"
          - value: "string"
            name: "match"
        return: boolean
  - name: "date_part"
    description: >-
      Extract a numeric component (year, month, day, etc.) from a timestamp/date.
      DataFusion returns fp64 for every part name, so the signature pins fp64
      regardless of which part is requested.

      The `part` slot is declared as `value: string`, not an `options:`
      EnumArgument. `DatePartAdapters` prepends a VARCHAR literal (e.g.
      `"year"`) via `rexBuilder.makeLiteral(…, VARCHAR, true)`; that is not a
      `SqlIntervalQualifier` enum symbol, so isthmus's `FunctionConverter.matchKeys`
      emits the token `str` for that operand, and the probe key matches this
      sig's `str_…` form. An `options:` declaration would serialize under a
      `req`/`opt` key and never match.

      The value slot is declared with the concrete date/time families
      (`precision_timestamp<P>` / `date`) rather than `any1`: Calcite's `date`
      field type emits `precision_timestamp<0>?` at the Rex level, and
      matchKeys encodes the nullable-precision metadata into the probe key;
      `any1` cannot bind through the composite 2-arg key in this context.

      TIME is deferred. Calcite emits `precision_time<P>?` for TIME operands,
      but declaring `value: precision_time<P>` in this yaml is rejected at
      plugin boot with "Only type literals and parameterized types can be used
      in functions." and plain `value: time` binds only literal `time` (no
      precision parameter) which Calcite never emits. A TIME path requires an
      adapter that casts TIME to TIMESTAMP or a parser-level change.
    impls:
      - args:
          - { value: string, name: "part" }
          - { value: "precision_timestamp<P>", name: "value" }
        return: fp64
      - args:
          - { value: string, name: "part" }
          - { value: "date", name: "value" }
        return: fp64
  - name: "date_trunc"
    description: >-
      Truncate a timestamp/date to the given unit. Lowering target for PPL's
      time-based `span(field, 1<unit>)` (rewritten by `SpanAdapter`). Same arg
      shape as `date_part` — string unit then precision_timestamp/date — for
      the same isthmus matchKeys reason documented on `date_part`. Return type
      mirrors the input timestamp precision; DataFusion's `date_trunc` returns
      the same temporal kind as its input.
    impls:
      - args:
          - { value: string, name: "unit" }
          - { value: "precision_timestamp<P>", name: "value" }
        return: precision_timestamp<P>
      - args:
          - { value: string, name: "unit" }
          - { value: "date", name: "value" }
        return: date
  - name: "date_bin"
    description: >-
      Bucket a timestamp into fixed-width windows of size `stride` (a string-form
      interval like `"40 milliseconds"`) starting from the Unix epoch. Lowering
      target for PPL's sub-second multi-unit time span — `span(field, N us)` and
      `span(field, N ms)` with `N > 1` — rewritten by `SpanAdapter`. Larger
      fixed-length units (`s`, `m`, `h`, `d`, `w`) take the cheaper integer-seconds
      arithmetic path in the same adapter and don't reach this signature. The
      arg shape mirrors `date_trunc`: string stride then precision_timestamp,
      so isthmus matchKeys binds it the same way.
    impls:
      - args:
          - { value: string, name: "stride" }
          - { value: "precision_timestamp<P>", name: "source" }
        return: precision_timestamp<P>
      - args:
          - { value: string, name: "stride" }
          - { value: "precision_timestamp<P>", name: "source" }
          - { value: string, name: "origin" }
        return: precision_timestamp<P>
  - name: "convert_tz"
    description: >-
      Shift a timestamp from one timezone to another. IANA names and +/-HH:MM
      offsets. The first slot pins `precision_timestamp<P>` for the same
      reason documented on date_part — `any1` cannot bind the nullable-
      precision-timestamp metadata through a multi-arg composite match key.
    impls:
      - args:
          - { value: "precision_timestamp<P>", name: "ts" }
          - { value: string, name: "from_tz" }
          - { value: string, name: "to_tz" }
        return: timestamp
  - name: "to_unixtime"
    description: "Return a timestamp as Unix epoch seconds."
    impls:
      - args: [{ value: "any1", name: "ts" }]
        return: i64
  - name: "now"
    description: >-
      Returns the current wall-clock timestamp. DataFusion's builtin `now` —
      evaluated once per query, constant across the plan. Lowering target for
      PPL `now()`, `current_timestamp()`, and `sysdate()`.
    impls:
      - args: []
        return: timestamp
  - name: "current_date"
    description: >-
      Returns today's date (no time component). DataFusion's builtin
      `current_date`. Lowering target for PPL `current_date()` / `curdate()`.
    impls:
      - args: []
        return: date
  - name: "current_time"
    description: >-
      Returns the current wall-clock time (no date component). DataFusion's
      builtin `current_time`. Lowering target for PPL `current_time()` / `curtime()`.
    impls:
      - args: []
        return: time
  - name: "to_time"
    description: >-
      Extract the time-of-day component from a TIMESTAMP, DATE, TIME, or
      string value. DataFusion's builtin `to_time`
      (datafusion-functions/src/datetime/to_time.rs) — returns `Time64(ns)`
      for Timestamp / Utf8 / Utf8View / LargeUtf8 inputs. Lowering target for
      PPL `time(expr)` via TimeAdapter in DateTimeAdapters.
    impls:
      - args: [{ value: "precision_timestamp<P>", name: "value" }]
        return: time
      - args: [{ value: "date", name: "value" }]
        return: time
      - args: [{ value: "time", name: "value" }]
        return: time
      - args: [{ value: "string", name: "value" }]
        return: time
      - args: [{ value: "varchar<L1>", name: "value" }]
        return: time
  - name: "to_date"
    description: >-
      Extract the date component from a TIMESTAMP, DATE, or string value.
      DataFusion's builtin `to_date`
      (datafusion-functions/src/datetime/to_date.rs) — returns `Date32` for
      Timestamp / Utf8 / Utf8View / LargeUtf8 inputs. Lowering target for
      PPL `date(expr)` via DateAdapter in DateTimeAdapters. PPL's operand
      checker rejects integer inputs upstream, so DF's days-since-epoch
      branch is unreachable on this path.
    impls:
      - args: [{ value: "precision_timestamp<P>", name: "value" }]
        return: date
      - args: [{ value: "date", name: "value" }]
        return: date
      - args: [{ value: "string", name: "value" }]
        return: date
      - args: [{ value: "varchar<L1>", name: "value" }]
        return: date
  - name: "to_timestamp"
    description: >-
      Parse a value into a TIMESTAMP. DataFusion's builtin `to_timestamp`
      (datafusion-functions/src/datetime/to_timestamp.rs) — returns
      `Timestamp(Nanosecond, None)` for Timestamp / Utf8 / Utf8View /
      LargeUtf8 inputs. Lowering target for PPL `datetime(expr)` via
      DatetimeAdapter. PPL's single-arg `timestamp(expr)` shares semantics
      but stays on legacy due to an enum-slot collision with the VARCHAR
      literal-folding adapter — see DatetimeAdapter javadoc.
    impls:
      - args: [{ value: "precision_timestamp<P>", name: "value" }]
        return: timestamp
      - args: [{ value: "date", name: "value" }]
        return: timestamp
      - args: [{ value: "string", name: "value" }]
        return: timestamp
      - args: [{ value: "varchar<L1>", name: "value" }]
        return: timestamp
  - name: regex_match
    description: >-
      Regular expression containment match (boolean). Lowering target for PPL's
      `regex` command and `regexp_match()` function — both emit Calcite's
      `SqlLibraryOperators.REGEXP_CONTAINS`, which DataFusionFragmentConvertor
      maps to this extension. datafusion-substrait resolves the extension name
      "regex_match" to `datafusion::logical_expr::Operator::RegexMatch`, which
      executes against arrow-string's regex kernel and returns BOOLEAN.
    impls:
      - args:
          - value: "varchar<L1>"
            name: "input"
          - value: "varchar<L2>"
            name: "pattern"
        return: boolean
      - args:
          - value: "string"
            name: "input"
          - value: "string"
            name: "pattern"
        return: boolean
  - name: cbrt
    description: >-
      Cube root. Resolves to DataFusion's built-in `cbrt` scalar function.
    impls:
      - args:
          - value: fp32
            name: x
        return: fp32
      - args:
          - value: fp64
            name: x
        return: fp64
  - name: cot
    description: >-
      Cotangent. Resolves to DataFusion's built-in `cot` scalar function.
    impls:
      - args:
          - value: fp32
            name: x
        return: fp32
      - args:
          - value: fp64
            name: x
        return: fp64
  - name: pi
    description: >-
      Zero-argument π constant. Resolves to DataFusion's built-in `pi` scalar
      function.
    impls:
      - args: []
        return: fp64
  - name: random
    description: >-
      Pseudorandom fp64 in [0, 1). Resolves to DataFusion's built-in `random`
      scalar function. PPL surface name is `rand`; FunctionMappings maps
      `SqlStdOperatorTable.RAND` to this extension name. Only the 0-arg form
      is declared because DataFusion's native `random` UDF is registered as
      NullAry only — adding a seeded i32 overload here makes isthmus bind
      cleanly, but DF then errors at execute time ("expected zero argument
      but received 1"). Seeded `rand(int)` needs a dedicated Rust UDF before
      it can be added here. Until then, tests exercising `rand(seed)` are
      skipped on the analytics path.
    impls:
      - args: []
        return: fp64
  - name: round
    description: >-
      One-argument rounding to the nearest integer, preserving input type.
      DataFusion's built-in `round` also supports a 2-arg (value, digits)
      overload matching the Substrait default signature; PPL frequently emits
      a single-argument form which this entry declares.
    impls:
      - args:
          - value: fp32
            name: x
        return: fp32
      - args:
          - value: fp64
            name: x
        return: fp64
  - name: signum
    description: >-
      Signum. DataFusion's built-in scalar function is named `signum`; PPL/Calcite
      surface name is `sign`. AbstractNameMappingAdapter retargets Calcite's `SIGN`
      at SignumFunction (yaml name `signum`) so isthmus emits the name DataFusion
      resolves directly. Integer overload returns the input width unchanged —
      matches Calcite's SIGN type inference for `int` columns.
    impls:
      - args:
          - value: i32
            name: x
        return: i32
      - args:
          - value: fp32
            name: x
        return: fp32
      - args:
          - value: fp64
            name: x
        return: fp64
  - name: trunc
    description: >-
      Truncate toward zero. Resolves to DataFusion's built-in `trunc` scalar
      function. PPL's `truncate` — `SqlStdOperatorTable.TRUNCATE` — accepts
      both 1-arg and 2-arg (value, scale) forms per the
      CompositeOperandTypeChecker; both are declared here. Integer overloads
      pass through unchanged (truncate of an int is a no-op) so `truncate(int)`
      and `truncate(int, scale)` from PPL bind to a Substrait call.
    impls:
      - args:
          - value: i32
            name: x
        return: i32
      - args:
          - value: fp32
            name: x
        return: fp32
      - args:
          - value: fp64
            name: x
        return: fp64
      - args:
          - value: i32
            name: x
          - value: i32
            name: scale
        return: i32
      - args:
          - value: fp32
            name: x
          - value: i32
            name: scale
        return: fp32
      - args:
          - value: fp64
            name: x
          - value: i32
            name: scale
        return: fp64
  - name: replace
    description: >-
      Literal string replacement — replace every occurrence of `search` in `input`
      with `replacement`. Lowering target for PPL's `replace` command on
      non-wildcard patterns (Calcite `SqlStdOperatorTable.REPLACE`).
      datafusion-substrait resolves the extension name "replace" to DataFusion's
      native `replace` UDF (datafusion-functions/src/string/replace.rs).
    impls:
      - args:
          - value: "varchar<L1>"
            name: "input"
          - value: "varchar<L2>"
            name: "search"
          - value: "varchar<L3>"
            name: "replacement"
        return: "varchar<L1>"
      - args:
          - value: "string"
            name: "input"
          - value: "string"
            name: "search"
          - value: "string"
            name: "replacement"
        return: string
  - name: "parse"
    description: >-
      PPL `parse <field> '<regex>'` — extract named regex groups into a
      `map<varchar, varchar>` whose keys are the group names in pattern
      definition order. The Rust UDF anchors the pattern with `^…$` so
      semantics match Java's `Matcher.matches()` (whole-string match) used by
      legacy `RegexExpression`. Method literal must be `regex`; `grok` /
      `patterns` are rejected at plan time by `ParseAdapter`. Pattern + method
      operands are validated as non-null string literals there too.
    impls:
      - args:
          - { value: string, name: "input" }
          - { value: string, name: "pattern" }
          - { value: string, name: "method" }
        return: "map<string, string>"
  - name: "grok"
    description: >-
      PPL `grok <field> '<grok-pattern>'` — the grok-syntax sibling of `parse`.
      Extracts named groups into a `map<varchar, varchar>` whose keys are the
      grok field names (`%{HOSTNAME:host}` → key `host`) in pattern definition
      order. Unlike `parse`, the pattern is grok syntax, not a raw regex: the
      Rust UDF carries the 108-line default grok dictionary and recursively
      resolves `%{NAME:field}` references before matching (the SQL plugin's grok
      library is not on OpenSearch core's classpath). The resolved regex relies
      on lookbehind / atomic groups (e.g. `BASE10NUM`), so matching uses
      `fancy-regex` and is unanchored — mirroring Java grok's `Matcher.find()`
      (substring match), in contrast to `parse`'s anchored `^…$`. Method literal
      must be `grok`; pattern + method operands are validated as non-null string
      literals at plan time by `GrokAdapter`. Pairs with `ITEM` downstream
      (PPL `grok` chains `ITEM(grok(...), 'field')` per named group).
    impls:
      - args:
          - { value: string, name: "input" }
          - { value: string, name: "pattern" }
          - { value: string, name: "method" }
        return: "map<string, string>"
  - name: "item"
    description: >-
      Map element accessor — extracts a value by key from a `map<string, string>`.
      Lowering target for Calcite's `SqlStdOperatorTable.ITEM` on map operands
      (PPL `parse` chains `ITEM(parse(...), 'group')` per named group). Returns
      SQL NULL when the key is absent or the map cell is null. Only the
      string-keyed / string-valued overload is declared; array indexing falls
      off this signature and surfaces a clear "no implementation" error
      before reaching DataFusion.
    impls:
      - args:
          - { value: "map<string, string>", name: "map" }
          - { value: string, name: "key" }
        return: string
  - name: regexp_replace
    description: >-
      Regex string replacement — replace every match of `pattern` in `input`
      with `replacement`. Lowering target for PPL's `replace` command on
      wildcard patterns (after `*` → regex conversion) and for the PPL
      `replace()` / `regexp_replace()` functions in `eval`. Calcite emits
      `SqlLibraryOperators.REGEXP_REPLACE_3`. datafusion-substrait resolves
      the extension name "regexp_replace" to DataFusion's native `regexp_replace`
      UDF (datafusion-functions/src/regex/regexpreplace.rs).
    impls:
      - args:
          - value: "varchar<L1>"
            name: "input"
          - value: "varchar<L2>"
            name: "pattern"
          - value: "varchar<L3>"
            name: "replacement"
        return: "varchar<L1>"
      - args:
          - value: "string"
            name: "input"
          - value: "string"
            name: "pattern"
          - value: "string"
            name: "replacement"
        return: string
      - args:
          - value: "varchar<L1>"
            name: "input"
          - value: "varchar<L2>"
            name: "pattern"
          - value: "varchar<L3>"
            name: "replacement"
          - value: "varchar<L4>"
            name: "flags"
        return: "varchar<L1>"
      - args:
          - value: "string"
            name: "input"
          - value: "string"
            name: "pattern"
          - value: "string"
            name: "replacement"
          - value: "string"
            name: "flags"
        return: string
  - name: translate
    description: >-
      Character transliteration — replace each character in `input` that appears
      in `from` with the corresponding character in `to`. Lowering target for
      PPL's `rex mode=sed` with {@code y/from/to/} transliteration syntax
      (Calcite `SqlLibraryOperators.TRANSLATE3`). datafusion-substrait resolves
      the extension name "translate" to DataFusion's native `translate` UDF
      (datafusion-functions/src/unicode/translate.rs).
    impls:
      - args:
          - value: "varchar<L1>"
            name: "input"
          - value: "varchar<L2>"
            name: "from"
          - value: "varchar<L3>"
            name: "to"
        return: "varchar<L1>"
      - args:
          - value: "string"
            name: "input"
          - value: "string"
            name: "from"
          - value: "string"
            name: "to"
        return: string
  - name: rex_extract
    description: >-
      Extract the first occurrence of a regex named or numbered capture group
      from a string (Java-Pattern-compatible regex). Lowering target for PPL's
      `rex field=f "(?<g>...)"` extract command (single-match form) — emitted
      by the SQL plugin as a custom Calcite UDF named `REX_EXTRACT`. The
      analytics-engine adapter rewrites the call to a local Calcite operator
      whose `FunctionMappings.Sig` resolves to this Substrait extension; the
      Rust UDF implementation lives at
      sandbox/plugins/analytics-backend-datafusion/rust/src/udf/rex_extract.rs.
      Returns NULL when the pattern doesn't match, the group doesn't exist, or
      either operand is NULL.
    impls:
      - args:
          - value: "varchar<L1>"
            name: "input"
          - value: "varchar<L2>"
            name: "pattern"
          - value: "varchar<L3>"
            name: "group"
        return: "varchar<L1>"
      - args:
          - value: "string"
            name: "input"
          - value: "string"
            name: "pattern"
          - value: "string"
            name: "group"
        return: string
  - name: rex_extract_multi
    description: >-
      Extract up to `max_match` occurrences of a regex named or numbered
      capture group from a string, returned as a `list<varchar>`. Lowering
      target for PPL's `rex field=f "(?<g>...)" max_match=N`. `max_match=0`
      is unbounded. The Rust UDF implementation lives at
      sandbox/plugins/analytics-backend-datafusion/rust/src/udf/rex_extract_multi.rs.
      Returns NULL (not an empty list) when no matches are found.
    impls:
      - args:
          - value: "varchar<L1>"
            name: "input"
          - value: "varchar<L2>"
            name: "pattern"
          - value: "varchar<L3>"
            name: "group"
          - value: i32
            name: "max_match"
        return: list<varchar<L1>>
      - args:
          - value: "string"
            name: "input"
          - value: "string"
            name: "pattern"
          - value: "string"
            name: "group"
          - value: i32
            name: "max_match"
        return: list<string>
  - name: rex_offset
    description: >-
      Compute the start-end offsets of every named capture group from the
      first regex match, formatted as `"name1=start1-end1&name2=start2-end2"`
      (group names sorted alphabetically). Lowering target for PPL's
      `rex field=f "(?<g>...)" offset_field=name`. The Rust UDF implementation
      lives at sandbox/plugins/analytics-backend-datafusion/rust/src/udf/rex_offset.rs.
      Returns NULL when the pattern doesn't match or has no named groups.
      The end position is inclusive (matches the SQL plugin's Java
      RexOffsetFunction: `end - 1`).
    impls:
      - args:
          - value: "varchar<L1>"
            name: "input"
          - value: "varchar<L2>"
            name: "pattern"
        return: "varchar<L1>"
      - args:
          - value: "string"
            name: "input"
          - value: "string"
            name: "pattern"
        return: string
  - name: array_length
    description: >-
      Number of elements in a list. Lowering target for PPL's `array_length()`
      function (Calcite `SqlLibraryOperators.ARRAY_LENGTH`). Needed end-to-end
      so PPL queries can size the list returned by `rex` extract-mode
      (`eval count = array_length(g)` after `rex field=f "(?<g>...)"`).
      datafusion-substrait resolves the extension name "array_length" to
      DataFusion's native `array_length` UDF.
      Single polymorphic impl over `list<any1>`: substrait's compound function
      key drops the inner parametric element type, so declaring separate
      `list<varchar<L1>>` and `list<string>` impls collapses to the same key
      `array_length:list` and trips the SimpleExtension loader's duplicate-key
      check at plugin start. The single `any1` impl matches both call sites.
    impls:
      - args:
          - value: "list<any1>"
            name: "input"
        return: i64

  # ascii(str) — Unicode code point of the first character.
  - name: "ascii"
    description: "Return the unicode code point of the first character of the input string."
    impls:
      - args:
          - { name: str, value: "varchar<L1>" }
        nullability: DECLARED_OUTPUT
        return: i32
      - args:
          - { name: str, value: "string" }
        nullability: DECLARED_OUTPUT
        return: i32

  # strpos(str, substr) — 1-based position of substr in str, 0 if not found.
  # Target of PPL's `locate` and `position` adapters.
  - name: "strpos"
    description: "Return the 1-based position of `substr` within `str`, or 0 when absent."
    impls:
      - args:
          - { name: str, value: "string" }
          - { name: substr, value: "string" }
        nullability: DECLARED_OUTPUT
        return: i32
      - args:
          - { name: str, value: "varchar<L1>" }
          - { name: substr, value: "varchar<L2>" }
        nullability: DECLARED_OUTPUT
        return: i32
      - args:
          - { name: str, value: "string" }
          - { name: substr, value: "varchar<L1>" }
        nullability: DECLARED_OUTPUT
        return: i32
      - args:
          - { name: str, value: "varchar<L1>" }
          - { name: substr, value: "string" }
        nullability: DECLARED_OUTPUT
        return: i32

  # tostring(x, format) — (hex / binary / commas / duration / duration_millis).
  - name: "tostring"
    description: "Convert a number to a string using the requested format (hex/binary/commas/duration/duration_millis)."
    impls:
      - args:
          - { name: value, value: i64 }
          - { name: format, value: string }
        nullability: DECLARED_OUTPUT
        return: string
      - args:
          - { name: value, value: fp64 }
          - { name: format, value: string }
        nullability: DECLARED_OUTPUT
        return: string

  # strftime(value, format) — render a timestamp / UNIX-seconds value as a formatted string.
  # Two impls mirror StrftimeFunctionAdapter's Rex-level normalization: numeric-like sources
  # are folded onto fp64 (UNIX-seconds branch, with millisecond auto-detect in the UDF);
  # timestamp / date sources forward verbatim and the Rust UDF's coerce_types canonicalizes
  # `Timestamp(*, *)` / `Date32` / `Date64` to `Timestamp(Microsecond, None)`.
  - name: "strftime"
    description: "Render a timestamp or UNIX seconds value using a POSIX strftime format string."
    impls:
      - args:
          - { name: value, value: fp64 }
          - { name: format, value: string }
        nullability: DECLARED_OUTPUT
        return: string
      - args:
          - { name: value, value: "precision_timestamp<P>" }
          - { name: format, value: string }
        nullability: DECLARED_OUTPUT
        return: string

  # to_char(value, format) — render a timestamp using a strftime-style format string.
  # DataFusion exposes a native `to_char` scalar that consumes strftime tokens.
  - name: "to_char"
    description: "Render a timestamp using a strftime-style format string."
    impls:
      - args:
          - { name: value, value: "precision_timestamp<P>" }
          - { name: format, value: string }
        nullability: DECLARED_OUTPUT
        return: string

  # ip_to_string(bytes) — render a 16-byte ipv6-mapped buffer as a canonical IP string.
  # Bound so IpBinaryOutputCastRewriter can rewrite engine-output `CAST(<IpType> AS VARCHAR)`
  # to `ip_to_string(<col>)` and have it serialize through this extension. The Rust impl
  # (rust/src/udf/ip_to_string.rs) detects ipv4-mapped (::ffff:a.b.c.d) and emits dotted-quad,
  # otherwise emits Ipv6Addr::to_string()'s RFC 5952 compressed form.
  - name: "ip_to_string"
    description: "Render a 16-byte ipv6-mapped buffer as a canonical IP string (engine-output cast target for ip fields)."
    impls:
      - args:
          - { name: bytes, value: binary }
        nullability: DECLARED_OUTPUT
        return: string

  # binary_to_base64(bytes) — base64-encode a binary buffer per the OpenSearch `binary`
  # field wire contract. Bound so IpBinaryOutputCastRewriter can rewrite engine-output
  # `CAST(<BinaryType> AS VARCHAR)` to `binary_to_base64(<col>)`. The Rust impl
  # (rust/src/udf/binary_to_base64.rs) uses the standard base64 alphabet.
  - name: "binary_to_base64"
    description: "Base64-encode a binary buffer per the OpenSearch binary-field wire contract (engine-output cast target for binary fields)."
    impls:
      - args:
          - { name: bytes, value: binary }
        nullability: DECLARED_OUTPUT
        return: string

  # tonumber(string, base) — parse `string` as a base-N integer
  - name: "tonumber"
    description: "Parse a string to a number in the given radix (2-36). Returns NULL on parse failure."
    impls:
      - args:
          - { name: value, value: string }
          - { name: base, value: i32 }
        nullability: DECLARED_OUTPUT
        return: fp64

  # PPL json_* UDFs — Rust implementations under rust/src/udf/<name>.rs,
  # surfaced to Calcite via JsonFunctionAdapters. All return NULL on malformed
  # input; per-function semantics are documented in the Rust module headers.
  - name: "json_array_length"
    description: "Length of a JSON array; NULL on malformed or non-array input."
    impls:
      - args: [{ value: string, name: "value" }]
        return: any1

  - name: "json_keys"
    description: "Top-level keys of a JSON object, encoded as a JSON array string; NULL on non-object input."
    impls:
      - args: [{ value: string, name: "value" }]
        return: any1

  - name: "json_extract"
    description: "Extract JSON value(s) at PPL path(s); single → stringified match, multi → JSON-array string."
    impls:
      - args: [{ value: string, name: "value" }, { value: string, name: "path" }]
        variadic: { min: 1 }
        return: string

  - name: "map_extract"
    description: >-
      Return the list of values whose key matches `key` in `value`. DataFusion's
      native `map_extract` returns a list because the underlying map permits
      duplicate keys; the analytics-engine ITEM adapter wraps every
      `map_extract` call in `array_element(..., 1)` to project back to a
      scalar. Signature uses Substrait type variables (`any1`/`any2`) so a
      single declaration covers every Calcite MAP variant — first caller is
      PPL `spath`'s JSON_EXTRACT_ALL map (`map<string, string?>`).
    impls:
      - args: [{ value: "map<any1, any2>", name: "value" }, { value: any1, name: "key" }]
        return: "list<any2>"

  - name: "json_extract_all"
    description: >-
      Flatten a JSON document into a Map<string, string?> keyed by
      dot-separated path. Objects flatten to dotted keys (`user.name`); arrays
      append `{}` (`tags{}`); duplicate logical keys merge into a Java
      `List.toString()` rendering (`[a, b, c]`); JSON nulls render as the
      literal string `"null"`. Top-level scalar / null / empty / whitespace
      input → NULL map; malformed JSON → empty map. Parity with the legacy
      v2 / Calcite `JsonExtractAllFunctionImpl`. Return type is declared as
      `any1` here so substrait's extension parser does not need a map-type
      grammar — the actual call-site RelDataType (MAP<VARCHAR, VARCHAR>) is
      what isthmus emits into the substrait IR, and the DataFusion-side UDF
      registers its own concrete return type (`Map<Utf8, Utf8>`).
    impls:
      - args: [{ value: string, name: "value" }]
        return: any1

  - name: "pattern_parser"
    description: >-
      Extract substrings from `field` using `pattern` as a wildcard template
      (e.g. `"<*>@<*>.<*>"`) and return a struct with two members: `pattern`
      (the numbered-token rewrite, e.g. `"<token1>@<token2>.<token3>"`) and
      `tokens` (a Map<string, List<string>> of label → list of extracted
      values). PPL's `patterns ... mode=label show_numbered_token=true` and
      `mode=aggregation show_numbered_token=true` flatten paths both lower
      to this UDF via `CalciteRelNodeVisitor.visitPatterns` →
      `BuiltinFunctionName.INTERNAL_PATTERN_PARSER`.

      Two operand shapes are supported via the same registered signature:
      `pattern_parser(pattern: string, field: string)` (evalField — single
      row) and `pattern_parser(pattern: string, sample_logs: List<string>)`
      (evalSamples — aggregate sample list). The Rust UDF dispatches at
      runtime on the second operand's Arrow type. The 3-arg evalAgg shape
      used by BRAIN label mode is a separate signature with its own
      AggCandidate list operand and is added when the INTERNAL_PATTERN
      aggregate / window UDF lands (next milestone).

      Return type is declared as `any1` for the same reason as
      `json_extract_all`: substrait's extension parser doesn't have a
      struct-with-fields grammar at this layer, but isthmus emits the
      concrete Calcite RelDataType (a MAP<VARCHAR, ANY>) and the DataFusion-
      side UDF binds it to the concrete Arrow struct.
    impls:
      - args:
          - { value: string, name: "pattern" }
          - { value: string, name: "field" }
        return: any1
      - args:
          - { value: string, name: "pattern" }
          - { value: "list<string>", name: "sample_logs" }
        return: any2
  - name: "pattern_parser_get_pattern"
    description: >-
      Single-field accessor for {@code pattern_parser}. Returns just the
      numbered-token pattern string (e.g. `"<token1>@<token2>.<token3>"`),
      bypassing DataFusion's substrait consumer's "Direct reference StructField
      with child is not supported" limitation on nested struct field access.
      The Rust UDF re-runs the same parse internally and returns only the
      pattern column.
    impls:
      - args:
          - { value: string, name: "pattern" }
          - { value: string, name: "field" }
        return: string?
      - args:
          - { value: string, name: "pattern" }
          - { value: "list<string>", name: "sample_logs" }
        return: string?
  - name: "pattern_parser_get_tokens"
    description: >-
      Single-field accessor for {@code pattern_parser}. Returns just the
      tokens Map<string, list<string>> of extracted variables. See
      {@code pattern_parser_get_pattern}.
    impls:
      - args:
          - { value: string, name: "pattern" }
          - { value: string, name: "field" }
        return: any1
      - args:
          - { value: string, name: "pattern" }
          - { value: "list<string>", name: "sample_logs" }
        return: any2
  - name: "json_delete"
    description: "Remove PPL-path matches from a JSON document; missing paths are no-ops."
    impls:
      - args: [{ value: string, name: "value" }, { value: string, name: "path" }]
        variadic: { min: 1 }
        return: string

  - name: "json_set"
    description: "Replace values at PPL-path matches (replace-only; missing paths are no-ops)."
    impls:
      - args: [{ value: string, name: "value" }, { value: string, name: "path" }]
        variadic: { min: 1 }
        return: string

  - name: "json_append"
    description: "Push values onto PPL-path-matched arrays; non-array / missing targets are no-ops."
    impls:
      - args: [{ value: string, name: "value" }, { value: string, name: "path" }]
        variadic: { min: 1 }
        return: string

  - name: "json_extend"
    description: "Spread JSON-array values onto PPL-path-matched arrays; scalar values fall back to append."
    impls:
      - args: [{ value: string, name: "value" }, { value: string, name: "path" }]
        variadic: { min: 1 }
        return: string

  - name: "json_valid"
    description: "TRUE if the input parses as JSON, FALSE on malformed input, NULL on NULL input (parity with legacy JsonUtils.isValidJson / Jackson readTree — empty/whitespace input is valid)."
    impls:
      - args: [{ value: string, name: "value" }]
        return: boolean

  - name: "json"
    description: "Round-trip parse a JSON string; NULL on malformed input."
    impls:
      - args: [{ value: string, name: "value" }]
        return: string?

  - name: "json_object"
    description: >-
      Build a JSON object from interleaved (key, type-tag, value) triples.
      The Java `JsonObjectAdapter` casts every operand to VARCHAR and inserts
      a per-value type-tag literal (`"n"`/`"b"`/`"j"`/`"s"`) so the Rust UDF
      can recover the original Calcite type when emitting JSON.
    impls:
      - args: [{ value: string, name: "key" }]
        variadic: { min: 1 }
        return: string?

  - name: "json_array"
    description: >-
      Build a JSON array from interleaved (type-tag, value) pairs. Same tag
      vocabulary as `json_object`; see `JsonArrayAdapter` for the rewrite shape.
    impls:
      - args: [{ value: string, name: "tag" }]
        variadic: { min: 0 }
        return: string?

  - name: "opensearch_extract"
    description: >-
      Pull a MySQL-style calendar component out of a timestamp. Returns BIGINT.
      Renamed from `extract` to avoid a name collision with substrait core's
      enum-argument `extract` (substrait-java 0.89.1 crashes on the core variant).
      Composite units (e.g. `DAY_SECOND`) follow MySQL's digit-concatenation
      semantics — see rust/src/udf/extract.rs.
    impls:
      - args:
          - { value: string, name: "unit" }
          - { value: "precision_timestamp<P>", name: "value" }
        return: i64
      - args:
          - { value: string, name: "unit" }
          - { value: "date", name: "value" }
        return: i64
      - args:
          - { value: string, name: "unit" }
          - { value: "time", name: "value" }
        return: i64
      # No `precision_time<P>` overload: substrait-java 0.89.1 can't stringify it.
      # ExtractAdapter pre-CASTs TIME(p) operands to VARCHAR to bind below.
      - args:
          - { value: string, name: "unit" }
          - { value: "string", name: "value" }
        return: i64
      - args:
          - { value: string, name: "unit" }
          - { value: "varchar<L1>", name: "value" }
        return: i64

  - name: "from_unixtime"
    description: >-
      Convert fractional UNIX seconds to TIMESTAMP. Negative values and values
      at/above MySQL's documented max yield NULL. Routes to the Rust
      `from_unixtime` UDF (rust/src/udf/from_unixtime.rs). The 2-arg
      `from_unixtime(seconds, format)` overload is deferred.
    impls:
      - args: [{ value: fp64, name: "seconds" }]
        return: precision_timestamp<6>

  - name: "maketime"
    description: >-
      Construct a TIME from (hour, minute, second). Hour and minute are rounded
      (half-away-from-zero, matching Java Math.round); second passes through
      verbatim including fractional component. Out-of-range operand yields
      NULL. Returns `Time64(Microsecond)`. Routes to the Rust `maketime` UDF.
    impls:
      - args:
          - { value: fp64, name: "hour" }
          - { value: fp64, name: "minute" }
          - { value: fp64, name: "second" }
        return: time

  - name: "makedate"
    description: >-
      Construct a DATE from (year, day_of_year). PPL MySQL quirks preserved:
      `doy <= 0` or `year < 0` → NULL; `year == 0` remaps to 2000; doy beyond
      the year's length cascades into subsequent years. Routes to the Rust
      `makedate` UDF.
    impls:
      - args:
          - { value: fp64, name: "year" }
          - { value: fp64, name: "day_of_year" }
        return: date

  - name: "date_format"
    description: >-
      Render a DATE / TIMESTAMP using a MySQL format string. Shares the MySQL
      token translator with `time_format` / `str_to_date`. Routes to the Rust
      `date_format` UDF (rust/src/udf/date_format.rs).
    impls:
      - args:
          - { value: "precision_timestamp<P>", name: "value" }
          - { value: string, name: "format" }
        return: string
      - args:
          - { value: "precision_timestamp<P>", name: "value" }
          - { value: "varchar<L>", name: "format" }
        return: string
      - args:
          - { value: "date", name: "value" }
          - { value: string, name: "format" }
        return: string
      - args:
          - { value: "date", name: "value" }
          - { value: "varchar<L>", name: "format" }
        return: string
      - args:
          - { value: "string", name: "value" }
          - { value: string, name: "format" }
        return: string
      - args:
          - { value: "varchar<L1>", name: "value" }
          - { value: "varchar<L2>", name: "format" }
        return: string

  - name: "time_format"
    description: >-
      Render a TIME / TIMESTAMP using the MySQL time-format sub-table. Date-only
      name tokens (%W / %a / %M / %b / %D / %j / %w / %U / %u / %V / %v / %X /
      %x) cause the whole render to return NULL; date-only numeric tokens emit
      MySQL's documented zero-padded literals. Routes to the Rust `time_format`
      UDF.
    impls:
      - args:
          - { value: "precision_timestamp<P>", name: "value" }
          - { value: string, name: "format" }
        return: string
      - args:
          - { value: "time", name: "value" }
          - { value: string, name: "format" }
        return: string
      - args:
          - { value: "date", name: "value" }
          - { value: string, name: "format" }
        return: string
      - args:
          - { value: "varchar<L1>", name: "value" }
          - { value: "varchar<L2>", name: "format" }
        return: string

  - name: "str_to_date"
    description: >-
      Parse a string using a MySQL format into a TIMESTAMP. Unparseable input
      yields NULL; trailing input is silently tolerated (matches PPL's
      `parseUnresolved` with `ParsePosition(0)`). Missing date parts default to
      2000-01-01; missing time parts default to 00:00:00. Routes to the Rust
      `str_to_date` UDF.
    impls:
      - args:
          - { value: string, name: "input" }
          - { value: string, name: "format" }
        return: precision_timestamp<6>
      - args:
          - { value: "varchar<L1>", name: "input" }
          - { value: "varchar<L2>", name: "format" }
        return: precision_timestamp<6>

  - name: "os_week"
    description: >-
      Compute MySQL's WEEK(date [, mode]) — modes 0/1/2/3 select Sunday/Monday
      first-day combined with simple counting / 4-day fold semantics. PPL's
      WEEK(date) and WEEK_OF_YEAR(date) both default to mode 0 (Sunday-first).
      Routes to the Rust `os_week` UDF (rust/src/udf/os_week.rs).
    impls:
      - args:
          - { value: "date", name: "value" }
        return: i32
      - args:
          - { value: "precision_timestamp<P>", name: "value" }
        return: i32
      - args:
          - { value: "string", name: "value" }
        return: i32
      - args:
          - { value: "date", name: "value" }
          - { value: "i32", name: "mode" }
        return: i32
      - args:
          - { value: "precision_timestamp<P>", name: "value" }
          - { value: "i32", name: "mode" }
        return: i32
      - args:
          - { value: "string", name: "value" }
          - { value: "i32", name: "mode" }
        return: i32

  - name: "os_yearweek"
    description: >-
      Compute MySQL's YEARWEEK(date [, mode]) — returns year * 100 + week with
      MySQL's mode and year-boundary semantics (an early-January date can roll
      into the prior year's last week). Routes to the Rust `os_yearweek` UDF
      (rust/src/udf/os_week.rs).
    impls:
      - args:
          - { value: "date", name: "value" }
        return: i32
      - args:
          - { value: "precision_timestamp<P>", name: "value" }
        return: i32
      - args:
          - { value: "string", name: "value" }
        return: i32
      - args:
          - { value: "date", name: "value" }
          - { value: "i32", name: "mode" }
        return: i32
      - args:
          - { value: "precision_timestamp<P>", name: "value" }
          - { value: "i32", name: "mode" }
        return: i32
      - args:
          - { value: "string", name: "value" }
          - { value: "i32", name: "mode" }
        return: i32

  - name: "md5"
    description: "Return the 128-bit MD5 digest of the input string as a lowercase hex string."
    impls:
      - args:
          - { name: input, value: "varchar<L1>" }
        nullability: DECLARED_OUTPUT
        return: "varchar<L1>"
      - args:
          - { name: input, value: "string" }
        nullability: DECLARED_OUTPUT
        return: string

  - name: "digest"
    description: "Compute the binary hash of the input using the given algorithm ('sha224'/'sha256'/'sha384'/'sha512' are used by the SHA2)."
    impls:
      - args:
          - { name: input, value: "string" }
          - { name: algorithm, value: "string" }
        nullability: DECLARED_OUTPUT
        return: binary
      - args:
          - { name: input, value: "varchar<L1>" }
          - { name: algorithm, value: "string" }
        nullability: DECLARED_OUTPUT
        return: binary

  - name: "encode"
    description: "Encode a binary value to a string (format 'hex' used by the SHA2)."
    impls:
      - args:
          - { name: input, value: "binary" }
          - { name: format, value: "string" }
        nullability: DECLARED_OUTPUT
        return: string

  - name: "sha1"
    description: "Return the 160-bit SHA-1 digest of the input string as a lowercase hex string."
    impls:
      - args:
          - { name: input, value: "varchar<L1>" }
        nullability: DECLARED_OUTPUT
        return: "varchar<L1>"
      - args:
          - { name: input, value: "string" }
        nullability: DECLARED_OUTPUT
        return: string

  - name: "crc32"
    description: "Return the CRC-32 checksum of the input string as a non-negative integer."
    impls:
      - args:
          - { name: input, value: "varchar<L1>" }
        nullability: DECLARED_OUTPUT
        return: i64
      - args:
          - { name: input, value: "string" }
        nullability: DECLARED_OUTPUT
        return: i64

  # conv(n, fromBase, toBase) — base conversion. Java side at ConvAdapter; Rust UDF at
  # rust/src/udf/conv.rs. Semantics: Long.toString(Long.parseLong(n, fromBase), toBase).
  # The first slot uses `any1` to accept both string and integer sources PPL emits; the
  # Rust UDF's coerce_types canonicalizes it to Utf8.
  - name: "conv"
    description: "Convert n from fromBase to toBase, returning the result as a string."
    impls:
      - args:
          - { value: "any1", name: "n" }
          - { value: "i32", name: "fromBase" }
          - { value: "i32", name: "toBase" }
        nullability: DECLARED_OUTPUT
        return: "any1"

  # span_bucket(value, span) — PPL fixed-width bucket label. Rust UDF at
  # rust/src/udf/span_bucket.rs. Takes two numerics, returns a VARCHAR label
  # like "10-20" identifying the half-open `[binStart, binEnd)` bucket that
  # `value` falls into. NOT ISO-SQL width_bucket (which returns an integer
  # bucket index); this is the OpenSearch-PPL nice-number-algorithm variant.
  #
  # `any1` on both slots matches every integer/float source PPL emits
  # (Int32/Int64/Float32/Float64) — DF's substrait consumer re-resolves the
  # Rust UDF by name and its coerce_types canonicalizes both slots to Float64.
  # Return type is `any1` to stay consistent with surrounding signatures; the
  # UDF's actual return type (Utf8) is authoritative on the Rust side.
  - name: "span_bucket"
    description: "Fixed-width numeric bucket label (PPL). See sql/core SpanBucketFunction for semantics."
    impls:
      - args:
          - { value: "any1", name: "value" }
          - { value: "any1", name: "span" }
        return: any1

  # width_bucket(value, num_bins, data_range, max_value) — PPL histogram
  # bucket label. Rust UDF at rust/src/udf/width_bucket.rs. Returns a VARCHAR
  # label via the OpenSearch nice-number magnitude-based algorithm (see
  # sql/core WidthBucketFunction). NOT ISO-SQL width_bucket (which returns an
  # integer bucket index) — semantics and signature both differ. A future
  # real ISO-SQL width_bucket binding needs its own name / enum entry.
  #
  # Distinct any-parameters per slot (`any1`/`any2`/`any3`/`any4`) so each
  # independently matches any source type without requiring all slots to
  # share the same type — PPL may emit mixed types (fp64 value, i32
  # num_bins, fp64 data_range, fp64 max_value). DF's substrait consumer
  # re-resolves by name and the UDF's coerce_types canonicalizes
  # value/range/max to Float64 and num_bins to Int64.
  - name: "width_bucket"
    description: "Histogram bucket label (PPL). See sql/core WidthBucketFunction for semantics."
    impls:
      - args:
          - { value: "any1", name: "value" }
          - { value: "any2", name: "num_bins" }
          - { value: "any3", name: "data_range" }
          - { value: "any4", name: "max_value" }
        return: any1

  # minspan_bucket(value, min_span, data_range, max_value) — PPL minimum-span
  # histogram bucket label. Rust UDF at rust/src/udf/minspan_bucket.rs. Picks
  # the larger of the data's natural order-of-magnitude width and a user-
  # supplied minimum span, returns the resulting bucket label (e.g. "10-20").
  # The `max_value` slot is unused by the algorithm but carried through for
  # parity with PPL's call shape (matches Java MinspanBucketFunction).
  - name: "minspan_bucket"
    description: "Minimum-span numeric bucket label (PPL). See sql/core MinspanBucketFunction for semantics."
    impls:
      - args:
          - { value: "any1", name: "value" }
          - { value: "any2", name: "min_span" }
          - { value: "any3", name: "data_range" }
          - { value: "any4", name: "max_value" }
        return: any1

  # range_bucket(value, data_min, data_max, start_param, end_param) — PPL
  # expansion-range histogram bucket label. Rust UDF at
  # rust/src/udf/range_bucket.rs. The start_param and end_param slots are
  # nullable sentinels for "use the observed data bound"; null in those
  # slots does NOT null-propagate the output (asymmetric null handling).
  #
  # The PPL frontend's `bin start=... end=...` command wraps data_min /
  # data_max in MIN/MAX OVER () empty-partition window aggregates. This
  # UDF is scalar and doesn't care about that wrapping; end-to-end pushdown
  # through the `bin` command additionally requires the backend to advertise
  # the window-over-empty capability.
  - name: "range_bucket"
    description: "Range-based bucket label (PPL). Expansion-only effective bounds; magnitude-based width. See sql/core RangeBucketFunction."
    impls:
      - args:
          - { value: "any1", name: "value" }
          - { value: "any2", name: "data_min" }
          - { value: "any3", name: "data_max" }
          - { value: "any4", name: "start_param" }
          - { value: "any5", name: "end_param" }
        return: any1

  # num(x) — strict numeric parse with comma-strip + leading-number-plus-unit-suffix fallback.
  - name: "num"
    description: "Parse a string to a double. Accepts comma-separated thousands; accepts a numeric value followed by a non-digit unit suffix (returning only the numeric head). Returns NULL for letter-prefixed input or when the input can't be parsed."
    impls:
      - args: [{ name: value, value: "string" }]
        nullability: DECLARED_OUTPUT
        return: fp64
      - args: [{ name: value, value: "varchar<L1>" }]
        nullability: DECLARED_OUTPUT
        return: fp64

  # auto(x) — num() semantics plus memory-unit multiplier (k/m/g → KB).
  - name: "auto"
    description: "Auto-convert: first try memory-unit parse (e.g. '1.5g' → 1 572 864 KB), then fall back to num() parsing. Returns NULL when neither path accepts the input."
    impls:
      - args: [{ name: value, value: "string" }]
        nullability: DECLARED_OUTPUT
        return: fp64
      - args: [{ name: value, value: "varchar<L1>" }]
        nullability: DECLARED_OUTPUT
        return: fp64

  # memk(x) — memory-unit conversion only.
  - name: "memk"
    description: "Parse a memory-size string (e.g. '500k', '1.5m', '2g') and return the equivalent size in kilobytes. 'k' / bare number → value as KB, 'm' → * 1024, 'g' → * 1024 * 1024. Returns NULL on unmatched input."
    impls:
      - args: [{ name: value, value: "string" }]
        nullability: DECLARED_OUTPUT
        return: fp64
      - args: [{ name: value, value: "varchar<L1>" }]
        nullability: DECLARED_OUTPUT
        return: fp64

  # rmcomma(x) — strip commas then parse; NULL if letters are present.
  - name: "rmcomma"
    description: "Strip every comma from the input and parse the result as a double. Returns NULL when the input contains any letter or can't be parsed after comma removal."
    impls:
      - args: [{ name: value, value: "string" }]
        nullability: DECLARED_OUTPUT
        return: fp64
      - args: [{ name: value, value: "varchar<L1>" }]
        nullability: DECLARED_OUTPUT
        return: fp64

  # rmunit(x) — extract the leading number token and parse.
  - name: "rmunit"
    description: "Extract the leading numeric token from the input (optional sign, digits, optional decimal, optional exponent) and parse as a double. Returns NULL when no leading number is present."
    impls:
      - args: [{ name: value, value: "string" }]
        nullability: DECLARED_OUTPUT
        return: fp64
      - args: [{ name: value, value: "varchar<L1>" }]
        nullability: DECLARED_OUTPUT
        return: fp64

  # dur2sec(x) — "[D+]HH:MM:SS" duration → total seconds.
  - name: "dur2sec"
    description: "Convert a duration string of the form [D+]HH:MM:SS to total seconds. Returns NULL on malformed input or on ranges outside {hours<24, minutes<60, seconds<60}."
    impls:
      - args: [{ name: value, value: "string" }]
        nullability: DECLARED_OUTPUT
        return: fp64
      - args: [{ name: value, value: "varchar<L1>" }]
        nullability: DECLARED_OUTPUT
        return: fp64

  # mstime(x) — "[MM:]SS.SSS" → total seconds.
  - name: "mstime"
    description: "Convert a time-of-day string of the form [MM:]SS.SSS to total seconds (double). Minute portion optional; millisecond portion optional, zero-padded to three digits. Returns NULL when seconds >= 60 or on malformed input."
    impls:
      - args: [{ name: value, value: "string" }]
        nullability: DECLARED_OUTPUT
        return: fp64
      - args: [{ name: value, value: "varchar<L1>" }]
        nullability: DECLARED_OUTPUT
        return: fp64

  # ctime(value, format) — UNIX seconds → formatted string (strftime).
  - name: "ctime"
    description: "Render a UNIX epoch (seconds) value as a formatted time string using strftime specifiers."
    impls:
      - args:
          - { name: value, value: "string" }
          - { name: format, value: "string" }
        nullability: DECLARED_OUTPUT
        return: string
      - args:
          - { name: value, value: "varchar<L1>" }
          - { name: format, value: "varchar<L2>" }
        nullability: DECLARED_OUTPUT
        return: string

  # mktime(value, format) — formatted time string → UNIX seconds (double).
  - name: "mktime"
    description: "Parse a formatted time string back to UNIX epoch seconds (double). Numeric epoch inputs pass through unchanged."
    impls:
      - args:
          - { name: value, value: "string" }
          - { name: format, value: "string" }
        nullability: DECLARED_OUTPUT
        return: fp64
      - args:
          - { name: value, value: "varchar<L1>" }
          - { name: format, value: "varchar<L2>" }
        nullability: DECLARED_OUTPUT
        return: fp64
  - name: "reduce_eval"
    description: "Evaluates opaque aggregate partial state to a sortable scalar for TopK."
    impls:
      - args:
          - name: agg_name
            value: string
          - name: state
            value: any1
        return: i64
