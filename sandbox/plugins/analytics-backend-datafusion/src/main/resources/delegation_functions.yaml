%YAML 1.2
---
urn: extension:org.opensearch:delegation_functions
scalar_functions:
  - name: delegated_predicate
    description: Placeholder for a predicate delegated to another backend. Returns TRUE at plan level; at execution time the driving backend calls into the delegation API using the annotationId.
    impls:
      - args:
          - name: annotationId
            value: i32
        return: boolean
  - name: delegation_possible
    description: Wraps a dual-viable predicate so the driving backend may opportunistically consult a peer backend at runtime (per-RG decision). Returns the value of the original predicate; the annotationId identifies the peer-side compiled query.
    impls:
      - args:
          - name: original
            value: boolean?
          - name: annotationId
            value: i32
        return: boolean
