opensearchplugin {
  description = 'Native (Rust) ObjectStore backend for the Azure repository plugin.'
  classname = 'org.opensearch.repositories.azure.native_store.AzureNativeObjectStorePlugin'
  extendedPlugins = ['repository-azure']
}

java { sourceCompatibility = JavaVersion.toVersion(25); targetCompatibility = JavaVersion.toVersion(25) }

dependencies {
  implementation project(':sandbox:libs:dataformat-native')
  compileOnly project(':plugins:repository-azure')
}

testingConventions.enabled = false
