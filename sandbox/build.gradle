import org.gradle.api.publish.plugins.PublishingPlugin
import org.opensearch.gradle.VersionProperties

/**
 * This module provides a space in OpenSearch for the community to easily experiment with new ideas and innovate.
 * Ideally, this is where an experimental features will reside before it can be promoted to the corresponding directory
 * in the project root. The sandbox module contains three subdirectories, that mirror the root libs, modules and
 * plugins directories, each with similar intention.
 *
 * All artifacts from the sandbox/libs and sandbox/modules can be included in the snapshot distributions.
 * During assembling distributions, however, we will check if the following two conditions are met, for including the
 * sandbox modules,
 *
 * 1. The distribution is a snapshot i.e. the build system property build.snapshot is set to true. We use this because,
 * it will prevent accidental inclusion of these artifacts in a release distribution.
 *
 * 2. The sandbox.enabled system property is set to true. This extra flag keeps sandbox artifacts disabled by default
 * and allows opting in only when needed.
 *
 * To build the distributions with the sandbox modules,
 *   ./gradlew assemble -Dsandbox.enabled=true
 *
 * Similarly we can publish sandbox artifacts to Maven local with
 *   ./gradlew publishToMavenLocal -Dsandbox.enabled=true
 */
def sandboxEnabled = System.getProperty("sandbox.enabled", "false") == "true"

// Patched Calcite coordinate, composed from libs.versions.toml keys.
// Pinned here once so every sandbox subproject can resolve it without
// duplicating the repo + force declaration.
def libVersions = VersionProperties.getVersions()
def patchedCalciteVersion = "${libVersions['calcite']}-opensearch-${libVersions['calcite_os_rev']}"

subprojects {
  group = 'org.opensearch.sandbox'
  ext.patchedCalciteVersion = patchedCalciteVersion

  // The patched calcite-core / calcite-linq4j live in the OpenSearch
  // snapshots Maven repo; analytics-framework advertises them as `api`,
  // so every consumer of analytics-framework needs both the repo and a
  // `force` to win over transitive vanilla calcite.
  //
  // org.opensearch.query (unified-query-*) is excluded from this remote and
  // pinned to mavenLocal in the consuming subprojects (see analytics-engine
  // and test-ppl-frontend build.gradle). The remote OpenSearch Snapshots repo
  // only republishes from sql/main, not from sql/feature/mustang-ppl-integration,
  // so its 3.7.0.0-SNAPSHOT jars trail the feature branch by however many merges.
  // Gradle's default SNAPSHOT resolution weighs the remote's explicit
  // <buildNumber>/timestamp metadata higher than mavenLocal's <localCopy>true>,
  // so the stale remote wins even when mavenLocal has a newer <lastUpdated>.
  // Excluding the group here forces gradle to fall through to mavenLocal,
  // populated by the sandbox-check workflow's pre-step
  // (publishUnifiedQueryPublicationToMavenLocal from the feature branch).
  // Drop this exclusion once the SQL feature branch merges to sql/main and
  // remote snapshots catch up.
  repositories {
    maven {
      name = 'OpenSearch Snapshots'
      url = 'https://ci.opensearch.org/ci/dbc/snapshots/maven/'
      mavenContent { excludeGroup 'org.opensearch.query' }
    }
  }

  configurations.all {
    resolutionStrategy {
      force "org.apache.calcite:calcite-core:${patchedCalciteVersion}"
      force "org.apache.calcite:calcite-linq4j:${patchedCalciteVersion}"
    }
  }

  if (sandboxEnabled == false) {
    afterEvaluate {
      tasks.configureEach { task ->
        if (
          task.group == PublishingPlugin.PUBLISH_TASK_GROUP
            || task.name.startsWith('generatePomFileFor')
            || task.name.startsWith('generateMetadataFileFor')
            || task.name == 'validatePom'
            || (task.name.startsWith('validate') && task.name.endsWith('Pom'))
        ) {
          task.enabled = false
          task.setDependsOn([])
          task.onlyIf { false }
        }
      }
    }
  }
}
