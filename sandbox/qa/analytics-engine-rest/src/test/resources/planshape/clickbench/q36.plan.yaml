# Derived-expression group keys: all 3 arithmetic (ClientIP-N) pushed into DataSourceExec scan.
# 4-key hash repartition with functionally-dependent keys (all derived from ClientIP).
# Planner does NOT optimize correlated keys away — still repartitions on all 4.
query: q36
ppl_file: q36.ppl
applies: [prod2s, prod1s]
plans:
  prod2s:
    post_cbo: |
      OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(c=[$4], ClientIP=[$0], ClientIP - 1=[$1], ClientIP - 2=[$2], ClientIP - 3=[$3], viableBackends=[[datafusion]])
            OpenSearchAggregate(group=[{0, 1, 2, 3}], c=[SUM($4)], mode=[FINAL], viableBackends=[[datafusion]])
              OpenSearchExchangeReducer(viableBackends=[[datafusion]], exchange=[ExchangeInfo[distributionType=SINGLETON, partitionKeyIndices=[]]])
                OpenSearchSort(sort0=[$4], dir0=[DESC-nulls-last], fetch=[30], viableBackends=[[datafusion]])
                  OpenSearchAggregate(group=[{0, 1, 2, 3}], c=[COUNT()], mode=[PARTIAL], viableBackends=[[datafusion]])
                    OpenSearchProject(ClientIP=[$6], ClientIP - 1=[ANNOTATED_PROJECT_EXPR(id=0, backends=[datafusion], -($6, 1))], ClientIP - 2=[ANNOTATED_PROJECT_EXPR(id=1, backends=[datafusion], -($6, 2))], ClientIP - 3=[ANNOTATED_PROJECT_EXPR(id=2, backends=[datafusion], -($6, 3))], viableBackends=[[datafusion]])
                      OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    fragment: |
      [SHARD_FRAGMENT chosen_backend=datafusion tree_shape=NONE]
      OpenSearchSort(sort0=[$4], dir0=[DESC-nulls-last], fetch=[30], viableBackends=[[datafusion]])
        OpenSearchAggregate(group=[{0, 1, 2, 3}], c=[COUNT()], mode=[PARTIAL], viableBackends=[[datafusion]])
          OpenSearchProject(ClientIP=[$6], ClientIP - 1=[ANNOTATED_PROJECT_EXPR(id=0, backends=[datafusion], -($6, 1))], ClientIP - 2=[ANNOTATED_PROJECT_EXPR(id=1, backends=[datafusion], -($6, 2))], ClientIP - 3=[ANNOTATED_PROJECT_EXPR(id=2, backends=[datafusion], -($6, 3))], viableBackends=[[datafusion]])
            OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
      [COORDINATOR_REDUCE chosen_backend=datafusion tree_shape=NONE]
      OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(c=[$4], ClientIP=[$0], ClientIP - 1=[$1], ClientIP - 2=[$2], ClientIP - 3=[$3], viableBackends=[[datafusion]])
            OpenSearchAggregate(group=[{0, 1, 2, 3}], c=[SUM($4)], mode=[FINAL], viableBackends=[[datafusion]])
              OpenSearchExchangeReducer(viableBackends=[[datafusion]], exchange=[ExchangeInfo[distributionType=SINGLETON, partitionKeyIndices=[]]])
                OpenSearchStageInputScan(childStageId=[0], viableBackends=[[datafusion]])
    shard_physical: |
      ProjectionExec: expr=[ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int32(1)@1 as ClientIP - 1, <scrubbed>.ClientIP - Int32(2)@2 as ClientIP - 2, <scrubbed>.ClientIP - Int32(3)@3 as ClientIP - 3, count(Int64(1))[count]@4 as c]
        SortPreservingMergeExec: [count(Int64(1))@4 DESC NULLS LAST], fetch=30
          SortExec: TopK(fetch=30), expr=[count(Int64(1))@4 DESC NULLS LAST], preserve_partitioning=[true]
            AggregateExec: mode=Partial, gby=[ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int32(1)@1 as <scrubbed>.ClientIP - Int32(1), <scrubbed>.ClientIP - Int32(2)@2 as <scrubbed>.ClientIP - Int32(2), <scrubbed>.ClientIP - Int32(3)@3 as <scrubbed>.ClientIP - Int32(3)], aggr=[count(Int64(1))]
              DataSourceExec: file_groups={<scrubbed>}, projection=[ClientIP, ClientIP@79 - 1 as <scrubbed>.ClientIP - Int32(1), ClientIP@79 - 2 as <scrubbed>.ClientIP - Int32(2), ClientIP@79 - 3 as <scrubbed>.ClientIP - Int32(3)], file_type=parquet
    coord_physical: |
      ProjectionExec: expr=[sum(input-0.c)@0 as c, ClientIP@1 as ClientIP, ClientIP - 1@2 as ClientIP - 1, ClientIP - 2@3 as ClientIP - 2, ClientIP - 3@4 as ClientIP - 3]
        SortPreservingMergeExec: [sum(input-0.c)@0 DESC NULLS LAST], fetch=10
          SortExec: TopK(fetch=10), expr=[sum(input-0.c)@0 DESC NULLS LAST], preserve_partitioning=[true]
            ProjectionExec: expr=[sum(input-0.c)@4 as sum(input-0.c), ClientIP@0 as ClientIP, ClientIP - 1@1 as ClientIP - 1, ClientIP - 2@2 as ClientIP - 2, ClientIP - 3@3 as ClientIP - 3]
              AggregateExec: mode=FinalPartitioned, gby=[ClientIP@0 as ClientIP, ClientIP - 1@1 as ClientIP - 1, ClientIP - 2@2 as ClientIP - 2, ClientIP - 3@3 as ClientIP - 3], aggr=[sum(input-0.c)]
                RepartitionExec: partitioning=Hash([ClientIP@0, ClientIP - 1@1, ClientIP - 2@2, ClientIP - 3@3], 4), input_partitions=4
                  AggregateExec: mode=Partial, gby=[ClientIP@0 as ClientIP, ClientIP - 1@1 as ClientIP - 1, ClientIP - 2@2 as ClientIP - 2, ClientIP - 3@3 as ClientIP - 3], aggr=[sum(input-0.c)]
                    RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
                      StreamingTableExec: partition_sizes=1, projection=[ClientIP, ClientIP - 1, ClientIP - 2, ClientIP - 3, c]
  prod1s:
    post_cbo: |
      OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(c=[$4], ClientIP=[$0], ClientIP - 1=[$1], ClientIP - 2=[$2], ClientIP - 3=[$3], viableBackends=[[datafusion]])
            OpenSearchAggregate(group=[{0, 1, 2, 3}], c=[COUNT()], mode=[SINGLE], viableBackends=[[datafusion]])
              OpenSearchProject(ClientIP=[$6], ClientIP - 1=[ANNOTATED_PROJECT_EXPR(id=0, backends=[datafusion], -($6, 1))], ClientIP - 2=[ANNOTATED_PROJECT_EXPR(id=1, backends=[datafusion], -($6, 2))], ClientIP - 3=[ANNOTATED_PROJECT_EXPR(id=2, backends=[datafusion], -($6, 3))], viableBackends=[[datafusion]])
                OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    fragment: |
      [SHARD_FRAGMENT chosen_backend=datafusion tree_shape=NONE]
      OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(c=[$4], ClientIP=[$0], ClientIP - 1=[$1], ClientIP - 2=[$2], ClientIP - 3=[$3], viableBackends=[[datafusion]])
            OpenSearchAggregate(group=[{0, 1, 2, 3}], c=[COUNT()], mode=[SINGLE], viableBackends=[[datafusion]])
              OpenSearchProject(ClientIP=[$6], ClientIP - 1=[ANNOTATED_PROJECT_EXPR(id=0, backends=[datafusion], -($6, 1))], ClientIP - 2=[ANNOTATED_PROJECT_EXPR(id=1, backends=[datafusion], -($6, 2))], ClientIP - 3=[ANNOTATED_PROJECT_EXPR(id=2, backends=[datafusion], -($6, 3))], viableBackends=[[datafusion]])
                OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    shard_physical_1seg: |
      ProjectionExec: expr=[count(Int64(1))@0 as c, ClientIP@1 as ClientIP, <scrubbed>.ClientIP - Int32(1)@2 as ClientIP - 1, <scrubbed>.ClientIP - Int32(2)@3 as ClientIP - 2, <scrubbed>.ClientIP - Int32(3)@4 as ClientIP - 3]
        SortPreservingMergeExec: [count(Int64(1))@0 DESC NULLS LAST], fetch=10
          SortExec: TopK(fetch=10), expr=[count(Int64(1))@0 DESC NULLS LAST], preserve_partitioning=[true]
            ProjectionExec: expr=[count(Int64(1))@4 as count(Int64(1)), ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int32(1)@1 as <scrubbed>.ClientIP - Int32(1), <scrubbed>.ClientIP - Int32(2)@2 as <scrubbed>.ClientIP - Int32(2), <scrubbed>.ClientIP - Int32(3)@3 as <scrubbed>.ClientIP - Int32(3)]
              AggregateExec: mode=FinalPartitioned, gby=[ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int32(1)@1 as <scrubbed>.ClientIP - Int32(1), <scrubbed>.ClientIP - Int32(2)@2 as <scrubbed>.ClientIP - Int32(2), <scrubbed>.ClientIP - Int32(3)@3 as <scrubbed>.ClientIP - Int32(3)], aggr=[count(Int64(1))]
                RepartitionExec: partitioning=Hash([ClientIP@0, <scrubbed>.ClientIP - Int32(1)@1, <scrubbed>.ClientIP - Int32(2)@2, <scrubbed>.ClientIP - Int32(3)@3], 4), input_partitions=1
                  AggregateExec: mode=Partial, gby=[ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int32(1)@1 as <scrubbed>.ClientIP - Int32(1), <scrubbed>.ClientIP - Int32(2)@2 as <scrubbed>.ClientIP - Int32(2), <scrubbed>.ClientIP - Int32(3)@3 as <scrubbed>.ClientIP - Int32(3)], aggr=[count(Int64(1))]
                    DataSourceExec: file_groups={<scrubbed>}, projection=[ClientIP, ClientIP@79 - 1 as <scrubbed>.ClientIP - Int32(1), ClientIP@79 - 2 as <scrubbed>.ClientIP - Int32(2), ClientIP@79 - 3 as <scrubbed>.ClientIP - Int32(3)], file_type=parquet
    shard_physical_nseg: |
      ProjectionExec: expr=[count(Int64(1))@0 as c, ClientIP@1 as ClientIP, <scrubbed>.ClientIP - Int32(1)@2 as ClientIP - 1, <scrubbed>.ClientIP - Int32(2)@3 as ClientIP - 2, <scrubbed>.ClientIP - Int32(3)@4 as ClientIP - 3]
        SortPreservingMergeExec: [count(Int64(1))@0 DESC NULLS LAST], fetch=10
          SortExec: TopK(fetch=10), expr=[count(Int64(1))@0 DESC NULLS LAST], preserve_partitioning=[true]
            ProjectionExec: expr=[count(Int64(1))@4 as count(Int64(1)), ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int32(1)@1 as <scrubbed>.ClientIP - Int32(1), <scrubbed>.ClientIP - Int32(2)@2 as <scrubbed>.ClientIP - Int32(2), <scrubbed>.ClientIP - Int32(3)@3 as <scrubbed>.ClientIP - Int32(3)]
              AggregateExec: mode=FinalPartitioned, gby=[ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int32(1)@1 as <scrubbed>.ClientIP - Int32(1), <scrubbed>.ClientIP - Int32(2)@2 as <scrubbed>.ClientIP - Int32(2), <scrubbed>.ClientIP - Int32(3)@3 as <scrubbed>.ClientIP - Int32(3)], aggr=[count(Int64(1))]
                RepartitionExec: partitioning=Hash([ClientIP@0, <scrubbed>.ClientIP - Int32(1)@1, <scrubbed>.ClientIP - Int32(2)@2, <scrubbed>.ClientIP - Int32(3)@3], 4), input_partitions=2
                  AggregateExec: mode=Partial, gby=[ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int32(1)@1 as <scrubbed>.ClientIP - Int32(1), <scrubbed>.ClientIP - Int32(2)@2 as <scrubbed>.ClientIP - Int32(2), <scrubbed>.ClientIP - Int32(3)@3 as <scrubbed>.ClientIP - Int32(3)], aggr=[count(Int64(1))]
                    DataSourceExec: file_groups={<scrubbed>}, projection=[ClientIP, ClientIP@79 - 1 as <scrubbed>.ClientIP - Int32(1), ClientIP@79 - 2 as <scrubbed>.ClientIP - Int32(2), ClientIP@79 - 3 as <scrubbed>.ClientIP - Int32(3)], file_type=parquet
