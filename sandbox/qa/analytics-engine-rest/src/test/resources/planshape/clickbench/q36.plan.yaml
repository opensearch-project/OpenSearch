# Derived-expression group keys: arithmetic (ClientIP-N) pushed into DataSourceExec.
# 4-key hash repartition with functionally-dependent keys (all from ClientIP).
query: q36
ppl_file: q36.ppl
applies: [prod2s, prod1s]
plans:
  prod2s:
    post_cbo: |
      OpenSearchSort(sort0=[$0], sort1=[$1], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], sort1=[$1], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(c=[$4], ClientIP=[$0], ClientIP - 1=[$1], ClientIP - 2=[$2], ClientIP - 3=[$3], viableBackends=[[datafusion]])
            OpenSearchAggregate(group=[{0, 1, 2, 3}], c=[SUM($4)], mode=[FINAL], viableBackends=[[datafusion]])
              OpenSearchExchangeReducer(viableBackends=[[datafusion]], exchange=[ExchangeInfo[distributionType=SINGLETON, partitionKeyIndices=[]]])
                OpenSearchSort(sort0=[$4], sort1=[$0], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[30], viableBackends=[[datafusion]])
                  OpenSearchAggregate(group=[{0, 1, 2, 3}], c=[COUNT()], mode=[PARTIAL], viableBackends=[[datafusion]])
                    OpenSearchProject(ClientIP=[$6], ClientIP - 1=[ANNOTATED_PROJECT_EXPR(id=1, backends=[datafusion], -(ANNOTATED_PROJECT_EXPR(id=0, backends=[datafusion], CAST($6):BIGINT), 1))], ClientIP - 2=[ANNOTATED_PROJECT_EXPR(id=3, backends=[datafusion], -(ANNOTATED_PROJECT_EXPR(id=2, backends=[datafusion], CAST($6):BIGINT), 2))], ClientIP - 3=[ANNOTATED_PROJECT_EXPR(id=5, backends=[datafusion], -(ANNOTATED_PROJECT_EXPR(id=4, backends=[datafusion], CAST($6):BIGINT), 3))], viableBackends=[[datafusion]])
                      OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    fragment: |
      [SHARD_FRAGMENT chosen_backend=datafusion tree_shape=NONE]
      OpenSearchSort(sort0=[$4], sort1=[$0], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[30], viableBackends=[[datafusion]])
        OpenSearchAggregate(group=[{0, 1, 2, 3}], c=[COUNT()], mode=[PARTIAL], viableBackends=[[datafusion]])
          OpenSearchProject(ClientIP=[$6], ClientIP - 1=[ANNOTATED_PROJECT_EXPR(id=1, backends=[datafusion], -(ANNOTATED_PROJECT_EXPR(id=0, backends=[datafusion], CAST($6):BIGINT), 1))], ClientIP - 2=[ANNOTATED_PROJECT_EXPR(id=3, backends=[datafusion], -(ANNOTATED_PROJECT_EXPR(id=2, backends=[datafusion], CAST($6):BIGINT), 2))], ClientIP - 3=[ANNOTATED_PROJECT_EXPR(id=5, backends=[datafusion], -(ANNOTATED_PROJECT_EXPR(id=4, backends=[datafusion], CAST($6):BIGINT), 3))], viableBackends=[[datafusion]])
            OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
      [COORDINATOR_REDUCE chosen_backend=datafusion tree_shape=NONE]
      OpenSearchSort(sort0=[$0], sort1=[$1], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], sort1=[$1], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(c=[$4], ClientIP=[$0], ClientIP - 1=[$1], ClientIP - 2=[$2], ClientIP - 3=[$3], viableBackends=[[datafusion]])
            OpenSearchAggregate(group=[{0, 1, 2, 3}], c=[SUM($4)], mode=[FINAL], viableBackends=[[datafusion]])
              OpenSearchExchangeReducer(viableBackends=[[datafusion]], exchange=[ExchangeInfo[distributionType=SINGLETON, partitionKeyIndices=[]]])
                OpenSearchStageInputScan(childStageId=[0], viableBackends=[[datafusion]])
    shard_physical_1seg: |
      ProjectionExec: expr=[ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int64(1)@1 as ClientIP - 1, <scrubbed>.ClientIP - Int64(2)@2 as ClientIP - 2, <scrubbed>.ClientIP - Int64(3)@3 as ClientIP - 3, count(Int64(1))[count]@4 as c]
        SortPreservingMergeExec: [count(Int64(1))@4 DESC NULLS LAST, ClientIP@0 ASC], fetch=30
          SortExec: TopK(fetch=30), expr=[count(Int64(1))@4 DESC NULLS LAST, ClientIP@0 ASC], preserve_partitioning=[true]
            AggregateExec: mode=PartialReduce, gby=[ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int64(1)@1 as <scrubbed>.ClientIP - Int64(1), <scrubbed>.ClientIP - Int64(2)@2 as <scrubbed>.ClientIP - Int64(2), <scrubbed>.ClientIP - Int64(3)@3 as <scrubbed>.ClientIP - Int64(3)], aggr=[count(Int64(1))]
              RepartitionExec: partitioning=Hash([ClientIP@0, <scrubbed>.ClientIP - Int64(1)@1, <scrubbed>.ClientIP - Int64(2)@2, <scrubbed>.ClientIP - Int64(3)@3], 4), input_partitions=1
                AggregateExec: mode=Partial, gby=[ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int64(1)@1 as <scrubbed>.ClientIP - Int64(1), <scrubbed>.ClientIP - Int64(2)@2 as <scrubbed>.ClientIP - Int64(2), <scrubbed>.ClientIP - Int64(3)@3 as <scrubbed>.ClientIP - Int64(3)], aggr=[count(Int64(1))]
                  DataSourceExec: file_groups={<scrubbed>}, projection=[ClientIP, CAST(ClientIP@79 AS Int64) - 1 as <scrubbed>.ClientIP - Int64(1), CAST(ClientIP@79 AS Int64) - 2 as <scrubbed>.ClientIP - Int64(2), CAST(ClientIP@79 AS Int64) - 3 as <scrubbed>.ClientIP - Int64(3)], file_type=parquet
    shard_physical_nseg: |
      ProjectionExec: expr=[ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int64(1)@1 as ClientIP - 1, <scrubbed>.ClientIP - Int64(2)@2 as ClientIP - 2, <scrubbed>.ClientIP - Int64(3)@3 as ClientIP - 3, count(Int64(1))[count]@4 as c]
        SortPreservingMergeExec: [count(Int64(1))@4 DESC NULLS LAST, ClientIP@0 ASC], fetch=30
          SortExec: TopK(fetch=30), expr=[count(Int64(1))@4 DESC NULLS LAST, ClientIP@0 ASC], preserve_partitioning=[true]
            AggregateExec: mode=PartialReduce, gby=[ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int64(1)@1 as <scrubbed>.ClientIP - Int64(1), <scrubbed>.ClientIP - Int64(2)@2 as <scrubbed>.ClientIP - Int64(2), <scrubbed>.ClientIP - Int64(3)@3 as <scrubbed>.ClientIP - Int64(3)], aggr=[count(Int64(1))]
              RepartitionExec: partitioning=Hash([ClientIP@0, <scrubbed>.ClientIP - Int64(1)@1, <scrubbed>.ClientIP - Int64(2)@2, <scrubbed>.ClientIP - Int64(3)@3], 4), input_partitions=2
                AggregateExec: mode=Partial, gby=[ClientIP@0 as ClientIP, <scrubbed>.ClientIP - Int64(1)@1 as <scrubbed>.ClientIP - Int64(1), <scrubbed>.ClientIP - Int64(2)@2 as <scrubbed>.ClientIP - Int64(2), <scrubbed>.ClientIP - Int64(3)@3 as <scrubbed>.ClientIP - Int64(3)], aggr=[count(Int64(1))]
                  DataSourceExec: file_groups={<scrubbed>}, projection=[ClientIP, CAST(ClientIP@79 AS Int64) - 1 as <scrubbed>.ClientIP - Int64(1), CAST(ClientIP@79 AS Int64) - 2 as <scrubbed>.ClientIP - Int64(2), CAST(ClientIP@79 AS Int64) - 3 as <scrubbed>.ClientIP - Int64(3)], file_type=parquet
    coord_physical: |
      ProjectionExec: expr=[sum(input-0.c)@0 as c, ClientIP@1 as ClientIP, ClientIP - 1@2 as ClientIP - 1, ClientIP - 2@3 as ClientIP - 2, ClientIP - 3@4 as ClientIP - 3]
        SortPreservingMergeExec: [sum(input-0.c)@0 DESC NULLS LAST, ClientIP@1 ASC], fetch=10
          SortExec: TopK(fetch=10), expr=[sum(input-0.c)@0 DESC NULLS LAST, ClientIP@1 ASC], preserve_partitioning=[true]
            ProjectionExec: expr=[sum(input-0.c)@4 as sum(input-0.c), ClientIP@0 as ClientIP, ClientIP - 1@1 as ClientIP - 1, ClientIP - 2@2 as ClientIP - 2, ClientIP - 3@3 as ClientIP - 3]
              AggregateExec: mode=FinalPartitioned, gby=[ClientIP@0 as ClientIP, ClientIP - 1@1 as ClientIP - 1, ClientIP - 2@2 as ClientIP - 2, ClientIP - 3@3 as ClientIP - 3], aggr=[sum(input-0.c)]
                RepartitionExec: partitioning=Hash([ClientIP@0, ClientIP - 1@1, ClientIP - 2@2, ClientIP - 3@3], 4), input_partitions=4
                  AggregateExec: mode=Partial, gby=[ClientIP@0 as ClientIP, ClientIP - 1@1 as ClientIP - 1, ClientIP - 2@2 as ClientIP - 2, ClientIP - 3@3 as ClientIP - 3], aggr=[sum(input-0.c)]
                    RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
                      StreamingTableExec: partition_sizes=1, projection=[ClientIP, ClientIP - 1, ClientIP - 2, ClientIP - 3, c]
