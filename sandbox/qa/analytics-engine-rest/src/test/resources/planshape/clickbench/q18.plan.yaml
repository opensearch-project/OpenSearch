# No sort → no shard-side TopK: head without sort is an arbitrary limit, not TopK.
# Shard sends ALL partial groups (no pruning possible without sort direction).
# Coordinator applies CoalescePartitionsExec: fetch=10 (arbitrary row selection).
query: q18
ppl_file: q18.ppl
applies: [prod2s, prod1s]
plans:
  prod2s:
    post_cbo: |
      OpenSearchSort(fetch=[10], viableBackends=[[datafusion]])
        OpenSearchProject(count()=[$2], UserID=[$0], SearchPhrase=[$1], viableBackends=[[lucene, datafusion]])
          OpenSearchAggregate(group=[{0, 1}], count()=[SUM($2)], mode=[FINAL], viableBackends=[[lucene, datafusion]])
            OpenSearchExchangeReducer(viableBackends=[[datafusion]], exchange=[ExchangeInfo[distributionType=SINGLETON, partitionKeyIndices=[]]])
              OpenSearchAggregate(group=[{0, 1}], count()=[COUNT()], mode=[PARTIAL], viableBackends=[[lucene, datafusion]])
                OpenSearchProject(UserID=[$97], SearchPhrase=[$74], viableBackends=[[lucene, datafusion]])
                  OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    fragment: |
      [SHARD_FRAGMENT chosen_backend=datafusion tree_shape=NONE]
      OpenSearchAggregate(group=[{0, 1}], count()=[COUNT()], mode=[PARTIAL], viableBackends=[[lucene, datafusion]])
        OpenSearchProject(UserID=[$97], SearchPhrase=[$74], viableBackends=[[lucene, datafusion]])
          OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
      [COORDINATOR_REDUCE chosen_backend=datafusion tree_shape=NONE]
      OpenSearchSort(fetch=[10], viableBackends=[[datafusion]])
        OpenSearchProject(count()=[$2], UserID=[$0], SearchPhrase=[$1], viableBackends=[[lucene, datafusion]])
          OpenSearchAggregate(group=[{0, 1}], count()=[SUM($2)], mode=[FINAL], viableBackends=[[lucene, datafusion]])
            OpenSearchExchangeReducer(viableBackends=[[datafusion]], exchange=[ExchangeInfo[distributionType=SINGLETON, partitionKeyIndices=[]]])
              OpenSearchStageInputScan(childStageId=[0], viableBackends=[[datafusion]])
    shard_physical: |
      AggregateExec: mode=Partial, gby=[UserID@0 as UserID, SearchPhrase@1 as SearchPhrase], aggr=[count(1) as count()]
        DataSourceExec: file_groups={<scrubbed>}, projection=[UserID, SearchPhrase], file_type=parquet
    coord_physical: |
      ProjectionExec: expr=[sum(input-0.count())@2 as count(), UserID@0 as UserID, SearchPhrase@1 as SearchPhrase]
        CoalescePartitionsExec: fetch=10
          AggregateExec: mode=FinalPartitioned, gby=[UserID@0 as UserID, SearchPhrase@1 as SearchPhrase], aggr=[sum(input-0.count())]
            RepartitionExec: partitioning=Hash([UserID@0, SearchPhrase@1], 4), input_partitions=4
              AggregateExec: mode=Partial, gby=[UserID@0 as UserID, SearchPhrase@1 as SearchPhrase], aggr=[sum(input-0.count())]
                RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
                  StreamingTableExec: partition_sizes=1, projection=[UserID, SearchPhrase, count()]
  prod1s:
    post_cbo: |
      OpenSearchSort(fetch=[10], viableBackends=[[datafusion]])
        OpenSearchProject(count()=[$2], UserID=[$0], SearchPhrase=[$1], viableBackends=[[lucene, datafusion]])
          OpenSearchAggregate(group=[{0, 1}], count()=[COUNT()], mode=[SINGLE], viableBackends=[[lucene, datafusion]])
            OpenSearchProject(UserID=[$97], SearchPhrase=[$74], viableBackends=[[lucene, datafusion]])
              OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    fragment: |
      [SHARD_FRAGMENT chosen_backend=datafusion tree_shape=NONE]
      OpenSearchSort(fetch=[10], viableBackends=[[datafusion]])
        OpenSearchProject(count()=[$2], UserID=[$0], SearchPhrase=[$1], viableBackends=[[lucene, datafusion]])
          OpenSearchAggregate(group=[{0, 1}], count()=[COUNT()], mode=[SINGLE], viableBackends=[[lucene, datafusion]])
            OpenSearchProject(UserID=[$97], SearchPhrase=[$74], viableBackends=[[lucene, datafusion]])
              OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    shard_physical_1seg: |
      ProjectionExec: expr=[count(Int64(1))@2 as count(), UserID@0 as UserID, SearchPhrase@1 as SearchPhrase]
        CoalescePartitionsExec: fetch=10
          AggregateExec: mode=FinalPartitioned, gby=[UserID@0 as UserID, SearchPhrase@1 as SearchPhrase], aggr=[count(Int64(1))]
            RepartitionExec: partitioning=Hash([UserID@0, SearchPhrase@1], 4), input_partitions=1
              AggregateExec: mode=Partial, gby=[UserID@0 as UserID, SearchPhrase@1 as SearchPhrase], aggr=[count(Int64(1))]
                DataSourceExec: file_groups={<scrubbed>}, projection=[UserID, SearchPhrase], file_type=parquet
    shard_physical_nseg: |
      ProjectionExec: expr=[count(Int64(1))@2 as count(), UserID@0 as UserID, SearchPhrase@1 as SearchPhrase]
        CoalescePartitionsExec: fetch=10
          LocalLimitExec: fetch=10
            AggregateExec: mode=FinalPartitioned, gby=[UserID@0 as UserID, SearchPhrase@1 as SearchPhrase], aggr=[count(Int64(1))]
              RepartitionExec: partitioning=Hash([UserID@0, SearchPhrase@1], 4), input_partitions=2
                AggregateExec: mode=Partial, gby=[UserID@0 as UserID, SearchPhrase@1 as SearchPhrase], aggr=[count(Int64(1))]
                  DataSourceExec: file_groups={<scrubbed>}, projection=[UserID, SearchPhrase], file_type=parquet
