      OpenSearchProject(SearchPhrase=[$74], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$16], sort1=[$74], dir0=[ASC-nulls-first], dir1=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
