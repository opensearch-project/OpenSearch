# Grouped count by SearchPhrase (keyword) with != '' filter and TopK (3x fetch).
# != blocked from lucene (production blocklist); parquet DataSourceExec with predicate pushdown.
query: q13
ppl_file: q13.ppl
applies: [prod2s, prod1s]
plans:
  prod2s:
    post_cbo: |
      OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(c=[$1], SearchPhrase=[$0], viableBackends=[[lucene, datafusion]])
            OpenSearchAggregate(group=[{0}], c=[SUM($1)], mode=[FINAL], viableBackends=[[lucene, datafusion]])
              OpenSearchExchangeReducer(viableBackends=[[datafusion]], exchange=[ExchangeInfo[distributionType=SINGLETON, partitionKeyIndices=[], partitionCount=0]])
                OpenSearchSort(sort0=[$1], dir0=[DESC-nulls-last], fetch=[30], viableBackends=[[lucene, datafusion]])
                  OpenSearchAggregate(group=[{0}], c=[COUNT()], mode=[PARTIAL], viableBackends=[[lucene, datafusion]])
                    OpenSearchProject(SearchPhrase=[$74], viableBackends=[[lucene, datafusion]])
                      OpenSearchFilter(condition=[ANNOTATED_PREDICATE(id=0, backends=[lucene, datafusion], <>($74, ''))], viableBackends=[[lucene, datafusion]])
                        OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    fragment: |
      [SHARD_FRAGMENT chosen_backend=datafusion tree_shape=CONJUNCTIVE]
      OpenSearchSort(sort0=[$1], dir0=[DESC-nulls-last], fetch=[30], viableBackends=[[lucene, datafusion]])
        OpenSearchAggregate(group=[{0}], c=[COUNT()], mode=[PARTIAL], viableBackends=[[lucene, datafusion]])
          OpenSearchProject(SearchPhrase=[$74], viableBackends=[[lucene, datafusion]])
            OpenSearchFilter(condition=[ANNOTATED_PREDICATE(id=0, backends=[lucene, datafusion], <>($74, ''))], viableBackends=[[lucene, datafusion]])
              OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
      [COORDINATOR_REDUCE chosen_backend=datafusion tree_shape=NONE]
      OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(c=[$1], SearchPhrase=[$0], viableBackends=[[lucene, datafusion]])
            OpenSearchAggregate(group=[{0}], c=[SUM($1)], mode=[FINAL], viableBackends=[[lucene, datafusion]])
              OpenSearchExchangeReducer(viableBackends=[[datafusion]], exchange=[ExchangeInfo[distributionType=SINGLETON, partitionKeyIndices=[], partitionCount=0]])
                OpenSearchStageInputScan(childStageId=[0], viableBackends=[[datafusion]])
    shard_physical_1seg: |
      ProjectionExec: expr=[SearchPhrase@0 as SearchPhrase, count(Int64(1))[count]@1 as c]
        SortPreservingMergeExec: [count(Int64(1))@1 DESC NULLS LAST], fetch=30
          SortExec: TopK(fetch=30), expr=[count(Int64(1))@1 DESC NULLS LAST], preserve_partitioning=[true]
            AggregateExec: mode=Partial, gby=[SearchPhrase@0 as SearchPhrase], aggr=[count(Int64(1))]
              RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
                QueryShardExec: partitions=1, segments=1, ordering=unsorted
    shard_physical_nseg: |
      ProjectionExec: expr=[SearchPhrase@0 as SearchPhrase, count(Int64(1))[count]@1 as c]
        SortPreservingMergeExec: [count(Int64(1))@1 DESC NULLS LAST], fetch=30
          SortExec: TopK(fetch=30), expr=[count(Int64(1))@1 DESC NULLS LAST], preserve_partitioning=[true]
            AggregateExec: mode=Partial, gby=[SearchPhrase@0 as SearchPhrase], aggr=[count(Int64(1))]
              RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=2
                QueryShardExec: partitions=2, segments=2, ordering=unsorted
    coord_physical: |
      ProjectionExec: expr=[sum(input-0.c)@0 as c, SearchPhrase@1 as SearchPhrase]
        SortPreservingMergeExec: [sum(input-0.c)@0 DESC NULLS LAST], fetch=10
          SortExec: TopK(fetch=10), expr=[sum(input-0.c)@0 DESC NULLS LAST], preserve_partitioning=[true]
            ProjectionExec: expr=[sum(input-0.c)@1 as sum(input-0.c), SearchPhrase@0 as SearchPhrase]
              AggregateExec: mode=FinalPartitioned, gby=[SearchPhrase@0 as SearchPhrase], aggr=[sum(input-0.c)]
                RepartitionExec: partitioning=Hash([SearchPhrase@0], 4), input_partitions=4
                  AggregateExec: mode=Partial, gby=[SearchPhrase@0 as SearchPhrase], aggr=[sum(input-0.c)]
                    RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
                      StreamingTableExec: partition_sizes=1, projection=[SearchPhrase, c]
  prod1s:
    post_cbo: |
      OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(c=[$1], SearchPhrase=[$0], viableBackends=[[lucene, datafusion]])
            OpenSearchAggregate(group=[{0}], c=[COUNT()], mode=[SINGLE], viableBackends=[[lucene, datafusion]])
              OpenSearchProject(SearchPhrase=[$74], viableBackends=[[lucene, datafusion]])
                OpenSearchFilter(condition=[ANNOTATED_PREDICATE(id=0, backends=[lucene, datafusion], <>($74, ''))], viableBackends=[[lucene, datafusion]])
                  OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    fragment: |
      [SHARD_FRAGMENT chosen_backend=datafusion tree_shape=CONJUNCTIVE]
      OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], dir0=[DESC-nulls-last], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(c=[$1], SearchPhrase=[$0], viableBackends=[[lucene, datafusion]])
            OpenSearchAggregate(group=[{0}], c=[COUNT()], mode=[SINGLE], viableBackends=[[lucene, datafusion]])
              OpenSearchProject(SearchPhrase=[$74], viableBackends=[[lucene, datafusion]])
                OpenSearchFilter(condition=[ANNOTATED_PREDICATE(id=0, backends=[lucene, datafusion], <>($74, ''))], viableBackends=[[lucene, datafusion]])
                  OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    shard_physical_1seg: |
      ProjectionExec: expr=[count(Int64(1))@0 as c, SearchPhrase@1 as SearchPhrase]
        SortPreservingMergeExec: [count(Int64(1))@0 DESC NULLS LAST], fetch=10
          SortExec: TopK(fetch=10), expr=[count(Int64(1))@0 DESC NULLS LAST], preserve_partitioning=[true]
            ProjectionExec: expr=[count(Int64(1))@1 as count(Int64(1)), SearchPhrase@0 as SearchPhrase]
              AggregateExec: mode=FinalPartitioned, gby=[SearchPhrase@0 as SearchPhrase], aggr=[count(Int64(1))]
                RepartitionExec: partitioning=Hash([SearchPhrase@0], 4), input_partitions=4
                  AggregateExec: mode=Partial, gby=[SearchPhrase@0 as SearchPhrase], aggr=[count(Int64(1))]
                    RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
                      QueryShardExec: partitions=1, segments=1, ordering=unsorted
    shard_physical_nseg: |
      ProjectionExec: expr=[count(Int64(1))@0 as c, SearchPhrase@1 as SearchPhrase]
        SortPreservingMergeExec: [count(Int64(1))@0 DESC NULLS LAST], fetch=10
          SortExec: TopK(fetch=10), expr=[count(Int64(1))@0 DESC NULLS LAST], preserve_partitioning=[true]
            ProjectionExec: expr=[count(Int64(1))@1 as count(Int64(1)), SearchPhrase@0 as SearchPhrase]
              AggregateExec: mode=FinalPartitioned, gby=[SearchPhrase@0 as SearchPhrase], aggr=[count(Int64(1))]
                RepartitionExec: partitioning=Hash([SearchPhrase@0], 4), input_partitions=4
                  AggregateExec: mode=Partial, gby=[SearchPhrase@0 as SearchPhrase], aggr=[count(Int64(1))]
                    RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=2
                      QueryShardExec: partitions=2, segments=2, ordering=unsorted
