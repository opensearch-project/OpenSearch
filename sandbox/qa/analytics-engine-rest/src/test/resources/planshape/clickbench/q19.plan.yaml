              OpenSearchProject(UserID=[$97], m=[ANNOTATED_PROJECT_EXPR(id=0, backends=[datafusion], EXTRACT('minute':VARCHAR, $16))], SearchPhrase=[$74], viableBackends=[[datafusion]])
                OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    fragment: |
