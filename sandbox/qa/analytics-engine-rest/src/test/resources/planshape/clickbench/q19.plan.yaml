        SortPreservingMergeExec: [count(Int64(1))@0 DESC NULLS LAST, UserID@1 ASC, opensearch_extract(Utf8("minute"),<scrubbed>.EventTime)@2 ASC, SearchPhrase@3 ASC], fetch=10
