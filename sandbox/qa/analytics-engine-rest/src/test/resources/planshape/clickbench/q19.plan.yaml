      OpenSearchSort(sort0=[$0], sort1=[$1], sort2=[$2], sort3=[$3], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], dir2=[ASC-nulls-first], dir3=[ASC-nulls-first], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], sort1=[$1], sort2=[$2], sort3=[$3], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], dir2=[ASC-nulls-first], dir3=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(count()=[$3], UserID=[$0], m=[$1], SearchPhrase=[$2], viableBackends=[[datafusion]])
            OpenSearchAggregate(group=[{0, 1, 2}], count()=[COUNT()], mode=[SINGLE], viableBackends=[[datafusion]])
              OpenSearchProject(UserID=[$97], m=[ANNOTATED_PROJECT_EXPR(id=0, backends=[datafusion], EXTRACT('minute':VARCHAR, $16))], SearchPhrase=[$74], viableBackends=[[datafusion]])
                OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    shard_physical_1seg: |
      ProjectionExec: expr=[count(Int64(1))@0 as count(), UserID@1 as UserID, opensearch_extract(Utf8("minute"),<scrubbed>.EventTime)@2 as m, SearchPhrase@3 as SearchPhrase]
        SortPreservingMergeExec: [count(Int64(1))@0 DESC NULLS LAST, UserID@1 ASC, opensearch_extract(Utf8("minute"),<scrubbed>.EventTime)@2 ASC, SearchPhrase@3 ASC], fetch=10
          SortExec: TopK(fetch=10), expr=[count(Int64(1))@0 DESC NULLS LAST, UserID@1 ASC, opensearch_extract(Utf8("minute"),<scrubbed>.EventTime)@2 ASC, SearchPhrase@3 ASC], preserve_partitioning=[true]
