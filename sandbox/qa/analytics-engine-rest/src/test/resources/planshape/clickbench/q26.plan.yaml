# Sort on non-timestamp column: SearchPhrase sorted alphabetically after != filter.
# Tests sort pushdown on string field rather than temporal column.
query: q26
ppl_file: q26.ppl
applies: [prod2s, prod1s]
plans:
  prod2s:
    post_cbo: |
      OpenSearchSort(sort0=[$0], dir0=[ASC-nulls-first], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], dir0=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchExchangeReducer(viableBackends=[[datafusion]], exchange=[ExchangeInfo[distributionType=SINGLETON, partitionKeyIndices=[]]])
            OpenSearchSort(sort0=[$0], dir0=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
              OpenSearchProject(SearchPhrase=[$74], viableBackends=[[lucene, datafusion]])
                OpenSearchFilter(condition=[ANNOTATED_PREDICATE(id=0, backends=[lucene, datafusion], <>($74, ''))], viableBackends=[[lucene, datafusion]])
                  OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    fragment: |
      [SHARD_FRAGMENT chosen_backend=datafusion tree_shape=CONJUNCTIVE]
      OpenSearchSort(sort0=[$0], dir0=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
        OpenSearchProject(SearchPhrase=[$74], viableBackends=[[lucene, datafusion]])
          OpenSearchFilter(condition=[ANNOTATED_PREDICATE(id=0, backends=[lucene, datafusion], <>($74, ''))], viableBackends=[[lucene, datafusion]])
            OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
      [COORDINATOR_REDUCE chosen_backend=datafusion tree_shape=NONE]
      OpenSearchSort(sort0=[$0], dir0=[ASC-nulls-first], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], dir0=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchExchangeReducer(viableBackends=[[datafusion]], exchange=[ExchangeInfo[distributionType=SINGLETON, partitionKeyIndices=[]]])
            OpenSearchStageInputScan(childStageId=[0], viableBackends=[[datafusion]])
    shard_physical_1seg: |
      SortExec: TopK(fetch=10), expr=[SearchPhrase@0 ASC], preserve_partitioning=[false]
        CooperativeExec
          QueryShardExec: partitions=1, segments=1, ordering=unsorted
    shard_physical_nseg: |
      SortPreservingMergeExec: [SearchPhrase@0 ASC], fetch=10
        SortExec: TopK(fetch=10), expr=[SearchPhrase@0 ASC], preserve_partitioning=[true]
          QueryShardExec: partitions=2, segments=2, ordering=unsorted
    coord_physical: |
      SortExec: TopK(fetch=10), expr=[SearchPhrase@0 ASC], preserve_partitioning=[false]
        StreamingTableExec: partition_sizes=1, projection=[SearchPhrase]
  prod1s:
    post_cbo: |
      OpenSearchSort(sort0=[$0], dir0=[ASC-nulls-first], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], dir0=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(SearchPhrase=[$74], viableBackends=[[lucene, datafusion]])
            OpenSearchFilter(condition=[ANNOTATED_PREDICATE(id=0, backends=[lucene, datafusion], <>($74, ''))], viableBackends=[[lucene, datafusion]])
              OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    fragment: |
      [SHARD_FRAGMENT chosen_backend=datafusion tree_shape=CONJUNCTIVE]
      OpenSearchSort(sort0=[$0], dir0=[ASC-nulls-first], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], dir0=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(SearchPhrase=[$74], viableBackends=[[lucene, datafusion]])
            OpenSearchFilter(condition=[ANNOTATED_PREDICATE(id=0, backends=[lucene, datafusion], <>($74, ''))], viableBackends=[[lucene, datafusion]])
              OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    shard_physical_1seg: |
      SortExec: TopK(fetch=10), expr=[SearchPhrase@0 ASC], preserve_partitioning=[false]
        CooperativeExec
          QueryShardExec: partitions=1, segments=1, ordering=unsorted
    shard_physical_nseg: |
      SortPreservingMergeExec: [SearchPhrase@0 ASC], fetch=10
        SortExec: TopK(fetch=10), expr=[SearchPhrase@0 ASC], preserve_partitioning=[true]
          QueryShardExec: partitions=2, segments=2, ordering=unsorted
