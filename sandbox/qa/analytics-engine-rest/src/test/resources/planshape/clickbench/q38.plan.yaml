# Same filter pattern as q37 but grouped by Title instead of URL.
# Title != '' blocked from lucene; parquet DataSourceExec with full predicate pushdown.
query: q38
ppl_file: q38.ppl
applies: [prod2s, prod1s]
plans:
  prod2s:
    post_cbo: |
      OpenSearchSort(sort0=[$0], sort1=[$1], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], sort1=[$1], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(PageViews=[$1], Title=[$0], viableBackends=[[datafusion]])
            OpenSearchAggregate(group=[{0}], PageViews=[SUM($1)], mode=[FINAL], viableBackends=[[datafusion]])
              OpenSearchExchangeReducer(viableBackends=[[datafusion]], exchange=[ExchangeInfo[distributionType=SINGLETON, partitionKeyIndices=[], partitionCount=0]])
                OpenSearchSort(sort0=[$1], sort1=[$0], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[30], viableBackends=[[datafusion]])
                  OpenSearchAggregate(group=[{0}], PageViews=[COUNT()], mode=[PARTIAL], viableBackends=[[datafusion]])
                    OpenSearchProject(Title=[$83], viableBackends=[[datafusion]])
                      OpenSearchFilter(condition=[AND(ANNOTATED_PREDICATE(id=0, backends=[datafusion], =($12, 62)), ANNOTATED_PREDICATE(id=1, backends=[datafusion], >=($15, TIMESTAMP('2013-07-01':VARCHAR))), ANNOTATED_PREDICATE(id=2, backends=[datafusion], <=($15, TIMESTAMP('2013-07-31':VARCHAR))), ANNOTATED_PREDICATE(id=3, backends=[datafusion], =($14, 0)), ANNOTATED_PREDICATE(id=4, backends=[datafusion], =($40, 0)), ANNOTATED_PREDICATE(id=5, backends=[lucene, datafusion], <>($83, '')))], viableBackends=[[datafusion]])
                        OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    fragment: |
      [SHARD_FRAGMENT chosen_backend=datafusion tree_shape=CONJUNCTIVE]
      OpenSearchSort(sort0=[$1], sort1=[$0], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[30], viableBackends=[[datafusion]])
        OpenSearchAggregate(group=[{0}], PageViews=[COUNT()], mode=[PARTIAL], viableBackends=[[datafusion]])
          OpenSearchProject(Title=[$83], viableBackends=[[datafusion]])
            OpenSearchFilter(condition=[AND(ANNOTATED_PREDICATE(id=0, backends=[datafusion], =($12, 62)), ANNOTATED_PREDICATE(id=1, backends=[datafusion], >=($15, TIMESTAMP('2013-07-01':VARCHAR))), ANNOTATED_PREDICATE(id=2, backends=[datafusion], <=($15, TIMESTAMP('2013-07-31':VARCHAR))), ANNOTATED_PREDICATE(id=3, backends=[datafusion], =($14, 0)), ANNOTATED_PREDICATE(id=4, backends=[datafusion], =($40, 0)), ANNOTATED_PREDICATE(id=5, backends=[lucene, datafusion], <>($83, '')))], viableBackends=[[datafusion]])
              OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
      [COORDINATOR_REDUCE chosen_backend=datafusion tree_shape=NONE]
      OpenSearchSort(sort0=[$0], sort1=[$1], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], sort1=[$1], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(PageViews=[$1], Title=[$0], viableBackends=[[datafusion]])
            OpenSearchAggregate(group=[{0}], PageViews=[SUM($1)], mode=[FINAL], viableBackends=[[datafusion]])
              OpenSearchExchangeReducer(viableBackends=[[datafusion]], exchange=[ExchangeInfo[distributionType=SINGLETON, partitionKeyIndices=[], partitionCount=0]])
                OpenSearchStageInputScan(childStageId=[0], viableBackends=[[datafusion]])
    shard_physical_1seg: |
      ProjectionExec: expr=[Title@0 as Title, count(Int64(1))[count]@1 as PageViews]
        SortPreservingMergeExec: [count(Int64(1))@1 DESC NULLS LAST, Title@0 ASC], fetch=30
          SortExec: TopK(fetch=30), expr=[count(Int64(1))@1 DESC NULLS LAST, Title@0 ASC], preserve_partitioning=[true]
            AggregateExec: mode=Partial, gby=[Title@0 as Title], aggr=[count(Int64(1))]
              RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
                QueryShardExec: partitions=1, segments=1, ordering=unsorted
    shard_physical_nseg: |
      ProjectionExec: expr=[Title@0 as Title, count(Int64(1))[count]@1 as PageViews]
        SortPreservingMergeExec: [count(Int64(1))@1 DESC NULLS LAST, Title@0 ASC], fetch=30
          SortExec: TopK(fetch=30), expr=[count(Int64(1))@1 DESC NULLS LAST, Title@0 ASC], preserve_partitioning=[true]
            AggregateExec: mode=Partial, gby=[Title@0 as Title], aggr=[count(Int64(1))]
              RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=2
                QueryShardExec: partitions=2, segments=2, ordering=unsorted
    coord_physical: |
      ProjectionExec: expr=[sum(input-0.PageViews)@0 as PageViews, Title@1 as Title]
        SortPreservingMergeExec: [sum(input-0.PageViews)@0 DESC NULLS LAST, Title@1 ASC], fetch=10
          SortExec: TopK(fetch=10), expr=[sum(input-0.PageViews)@0 DESC NULLS LAST, Title@1 ASC], preserve_partitioning=[true]
            ProjectionExec: expr=[sum(input-0.PageViews)@1 as sum(input-0.PageViews), Title@0 as Title]
              AggregateExec: mode=FinalPartitioned, gby=[Title@0 as Title], aggr=[sum(input-0.PageViews)]
                RepartitionExec: partitioning=Hash([Title@0], 4), input_partitions=4
                  AggregateExec: mode=Partial, gby=[Title@0 as Title], aggr=[sum(input-0.PageViews)]
                    RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
                      StreamingTableExec: partition_sizes=1, projection=[Title, PageViews]
  prod1s:
    post_cbo: |
      OpenSearchSort(sort0=[$0], sort1=[$1], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], sort1=[$1], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(PageViews=[$1], Title=[$0], viableBackends=[[datafusion]])
            OpenSearchAggregate(group=[{0}], PageViews=[COUNT()], mode=[SINGLE], viableBackends=[[datafusion]])
              OpenSearchProject(Title=[$83], viableBackends=[[datafusion]])
                OpenSearchFilter(condition=[AND(ANNOTATED_PREDICATE(id=0, backends=[datafusion], =($12, 62)), ANNOTATED_PREDICATE(id=1, backends=[datafusion], >=($15, TIMESTAMP('2013-07-01':VARCHAR))), ANNOTATED_PREDICATE(id=2, backends=[datafusion], <=($15, TIMESTAMP('2013-07-31':VARCHAR))), ANNOTATED_PREDICATE(id=3, backends=[datafusion], =($14, 0)), ANNOTATED_PREDICATE(id=4, backends=[datafusion], =($40, 0)), ANNOTATED_PREDICATE(id=5, backends=[lucene, datafusion], <>($83, '')))], viableBackends=[[datafusion]])
                  OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    fragment: |
      [SHARD_FRAGMENT chosen_backend=datafusion tree_shape=CONJUNCTIVE]
      OpenSearchSort(sort0=[$0], sort1=[$1], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[10000], viableBackends=[[datafusion]])
        OpenSearchSort(sort0=[$0], sort1=[$1], dir0=[DESC-nulls-last], dir1=[ASC-nulls-first], fetch=[10], viableBackends=[[datafusion]])
          OpenSearchProject(PageViews=[$1], Title=[$0], viableBackends=[[datafusion]])
            OpenSearchAggregate(group=[{0}], PageViews=[COUNT()], mode=[SINGLE], viableBackends=[[datafusion]])
              OpenSearchProject(Title=[$83], viableBackends=[[datafusion]])
                OpenSearchFilter(condition=[AND(ANNOTATED_PREDICATE(id=0, backends=[datafusion], =($12, 62)), ANNOTATED_PREDICATE(id=1, backends=[datafusion], >=($15, TIMESTAMP('2013-07-01':VARCHAR))), ANNOTATED_PREDICATE(id=2, backends=[datafusion], <=($15, TIMESTAMP('2013-07-31':VARCHAR))), ANNOTATED_PREDICATE(id=3, backends=[datafusion], =($14, 0)), ANNOTATED_PREDICATE(id=4, backends=[datafusion], =($40, 0)), ANNOTATED_PREDICATE(id=5, backends=[lucene, datafusion], <>($83, '')))], viableBackends=[[datafusion]])
                  OpenSearchTableScan(table=[[<scrubbed>]], viableBackends=[[lucene, datafusion]])
    shard_physical_1seg: |
      ProjectionExec: expr=[count(Int64(1))@0 as PageViews, Title@1 as Title]
        SortPreservingMergeExec: [count(Int64(1))@0 DESC NULLS LAST, Title@1 ASC], fetch=10
          SortExec: TopK(fetch=10), expr=[count(Int64(1))@0 DESC NULLS LAST, Title@1 ASC], preserve_partitioning=[true]
            ProjectionExec: expr=[count(Int64(1))@1 as count(Int64(1)), Title@0 as Title]
              AggregateExec: mode=FinalPartitioned, gby=[Title@0 as Title], aggr=[count(Int64(1))]
                RepartitionExec: partitioning=Hash([Title@0], 4), input_partitions=4
                  AggregateExec: mode=Partial, gby=[Title@0 as Title], aggr=[count(Int64(1))]
                    RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
                      QueryShardExec: partitions=1, segments=1, ordering=unsorted
    shard_physical_nseg: |
      ProjectionExec: expr=[count(Int64(1))@0 as PageViews, Title@1 as Title]
        SortPreservingMergeExec: [count(Int64(1))@0 DESC NULLS LAST, Title@1 ASC], fetch=10
          SortExec: TopK(fetch=10), expr=[count(Int64(1))@0 DESC NULLS LAST, Title@1 ASC], preserve_partitioning=[true]
            ProjectionExec: expr=[count(Int64(1))@1 as count(Int64(1)), Title@0 as Title]
              AggregateExec: mode=FinalPartitioned, gby=[Title@0 as Title], aggr=[count(Int64(1))]
                RepartitionExec: partitioning=Hash([Title@0], 4), input_partitions=4
                  AggregateExec: mode=Partial, gby=[Title@0 as Title], aggr=[count(Int64(1))]
                    RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=2
                      QueryShardExec: partitions=2, segments=2, ordering=unsorted
