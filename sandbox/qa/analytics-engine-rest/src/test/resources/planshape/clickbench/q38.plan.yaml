    coord_physical: |
      ProjectionExec: expr=[sum(input-0.PageViews)@0 as PageViews, Title@1 as Title]
        SortPreservingMergeExec: [sum(input-0.PageViews)@0 DESC NULLS LAST, Title@1 ASC], fetch=10
          SortExec: TopK(fetch=10), expr=[sum(input-0.PageViews)@0 DESC NULLS LAST, Title@1 ASC], preserve_partitioning=[true]
            ProjectionExec: expr=[sum(input-0.PageViews)@1 as sum(input-0.PageViews), Title@0 as Title]
              AggregateExec: mode=FinalPartitioned, gby=[Title@0 as Title], aggr=[sum(input-0.PageViews)]
                RepartitionExec: partitioning=Hash([Title@0], 4), input_partitions=4
                  AggregateExec: mode=Partial, gby=[Title@0 as Title], aggr=[sum(input-0.PageViews)]
                    RepartitionExec: partitioning=RoundRobinBatch(4), input_partitions=1
                      StreamingTableExec: partition_sizes=1, projection=[Title, PageViews]
