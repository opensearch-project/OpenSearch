run-name: Build Wazuh Indexer Docker image | ${{ inputs.id }}
name: (5.x) Build Docker image

env:
  CI_DEV_INTERNAL_BUCKET: s3://xdrsiem-ci-dev-internal
  CI_ARTIFACTS_REPO: wazuh-indexer
  CI_ARTIFACTS_WORKFLOW: 5_builderpackage_indexer

# This workflow runs when any of the following occur:
# - Run manually
# - Invoked from another workflow

on:
  workflow_dispatch:
    inputs:
      revision:
        description: "Revision number of the package."
        type: string
        default: "0"
        required: false
      is_stage:
        description: "Enable to use the release naming nomenclature."
        type: boolean
        default: false
      architecture:
        description: '[ "x64", "arm64" ]'
        type: string
        default: '[ "x64", "arm64" ]'
      id:
        description: "ID used to identify the workflow uniquely."
        type: string
        required: false
      plugins_ref:
        description: "Branch, commit or tag for the wazuh-indexer plugins repositories and engine."
        type: string
        default: "main"
        required: false
  workflow_call:
    inputs:
      revision:
        description: "Revision number of the package."
        type: string
        default: "0"
        required: false
      is_stage:
        description: "Enable to use the release naming nomenclature."
        type: boolean
        default: false
      architecture:
        description: '[ "x64", "arm64" ]'
        type: string
        default: '[ "x64", "arm64" ]'
      id:
        description: "ID used to identify the workflow uniquely."
        type: string
        required: false
      plugins_ref:
        description: "Branch, commit or tag for the wazuh-indexer plugins repositories and engine."
        type: string
        default: "main"
        required: false
    secrets:
      QUAY_USERNAME:
        required: true
        description: "Quay.io username"
      QUAY_TOKEN:
        required: true
        description: "Quay.io token"
      AWS_INDEXER_ACTIONS_ROLE:
        required: true
        description: "AWS IAM OIDC role for S3 access"

# ==========================
# Bibliography
# ==========================
#
# * Reusable workflows: limitations
#   | https://docs.github.com/en/actions/using-workflows/reusing-workflows#limitations
# * Using matrix in reusable workflows:
#   | https://docs.github.com/en/actions/using-workflows/reusing-workflows#using-a-matrix-strategy-with-a-reusable-workflow
# * Reading input from the called workflow
#   | https://docs.github.com/en/enterprise-cloud@latest/actions/using-workflows/workflow-syntax-for-github-actions#onworkflow_callinputs
# * Ternary operator
#   | https://docs.github.com/en/actions/learn-github-actions/expressions#example

jobs:
  call-build-workflow:
    permissions:
      contents: read
      id-token: write
      actions: read
      packages: read
    uses: ./.github/workflows/5_builderpackage_indexer.yml
    with:
      revision: ${{ inputs.revision }}
      is_stage: ${{ inputs.is_stage }}
      distribution: '[ "tar" ]'
      architecture: ${{ inputs.architecture }}
      id: ${{ inputs.id }}
      plugins_ref: ${{ inputs.plugins_ref }}
    secrets: inherit

  build-and-push-docker-image:
    permissions:
      contents: read
      id-token: write
    needs: [call-build-workflow]
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    env:
      docker_path: ./build-scripts/docker
    steps:
      - uses: actions/checkout@v7

      - name: Get version
        id: version
        run: |
          echo "version=$(bash build-scripts/product_version.sh)" >> "$GITHUB_OUTPUT"

      - name: Resolve platforms
        id: platforms
        run: |
          platforms=$(echo '${{ inputs.architecture }}' | jq -r '[.[] | if . == "x64" then "linux/amd64" elif . == "arm64" then "linux/arm64" else empty end] | join(",")')
          echo "platforms=${platforms}" >> "$GITHUB_OUTPUT"

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_INDEXER_ACTIONS_ROLE }}
          aws-region: "us-east-1"

      - name: Download tarballs
        run: |
          mkdir -p "${{ env.docker_path }}"
          s3_base="${{ env.CI_DEV_INTERNAL_BUCKET }}/${{ env.CI_ARTIFACTS_REPO }}/${{ env.CI_ARTIFACTS_WORKFLOW }}"
          zip_name="artifacts_${{ github.run_id }}.zip"
          aws s3 cp "${s3_base}/${zip_name}" "${{ env.docker_path }}/${zip_name}"

          if [ ! -f "${{ env.docker_path }}/${zip_name}" ]; then
            echo "::error::No indexer artifact ZIP found in S3 at ${s3_base}/${zip_name}"
            exit 1
          fi

          unzip -j -o "${{ env.docker_path }}/${zip_name}" '*/wazuh-indexer_*linux*.tar.gz' -d "${{ env.docker_path }}"

      - name: Display structure of downloaded files
        run: ls -lR ${{ env.docker_path }}

      - name: Rename tarballs for multi-arch build
        run: |
          cd ${{ env.docker_path }}
          # Rename tarballs to match Docker's TARGETARCH naming (amd64/arm64)
          # so the Dockerfile can COPY the correct one per platform.
          mv wazuh-indexer_*linux-x64*.tar.gz wazuh-indexer-amd64.tar.gz 2>/dev/null || true
          mv wazuh-indexer_*linux-arm64*.tar.gz wazuh-indexer-arm64.tar.gz 2>/dev/null || true
          ls -l wazuh-indexer-*.tar.gz

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Quay.io
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_USERNAME }}
          QUAY_TOKEN: ${{ secrets.QUAY_TOKEN }}
        run: |
          docker login -u="${QUAY_USERNAME}" -p="${QUAY_TOKEN}" quay.io

      - name: Build and push multi-arch image
        env:
          DOCKER_REPOSITORY: quay.io/wazuh/wazuh-indexer
          VERSION: ${{ steps.version.outputs.version }}
          REVISION: ${{ inputs.revision || '0' }}
        run: |
          cd ${{ env.docker_path }}
          docker buildx build \
            --platform ${{ steps.platforms.outputs.platforms }} \
            --build-arg="VERSION=${VERSION}" \
            --tag="${DOCKER_REPOSITORY}:${VERSION}-${REVISION}" \
            --push \
            --progress=plain --no-cache .
