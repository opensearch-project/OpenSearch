name: Link Checker
on:
  schedule:
    - cron: "00 8 * * 5"

permissions:
  contents: read
jobs:
  linkchecker:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v6
      - name: lychee Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: --accept=200,403,429  "./**/*.md" "./**/*.txt" "./distribution/packages/src/rpm/wazuh-indexer.rpm.spec" --exclude-all-private --insecure --exclude "https://www.gnu.org/licenses" --exclude "https://fsf.org/" --exclude "compatibility\.html" --root-dir docs
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: Fail if there were link errors
        run: exit ${{ steps.lychee.outputs.exit_code }}
