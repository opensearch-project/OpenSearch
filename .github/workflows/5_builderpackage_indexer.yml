run-name: Build ${{ inputs.distribution }} Wazuh Indexer on ${{ inputs.architecture }} | ${{ inputs.id }}
name: (5.x) Build packages

permissions:
  contents: read
  packages: read

env:
  M2_CACHE_KEY_COMMON: .m2-${{ github.ref_name }}-${{ github.run_id }}-common-utils
  M2_CACHE_KEY_FULL: .m2-${{ github.ref_name }}-${{ github.run_id }}-with-security-analytics

# This workflow runs when any of the following occur:
# - Run manually
# - Invoked from another workflow

on:
  workflow_dispatch:
    inputs:
      revision:
        description: "Revision number of the package."
        type: string
        default: "0"
        required: false
      upload:
        description: "Enable to upload the packages to the S3 bucket."
        type: boolean
        default: false
      is_stage:
        description: "Enable to use the release naming nomenclature."
        type: boolean
        default: false
      distribution:
        description: "Distribution format of the package [tar, rpm, deb]."
        type: choice
        options:
          - '[ "tar" ]'
          - '[ "deb" ]'
          - '[ "rpm" ]'
          - '[ "tar", "deb" ]'
          - '[ "tar", "rpm" ]'
          - '[ "deb", "rpm" ]'
          - '[ "tar", "deb", "rpm" ]'
        default: '[ "deb", "rpm" ]'
        required: true
      architecture:
        description: "Architecture of the package [x64, arm64]."
        type: choice
        options:
          - '[ "x64" ]'
          - '[ "arm64" ]'
          - '[ "x64", "arm64" ]'
        default: '[ "x64", "arm64" ]'
        required: true
      checksum:
        description: |
          Enable to generate the MD5 checksums of the packages.
          If the upload to the S3 bucket is enabled, these will be uploaded too.
        type: boolean
        default: false
      id:
        description: "ID used to identify the workflow uniquely."
        type: string
        required: false
      plugins_ref:
        description: "Branch, commit or tag for the wazuh-indexer plugins repositories and engine."
        type: string
        default: "main"
        required: false
  workflow_call:
    inputs:
      revision:
        type: string
        default: "0"
        required: false
      upload:
        type: boolean
        default: false
      is_stage:
        type: boolean
        default: false
      distribution:
        type: string
        default: '[ "rpm", "deb" ]'
      architecture:
        type: string
        default: '[ "x64", "arm64"  ]'
      checksum:
        type: boolean
        default: false
      id:
        type: string
        required: false
      plugins_ref:
        type: string
        default: "main"
        required: false
    secrets:
      CI_INTERNAL_DEVELOPMENT_BUCKET_USER_ACCESS_KEY:
        required: true
        description: "AWS user access key"
      CI_INTERNAL_DEVELOPMENT_BUCKET_USER_SECRET_KEY:
        required: true
        description: "AWS user secret key"

    outputs:
      name:
        description: Name of the package built.
        value: ${{ jobs.build.outputs.name }}

# ==========================
# Bibliography
# ==========================
#
# * Reusable workflows: limitations
#   | https://docs.github.com/en/actions/using-workflows/reusing-workflows#limitations
# * Using matrix in reusable workflows:
#   | https://docs.github.com/en/actions/using-workflows/reusing-workflows#using-a-matrix-strategy-with-a-reusable-workflow
# * Reading input from the called workflow
#   | https://docs.github.com/en/enterprise-cloud@latest/actions/using-workflows/workflow-syntax-for-github-actions#onworkflow_callinputs
# * Ternary operator
#   | https://docs.github.com/en/actions/learn-github-actions/expressions#example

jobs:
  branches:
    timeout-minutes: 5
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    outputs:
      wazuh_plugins_ref: ${{ steps.branches.outputs.wazuh_indexer_plugins_branch }}
      reporting_plugin_ref: ${{ steps.branches.outputs.wazuh_indexer_reporting_branch }}
      security_analytics_plugin_ref: ${{ steps.branches.outputs.wazuh_indexer_security_analytics_branch }}
      notifications_plugin_ref: ${{ steps.branches.outputs.wazuh_indexer_notifications_branch }}
      common_utils_plugin_ref: ${{ steps.branches.outputs.wazuh_indexer_common_utils_branch }}
      wazuh_ref: ${{ steps.branches.outputs.wazuh_branch }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve branches
        id: branches
        uses: ./.github/actions/5_builderpackage_indexer_branch_resolver
        with:
          branch: ${{ inputs.plugins_ref }}

  get-versions-wazuh-indexer:
    timeout-minutes: 5
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    outputs:
      version: ${{ steps.version.outputs.version }}
      opensearch_version: ${{ steps.version.outputs.opensearch_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            VERSION.json
            build-scripts/product_version.sh
            build-scripts/opensearch_version.sh
            buildSrc/version.properties

      - name: Read versions
        id: version
        run: |
          echo "version=$(bash ./build-scripts/product_version.sh)" >> "$GITHUB_OUTPUT"
          echo "opensearch_version=$(bash ./build-scripts/opensearch_version.sh)" >> "$GITHUB_OUTPUT"

  get-versions-wazuh-indexer-plugins:
    needs: [branches]
    timeout-minutes: 5
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    outputs:
      version: ${{ steps.plugins_version.outputs.version }}
      opensearch_version: ${{ steps.plugins_version.outputs.opensearch_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: wazuh/wazuh-indexer-plugins
          ref: ${{ needs.branches.outputs.wazuh_plugins_ref }}
          fetch-depth: 1
          sparse-checkout: |
            VERSION.json
            tools/product_version.sh
            tools/opensearch_version.sh
            plugins/setup/build.gradle

      - name: Read versions
        id: plugins_version
        run: |
          echo "version=$(bash ./tools/product_version.sh)" >> "$GITHUB_OUTPUT"
          echo "opensearch_version=$(bash ./tools/opensearch_version.sh setup)" >> "$GITHUB_OUTPUT"

  get-versions-wazuh-indexer-reporting:
    needs: [branches]
    timeout-minutes: 5
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    outputs:
      version: ${{ steps.reporting_version.outputs.version }}
      opensearch_version: ${{ steps.reporting_version.outputs.opensearch_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: wazuh/wazuh-indexer-reporting
          ref: ${{ needs.branches.outputs.reporting_plugin_ref }}
          fetch-depth: 1
          sparse-checkout: |
            VERSION.json
            tools/product_version.sh
            tools/opensearch_version.sh
            build.gradle

      - name: Read versions
        id: reporting_version
        run: |
          echo "version=$(bash ./tools/product_version.sh)" >> "$GITHUB_OUTPUT"
           echo "opensearch_version=$(bash ./tools/opensearch_version.sh)" >> "$GITHUB_OUTPUT"

  get-versions-wazuh-indexer-security-analytics:
    needs: [branches]
    timeout-minutes: 5
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    outputs:
      version: ${{ steps.security_analytics_version.outputs.version }}
      opensearch_version: ${{ steps.security_analytics_version.outputs.opensearch_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: wazuh/wazuh-indexer-security-analytics
          ref: ${{ needs.branches.outputs.security_analytics_plugin_ref }}
          fetch-depth: 1
          sparse-checkout: |
            VERSION.json
            tools/product_version.sh
            tools/opensearch_version.sh
            build.gradle

      - name: Read versions
        id: security_analytics_version
        run: |
          echo "version=$(bash ./tools/product_version.sh)" >> "$GITHUB_OUTPUT"
          echo "opensearch_version=$(bash ./tools/opensearch_version.sh)" >> "$GITHUB_OUTPUT"

  get-versions-wazuh-indexer-notifications:
    needs: [branches]
    timeout-minutes: 5
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    outputs:
      version: ${{ steps.notifications_version.outputs.version }}
      opensearch_version: ${{ steps.notifications_version.outputs.opensearch_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: wazuh/wazuh-indexer-notifications
          ref: ${{ needs.branches.outputs.notifications_plugin_ref }}
          fetch-depth: 1
          sparse-checkout: |
            VERSION.json
            tools/product_version.sh
            tools/opensearch_version.sh
            build.gradle
            notifications/build.gradle

      - name: Read versions
        id: notifications_version
        run: |
          echo "version=$(bash ./tools/product_version.sh)" >> "$GITHUB_OUTPUT"
           echo "opensearch_version=$(bash ./tools/opensearch_version.sh)" >> "$GITHUB_OUTPUT"

  get-versions-wazuh-indexer-common-utils:
    needs: [branches]
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    outputs:
      version: ${{ steps.common_utils_version.outputs.version }}
      opensearch_version: ${{ steps.common_utils_version.outputs.opensearch_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: wazuh/wazuh-indexer-common-utils
          ref: ${{ needs.branches.outputs.common_utils_plugin_ref }}
          fetch-depth: 1
          sparse-checkout: |
            VERSION.json
            tools/product_version.sh
            tools/opensearch_version.sh
            build.gradle

      - name: Read versions
        id: common_utils_version
        run: |
          echo "version=$(bash ./tools/product_version.sh)" >> "$GITHUB_OUTPUT"
           echo "opensearch_version=$(bash ./tools/opensearch_version.sh)" >> "$GITHUB_OUTPUT"

  compatibility-check:
    timeout-minutes: 5
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    needs:
      [
        get-versions-wazuh-indexer,
        get-versions-wazuh-indexer-plugins,
        get-versions-wazuh-indexer-reporting,
        get-versions-wazuh-indexer-security-analytics,
        get-versions-wazuh-indexer-notifications,
        get-versions-wazuh-indexer-common-utils,
      ]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          sparse-checkout: |
            build-scripts/check_compatibility_versions.sh

      - name: Check version compatibility
        env:
          INDEXER_VERSION: ${{ needs.get-versions-wazuh-indexer.outputs.version }}
          OPENSEARCH_VERSION: ${{ needs.get-versions-wazuh-indexer.outputs.opensearch_version }}
          PLUGIN_VERSIONS: |
            wazuh-indexer-plugins|${{ needs.get-versions-wazuh-indexer-plugins.outputs.version }}|${{ needs.get-versions-wazuh-indexer-plugins.outputs.opensearch_version }}
            wazuh-indexer-reporting|${{ needs.get-versions-wazuh-indexer-reporting.outputs.version }}|${{ needs.get-versions-wazuh-indexer-reporting.outputs.opensearch_version }}
            wazuh-indexer-security-analytics|${{ needs.get-versions-wazuh-indexer-security-analytics.outputs.version }}|${{ needs.get-versions-wazuh-indexer-security-analytics.outputs.opensearch_version }}
            wazuh-indexer-notifications|${{ needs.get-versions-wazuh-indexer-notifications.outputs.version }}|${{ needs.get-versions-wazuh-indexer-notifications.outputs.opensearch_version }}
            wazuh-indexer-common-utils|${{ needs.get-versions-wazuh-indexer-common-utils.outputs.version }}|${{ needs.get-versions-wazuh-indexer-common-utils.outputs.opensearch_version }}
        run: |
          bash build-scripts/check_compatibility_versions.sh

  setup:
    name: Set up variables
    timeout-minutes: 5
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      previous_version: ${{ steps.previous_release.outputs.previous_version }}
    steps:
      - id: matrix
        run: |
          matrix=$(jq -cn \
              --argjson distribution '${{ inputs.distribution }}' \
              --argjson architecture '${{ inputs.architecture }}' \
              '{distribution: $distribution, architecture: $architecture}'
          )
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v6
      - id: previous_release
        name: Get latest Wazuh release from GitHub
        run: |
          set -o pipefail
          CURRENT="$(bash build-scripts/product_version.sh)"
          PREVIOUS=$(curl -sfSL --retry 3 --retry-all-errors --retry-delay 5 --connect-timeout 10 --max-time 30 \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/wazuh/wazuh-indexer/releases | jq -r '.[].tag_name' | grep -vE 'alpha|beta|rc' | sed 's/^v//' | grep -E '^4\.[0-9]+\.[0-9]+$' | \
          grep -v "^${CURRENT}$" | sort -V | awk -v current="$CURRENT" '$0 < current' | tail -n1)

          echo "Current version: $CURRENT"
          echo "Latest release detected: $PREVIOUS"
          echo "previous_version=$PREVIOUS" >> $GITHUB_OUTPUT

  publish-common-utils:
    timeout-minutes: 10
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    needs: [compatibility-check, branches, get-versions-wazuh-indexer-common-utils]
    steps:
      - name: Publish common-utils to Maven Local
        uses: wazuh/wazuh-indexer-common-utils/.github/actions/5_local_maven_publisher@main
        with:
          version: ${{ needs.get-versions-wazuh-indexer-common-utils.outputs.version }}
          revision: ${{ inputs.revision }}
          reference: ${{ needs.branches.outputs.common_utils_plugin_ref }}
      - name: Cache Maven Local
        uses: actions/cache/save@v5
        with:
          path: ~/.m2/repository
          key: ${{ env.M2_CACHE_KEY_COMMON }}

  publish-security-analytics:
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    timeout-minutes: 60
    needs:
      [
        compatibility-check,
        branches,
        get-versions-wazuh-indexer-security-analytics,
        publish-common-utils,
      ]
    outputs:
      hash: ${{ steps.save-hash.outputs.hash }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: wazuh/wazuh-indexer-security-analytics
          ref: ${{ needs.branches.outputs.security_analytics_plugin_ref }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Restore Maven Local cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.m2/repository
          key: ${{ env.M2_CACHE_KEY_COMMON }}

      - name: Publish security-analytics(+commons) to Maven Local
        uses: wazuh/wazuh-indexer-security-analytics/.github/actions/5_local_maven_publisher@main
        with:
          version: ${{ needs.get-versions-wazuh-indexer-security-analytics.outputs.version }}
          revision: ${{ inputs.revision }}
          reference: ${{ needs.branches.outputs.security_analytics_plugin_ref }}

      - name: Save commit hash
        id: save-hash
        run: echo "hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wazuh-indexer-security-analytics-${{ needs.get-versions-wazuh-indexer-security-analytics.outputs.version }}.${{ inputs.revision }}.zip
          path: build/distributions/wazuh-indexer-security-analytics-${{ needs.get-versions-wazuh-indexer-security-analytics.outputs.version }}.${{ inputs.revision }}.zip
          if-no-files-found: error

      - name: Cache Maven Local
        uses: actions/cache/save@v5
        with:
          path: ~/.m2/repository
          key: ${{ env.M2_CACHE_KEY_FULL }}

  build-wazuh-engine:
    needs: [compatibility-check, branches]
    uses: wazuh/wazuh/.github/workflows/5_builderpackage_engine-standalone.yml@main
    with:
      wazuh-branch: ${{ needs.branches.outputs.wazuh_ref }}
      build-type: "release"
      arch: ${{ inputs.architecture }}

  build-wazuh-plugins:
    needs: [compatibility-check, branches, publish-security-analytics]
    if: ${{ needs.branches.outputs.wazuh_plugins_ref != '' }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        plugins: ["setup", "content-manager"]
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    env:
      plugin_name: wazuh-indexer-${{ matrix.plugins }}
    outputs:
      hash: ${{ steps.save-hash.outputs.hash }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: wazuh/wazuh-indexer-plugins
          ref: ${{ needs.branches.outputs.wazuh_plugins_ref }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Restore Maven Local Cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.m2/repository
          key: ${{ env.M2_CACHE_KEY_FULL }}
          restore-keys: |
            ${{ env.M2_CACHE_KEY_COMMON }}

      - name: Get version
        id: version
        run: echo "version=$(jq .version -r VERSION.json)" >> "$GITHUB_OUTPUT"

      - name: Build with Gradle
        working-directory: ./plugins/${{ matrix.plugins }}
        run: ./gradlew build -Dversion=${{ steps.version.outputs.version }} -Drevision=${{ inputs.revision }}

      - run: ls -lR build/distributions
        working-directory: ./plugins/${{ matrix.plugins }}

      - name: Save commit hash
        id: save-hash
        run: echo "hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.plugin_name }}-${{ steps.version.outputs.version }}.${{ inputs.revision }}.zip
          path: "./plugins/${{ matrix.plugins }}/build/distributions/${{ env.plugin_name }}-${{ steps.version.outputs.version }}.${{ inputs.revision }}.zip"
          if-no-files-found: error

  build-reporting-plugin:
    needs: [compatibility-check, branches, publish-common-utils]
    if: ${{ needs.branches.outputs.reporting_plugin_ref != '' }}
    timeout-minutes: 60
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    outputs:
      hash: ${{ steps.save-hash.outputs.hash }}
    env:
      plugin_name: wazuh-indexer-reports-scheduler
    steps:
      - uses: actions/checkout@v6
        with:
          repository: wazuh/wazuh-indexer-reporting
          ref: ${{ needs.branches.outputs.reporting_plugin_ref }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle # Used for caching
        uses: gradle/actions/setup-gradle@v6

      - name: Restore Maven Local cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.m2/repository
          key: ${{ env.M2_CACHE_KEY_FULL }}
          restore-keys: |
            ${{ env.M2_CACHE_KEY_COMMON }}

      - name: Get version
        id: version
        run: echo "version=$(jq .version -r VERSION.json)" >> "$GITHUB_OUTPUT"

      - name: Build with Gradle
        run: ./gradlew build -Dversion=${{ steps.version.outputs.version }} -Drevision=${{ inputs.revision }}

      - run: ls -lR build/distributions

      - name: Save commit hash
        id: save-hash
        run: echo "hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.plugin_name }}-${{ steps.version.outputs.version }}.${{ inputs.revision }}.zip
          path: build/distributions/${{ env.plugin_name }}-${{ steps.version.outputs.version }}.${{ inputs.revision }}.zip
          if-no-files-found: error

  build-notifications-plugin:
    needs: [compatibility-check, branches, publish-common-utils]
    if: ${{ needs.branches.outputs.notifications_plugin_ref != '' }}
    timeout-minutes: 60
    runs-on:
      group: "wz-linux-amd64"
      labels: "wz-linux-amd64"
    outputs:
      hash: ${{ steps.save-hash.outputs.hash }}
    env:
      plugin_name: wazuh-indexer-notifications
    steps:
      - uses: actions/checkout@v6
        with:
          repository: wazuh/wazuh-indexer-notifications
          ref: ${{ needs.branches.outputs.notifications_plugin_ref }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle # Used for caching
        uses: gradle/actions/setup-gradle@v6

      - name: Restore Maven Local Cache
        uses: actions/cache/restore@v5
        with:
          path: ~/.m2/repository
          key: ${{ env.M2_CACHE_KEY_FULL }}
          restore-keys: |
            ${{ env.M2_CACHE_KEY_COMMON }}

      - name: Get version
        id: version
        run: echo "version=$(jq .version -r VERSION.json)" >> "$GITHUB_OUTPUT"

      - name: Build with Gradle
        working-directory: ./notifications
        run: ./gradlew build -Dversion=${{ steps.version.outputs.version }} -Dbuild.revision=${{ inputs.revision }}

      - run: ls -lR notifications/notifications/build/distributions notifications/core/build/distributions

      - name: Save commit hash
        id: save-hash
        run: echo "hash=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Upload notifications artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.plugin_name }}-${{ steps.version.outputs.version }}.${{ inputs.revision }}.zip
          path: notifications/notifications/build/distributions/${{ env.plugin_name }}-${{ steps.version.outputs.version }}.${{ inputs.revision }}.zip
          if-no-files-found: error

      - name: Upload notifications-core artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.plugin_name }}-core-${{ steps.version.outputs.version }}.${{ inputs.revision }}.zip
          path: notifications/core/build/distributions/${{ env.plugin_name }}-core-${{ steps.version.outputs.version }}.${{ inputs.revision }}.zip
          if-no-files-found: error

  build:
    needs:
      [
        setup,
        build-wazuh-plugins,
        build-reporting-plugin,
        publish-security-analytics,
        build-notifications-plugin,
        build-wazuh-engine,
      ]
    timeout-minutes: 60
    runs-on:
      group: ${{ matrix.architecture == 'arm64' && 'wz-linux-arm64' || 'wz-linux-amd64' }}
      labels: ${{ matrix.architecture == 'arm64' && 'wz-linux-arm64-2' || 'wz-linux-amd64' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    outputs:
      name: ${{ steps.package.outputs.name }}
    steps:
      - uses: actions/checkout@v6

      # Download plugins
      - name: Download plugins
        uses: actions/download-artifact@v8
        with:
          pattern: wazuh-indexer-*.zip
          path: ./artifacts/plugins
          merge-multiple: true

      # Download Wazuh Engine
      - name: Download Wazuh Engine
        uses: actions/download-artifact@v8
        with:
          pattern: wazuh-engine-*-linux-${{ matrix.architecture == 'x64' && 'amd64' || 'arm64' }}
          merge-multiple: true
          path: ./artifacts/engine

      - name: Display structure of downloaded files
        run: ls -lR ./artifacts/

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Provision
        run: |
          sudo bash build-scripts/provision.sh

      - name: Run `baptizer.sh` (min)
        run: |
          name=$(bash build-scripts/baptizer.sh -m \
            -a ${{ matrix.architecture }} \
            -d ${{ matrix.distribution }}  \
            -r ${{ inputs.revision }} \
            -l ${{ needs.build-wazuh-plugins.outputs.hash }} \
            -e ${{ needs.build-reporting-plugin.outputs.hash }} \
            -s ${{ needs.publish-security-analytics.outputs.hash }} \
            -n ${{ needs.build-notifications-plugin.outputs.hash }} \
            ${{ inputs.is_stage && '-x' || '' }} \
          )
          echo "name=$name" >> $GITHUB_OUTPUT
        id: min_package

      - name: Run `baptizer.sh`
        run: |
          name=$(bash build-scripts/baptizer.sh \
            -a ${{ matrix.architecture }} \
            -d ${{ matrix.distribution }}  \
            -r ${{ inputs.revision }} \
            -l ${{ needs.build-wazuh-plugins.outputs.hash }} \
            -e ${{ needs.build-reporting-plugin.outputs.hash }} \
            -s ${{ needs.publish-security-analytics.outputs.hash }} \
            -n ${{ needs.build-notifications-plugin.outputs.hash }} \
            ${{ inputs.is_stage && '-x' || '' }} \
          )
          echo "name=$name" >> $GITHUB_OUTPUT
        id: package

      - name: Run `build.sh`
        run: |
          bash build-scripts/build.sh \
            -a ${{ matrix.architecture }} \
            -d ${{ matrix.distribution }} \
            -n ${{ steps.min_package.outputs.name }}

      # Download snapshots so assemble.sh can install them
      # alongside the content-manager plugin.
      - name: Download snapshots
        if: ${{ vars.CTI_API_URL != '' }}
        run: |
          bash build-scripts/download_snapshots.sh \
            --env "${{ vars.CTI_API_URL }}" \
            --output-dir ${{ github.workspace }}/artifacts/snapshots

      - name: Run `assemble.sh`
        run: |
          bash build-scripts/assemble.sh \
            -a ${{ matrix.architecture }} \
            -d ${{ matrix.distribution }} \
            -r ${{ inputs.revision }} \
            -l ${{ needs.build-wazuh-plugins.outputs.hash }} \
            -e ${{ needs.build-reporting-plugin.outputs.hash }} \
            -s ${{ needs.publish-security-analytics.outputs.hash }} \
            -n ${{ needs.build-notifications-plugin.outputs.hash }} \
            -o ${{ github.workspace }}/artifacts

      - name: Test RPM package installation
        if: ${{ matrix.distribution == 'rpm' }}
        run: |
          docker pull redhat/ubi9:latest
          docker run --rm \
            -v "${{ github.workspace }}/artifacts/dist:/artifacts/dist" \
            redhat/ubi9:latest \
            bash -c "yum localinstall '/artifacts/dist/${{ steps.package.outputs.name }}' -y"

      - name: Test RPM package uninstallation
        if: ${{ matrix.distribution == 'rpm' }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/artifacts/dist:/artifacts/dist" \
            redhat/ubi9:latest \
            bash -c "yum localinstall '/artifacts/dist/${{ steps.package.outputs.name }}' -y && yum remove wazuh-indexer -y"

      - name: Test RPM package update stopping the indexer
        if: ${{ matrix.distribution == 'rpm' && needs.setup.outputs.previous_version >= '5.0' }}
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}/artifacts/dist:/artifacts/dist" \
            -v "${{ github.workspace }}/build-scripts/:/build-scripts/" \
            redhat/ubi9:latest \
            bash -c "bash /build-scripts/indexer_node_install.sh ${{ needs.setup.outputs.previous_version }} && \
                     systemctl stop wazuh-indexer && \
                     yum localinstall '/artifacts/dist/${{ steps.package.outputs.name }}' -y && \
                     if systemctl is-active --quiet wazuh-indexer; then echo 'Indexer running (unexpected)'; exit 1; else echo 'Indexer stopped (expected)'; fi"

      - name: Test RPM package update without stopping the indexer
        if: ${{ matrix.distribution == 'rpm' && needs.setup.outputs.previous_version >= '5.0' }}
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}/artifacts/dist:/artifacts/dist" \
            -v "${{ github.workspace }}/build-scripts/:/build-scripts/" \
            redhat/ubi9:latest \
            bash -c "bash /build-scripts/indexer_node_install.sh ${{ needs.setup.outputs.previous_version }} && \
                     yum localinstall '/artifacts/dist/${{ steps.package.outputs.name }}' -y && \
                     if systemctl is-active --quiet wazuh-indexer; then echo 'Indexer running (expected)'; else echo 'Indexer not running (unexpected)'; exit 1; fi"

      - name: Test DEB package installation
        if: ${{ matrix.distribution == 'deb' }}
        run: |
          sudo dpkg -i "artifacts/dist/${{ steps.package.outputs.name }}"
          sudo apt-get remove --purge wazuh-indexer -y

      - name: Test DEB package update stopping the indexer
        if: ${{ matrix.distribution == 'deb' && needs.setup.outputs.previous_version >= '5.0' }}
        run: |
          sudo bash build-scripts/indexer_node_install.sh ${{ needs.setup.outputs.previous_version }}
          sudo systemctl stop wazuh-indexer
          sudo DEBIAN_FRONTEND=noninteractive dpkg -i --force-confnew "artifacts/dist/${{ steps.package.outputs.name }}"

          sudo apt-get remove --purge wazuh-indexer -y

      - name: Test DEB package update without stopping the indexer
        if: ${{ matrix.distribution == 'deb' && needs.setup.outputs.previous_version >= '5.0' }}
        run: |

          sudo bash build-scripts/indexer_node_install.sh ${{ needs.setup.outputs.previous_version }}
          sudo DEBIAN_FRONTEND=noninteractive dpkg -i --force-confnew "artifacts/dist/${{ steps.package.outputs.name }}"

      - name: Clean up DEB test environment
        if: ${{ always() && matrix.distribution == 'deb' }}
        run: |
          if systemctl list-unit-files | grep -q '^wazuh-indexer\.service'; then
            sudo systemctl stop wazuh-indexer || true
            sudo systemctl disable wazuh-indexer || true
          fi

          sudo DEBIAN_FRONTEND=noninteractive apt-get remove --purge wazuh-indexer -y || true
          sudo DEBIAN_FRONTEND=noninteractive apt-get autoremove -y || true
          sudo rm -f /etc/apt/sources.list.d/wazuh.list
          sudo rm -f /usr/share/keyrings/wazuh.gpg
          sudo apt-get update || true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.name }}
          path: artifacts/dist/${{ steps.package.outputs.name }}
          if-no-files-found: error

      - name: Set up AWS CLI
        if: ${{ inputs.upload }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.CI_INTERNAL_DEVELOPMENT_BUCKET_USER_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.CI_INTERNAL_DEVELOPMENT_BUCKET_USER_SECRET_KEY }}
          aws-region: ${{ secrets.CI_AWS_REGION }}

      - name: Upload package to S3
        if: ${{ inputs.upload }}
        run: |
          src="artifacts/dist/${{ steps.package.outputs.name }}"
          dest="${{ vars.S3_PACKAGES_URI }}"
          aws s3 cp "$src" "$dest"
          s3uri="${dest}${{ steps.package.outputs.name }}"
          echo "::notice::S3 URI: ${s3uri}"

      - name: Upload checksum to S3
        if: ${{ inputs.upload && inputs.checksum }}
        run: |
          src="artifacts/dist/${{ steps.package.outputs.name }}.sha512"
          dest="${{ vars.S3_PACKAGES_URI }}"
          aws s3 cp "$src" "$dest"
          s3uri="${dest}${{ steps.package.outputs.name }}.sha512"
          echo "::notice::S3 sha512 URI: ${s3uri}"
