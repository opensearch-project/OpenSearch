run-name: Build ${{ inputs.distribution }} Wazuh Indexer on ${{ inputs.architecture }} | ${{ inputs.id }}
name: (5.x) Build packages

env:
  CI_DEV_INTERNAL_BUCKET: s3://xdrsiem-ci-dev-internal
  CI_ARTIFACTS_REPO: wazuh-indexer
  CI_ARTIFACTS_WORKFLOW: 5_builderpackage_indexer
  CI_ENGINE_ARTIFACTS_REPO: wazuh
  CI_ENGINE_ARTIFACTS_WORKFLOW: 5_builderpackage_engine-standalone

permissions:
  contents: read
  packages: read
  id-token: write

# This workflow runs when any of the following occur:
# - Run manually
# - Invoked from another workflow

on:
  workflow_dispatch:
    inputs:
      revision:
        description: "Revision number of the package."
        type: string
        default: "0"
        required: false
      upload:
        description: "Enable to upload the packages to the S3 bucket."
        type: boolean
        default: false
      is_stage:
        description: "Enable to use the release naming nomenclature."
        type: boolean
        default: false
      distribution:
        description: "Distribution format of the package [tar, rpm, deb]."
        type: choice
        options:
          - '[ "tar" ]'
          - '[ "deb" ]'
          - '[ "rpm" ]'
          - '[ "tar", "deb" ]'
          - '[ "tar", "rpm" ]'
          - '[ "deb", "rpm" ]'
          - '[ "tar", "deb", "rpm" ]'
        default: '[ "deb", "rpm" ]'
        required: true
      architecture:
        description: "Architecture of the package [x64, arm64]."
        type: choice
        options:
          - '[ "x64" ]'
          - '[ "arm64" ]'
          - '[ "x64", "arm64" ]'
        default: '[ "x64", "arm64" ]'
        required: true
      checksum:
        description: |
          Enable to generate the MD5 checksums of the packages.
          If the upload to the S3 bucket is enabled, these will be uploaded too.
        type: boolean
        default: false
      id:
        description: "ID used to identify the workflow uniquely."
        type: string
        required: false
      plugins_ref:
        description: "Branch, commit or tag for the wazuh-indexer plugins repositories and engine."
        type: string
        default: "main"
        required: false
  workflow_call:
    inputs:
      revision:
        type: string
        default: "0"
        required: false
      upload:
        type: boolean
        default: false
      is_stage:
        type: boolean
        default: false
      distribution:
        type: string
        default: '[ "rpm", "deb" ]'
      architecture:
        type: string
        default: '[ "x64", "arm64"  ]'
      checksum:
        type: boolean
        default: false
      id:
        type: string
        required: false
      plugins_ref:
        type: string
        default: "main"
        required: false
    secrets:
      AWS_INDEXER_ACTIONS_ROLE:
        required: true
        description: "AWS IAM OIDC role for S3 and infrastructure access"

    outputs:
      name:
        description: Name of the package built.
        value: ${{ jobs.build.outputs.name }}

# ==========================
# Bibliography
# ==========================
#
# * Reusable workflows: limitations
#   | https://docs.github.com/en/actions/using-workflows/reusing-workflows#limitations
# * Using matrix in reusable workflows:
#   | https://docs.github.com/en/actions/using-workflows/reusing-workflows#using-a-matrix-strategy-with-a-reusable-workflow
# * Reading input from the called workflow
#   | https://docs.github.com/en/enterprise-cloud@latest/actions/using-workflows/workflow-syntax-for-github-actions#onworkflow_callinputs
# * Ternary operator
#   | https://docs.github.com/en/actions/learn-github-actions/expressions#example

jobs:
  branches:
    timeout-minutes: 5
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      wazuh_plugins_ref: ${{ steps.branches.outputs.wazuh_indexer_plugins_branch }}
      reporting_plugin_ref: ${{ steps.branches.outputs.wazuh_indexer_reporting_branch }}
      security_analytics_plugin_ref: ${{ steps.branches.outputs.wazuh_indexer_security_analytics_branch }}
      notifications_plugin_ref: ${{ steps.branches.outputs.wazuh_indexer_notifications_branch }}
      common_utils_plugin_ref: ${{ steps.branches.outputs.wazuh_indexer_common_utils_branch }}
      alerting_plugin_ref: ${{ steps.branches.outputs.wazuh_indexer_alerting_branch }}
      wazuh_ref: ${{ steps.branches.outputs.wazuh_branch }}
    steps:
      - uses: actions/checkout@v7
      - name: Resolve branches
        id: branches
        uses: ./.github/actions/5_builderpackage_indexer_branch_resolver
        with:
          branch: ${{ inputs.plugins_ref }}

  get-versions-wazuh-indexer:
    timeout-minutes: 5
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      opensearch_version: ${{ steps.version.outputs.opensearch_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          sparse-checkout: |
            VERSION.json
            build-scripts/product_version.sh
            build-scripts/opensearch_version.sh
            buildSrc/version.properties

      - name: Read versions
        id: version
        run: |
          echo "version=$(bash ./build-scripts/product_version.sh)" >> "$GITHUB_OUTPUT"
          echo "opensearch_version=$(bash ./build-scripts/opensearch_version.sh)" >> "$GITHUB_OUTPUT"

  get-versions-wazuh-indexer-plugins:
    needs: [branches]
    timeout-minutes: 5
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      version: ${{ steps.plugins_version.outputs.version }}
      opensearch_version: ${{ steps.plugins_version.outputs.opensearch_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          repository: wazuh/wazuh-indexer-plugins
          ref: ${{ needs.branches.outputs.wazuh_plugins_ref }}
          fetch-depth: 1
          sparse-checkout: |
            VERSION.json
            tools/product_version.sh
            tools/opensearch_version.sh
            plugins/setup/build.gradle

      - name: Read versions
        id: plugins_version
        run: |
          echo "version=$(bash ./tools/product_version.sh)" >> "$GITHUB_OUTPUT"
          echo "opensearch_version=$(bash ./tools/opensearch_version.sh setup)" >> "$GITHUB_OUTPUT"

  get-versions-wazuh-indexer-reporting:
    needs: [branches]
    timeout-minutes: 5
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      version: ${{ steps.reporting_version.outputs.version }}
      opensearch_version: ${{ steps.reporting_version.outputs.opensearch_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          repository: wazuh/wazuh-indexer-reporting
          ref: ${{ needs.branches.outputs.reporting_plugin_ref }}
          fetch-depth: 1
          sparse-checkout: |
            VERSION.json
            tools/product_version.sh
            tools/opensearch_version.sh
            build.gradle

      - name: Read versions
        id: reporting_version
        run: |
          echo "version=$(bash ./tools/product_version.sh)" >> "$GITHUB_OUTPUT"
           echo "opensearch_version=$(bash ./tools/opensearch_version.sh)" >> "$GITHUB_OUTPUT"

  get-versions-wazuh-indexer-security-analytics:
    needs: [branches]
    timeout-minutes: 5
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      version: ${{ steps.security_analytics_version.outputs.version }}
      opensearch_version: ${{ steps.security_analytics_version.outputs.opensearch_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          repository: wazuh/wazuh-indexer-security-analytics
          ref: ${{ needs.branches.outputs.security_analytics_plugin_ref }}
          fetch-depth: 1
          sparse-checkout: |
            VERSION.json
            tools/product_version.sh
            tools/opensearch_version.sh
            build.gradle

      - name: Read versions
        id: security_analytics_version
        run: |
          echo "version=$(bash ./tools/product_version.sh)" >> "$GITHUB_OUTPUT"
          echo "opensearch_version=$(bash ./tools/opensearch_version.sh)" >> "$GITHUB_OUTPUT"

  get-versions-wazuh-indexer-notifications:
    needs: [branches]
    timeout-minutes: 5
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      version: ${{ steps.notifications_version.outputs.version }}
      opensearch_version: ${{ steps.notifications_version.outputs.opensearch_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          repository: wazuh/wazuh-indexer-notifications
          ref: ${{ needs.branches.outputs.notifications_plugin_ref }}
          fetch-depth: 1
          sparse-checkout: |
            VERSION.json
            tools/product_version.sh
            tools/opensearch_version.sh
            build.gradle
            notifications/build.gradle

      - name: Read versions
        id: notifications_version
        run: |
          echo "version=$(bash ./tools/product_version.sh)" >> "$GITHUB_OUTPUT"
           echo "opensearch_version=$(bash ./tools/opensearch_version.sh)" >> "$GITHUB_OUTPUT"

  get-versions-wazuh-indexer-common-utils:
    needs: [branches]
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      version: ${{ steps.common_utils_version.outputs.version }}
      opensearch_version: ${{ steps.common_utils_version.outputs.opensearch_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          repository: wazuh/wazuh-indexer-common-utils
          ref: ${{ needs.branches.outputs.common_utils_plugin_ref }}
          fetch-depth: 1
          sparse-checkout: |
            VERSION.json
            tools/product_version.sh
            tools/opensearch_version.sh
            build.gradle

      - name: Read versions
        id: common_utils_version
        run: |
          echo "version=$(bash ./tools/product_version.sh)" >> "$GITHUB_OUTPUT"
           echo "opensearch_version=$(bash ./tools/opensearch_version.sh)" >> "$GITHUB_OUTPUT"

  get-versions-wazuh-indexer-alerting:
    needs: [ branches ]
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      version: ${{ steps.alerting_version.outputs.version }}
      opensearch_version: ${{ steps.alerting_version.outputs.opensearch_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          repository: wazuh/wazuh-indexer-alerting
          ref: ${{ needs.branches.outputs.alerting_plugin_ref }}
          fetch-depth: 1
          sparse-checkout: |
            VERSION.json
            tools/product_version.sh
            tools/opensearch_version.sh
            build.gradle

      - name: Read versions
        id: alerting_version
        run: |
          echo "version=$(bash ./tools/product_version.sh)" >> "$GITHUB_OUTPUT"
           echo "opensearch_version=$(bash ./tools/opensearch_version.sh)" >> "$GITHUB_OUTPUT"

  compatibility-check:
    timeout-minutes: 5
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    needs:
      [
        get-versions-wazuh-indexer,
        get-versions-wazuh-indexer-plugins,
        get-versions-wazuh-indexer-reporting,
        get-versions-wazuh-indexer-security-analytics,
        get-versions-wazuh-indexer-notifications,
        get-versions-wazuh-indexer-common-utils,
        get-versions-wazuh-indexer-alerting
      ]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1
          sparse-checkout: |
            build-scripts/check_compatibility_versions.sh

      - name: Check version compatibility
        env:
          INDEXER_VERSION: ${{ needs.get-versions-wazuh-indexer.outputs.version }}
          OPENSEARCH_VERSION: ${{ needs.get-versions-wazuh-indexer.outputs.opensearch_version }}
          PLUGIN_VERSIONS: |
            wazuh-indexer-plugins|${{ needs.get-versions-wazuh-indexer-plugins.outputs.version }}|${{ needs.get-versions-wazuh-indexer-plugins.outputs.opensearch_version }}
            wazuh-indexer-reporting|${{ needs.get-versions-wazuh-indexer-reporting.outputs.version }}|${{ needs.get-versions-wazuh-indexer-reporting.outputs.opensearch_version }}
            wazuh-indexer-security-analytics|${{ needs.get-versions-wazuh-indexer-security-analytics.outputs.version }}|${{ needs.get-versions-wazuh-indexer-security-analytics.outputs.opensearch_version }}
            wazuh-indexer-notifications|${{ needs.get-versions-wazuh-indexer-notifications.outputs.version }}|${{ needs.get-versions-wazuh-indexer-notifications.outputs.opensearch_version }}
            wazuh-indexer-common-utils|${{ needs.get-versions-wazuh-indexer-common-utils.outputs.version }}|${{ needs.get-versions-wazuh-indexer-common-utils.outputs.opensearch_version }}
            wazuh-indexer-alerting|${{ needs.get-versions-wazuh-indexer-alerting.outputs.version }}|${{ needs.get-versions-wazuh-indexer-alerting.outputs.opensearch_version }}
        run: |
          bash build-scripts/check_compatibility_versions.sh

  setup:
    name: Set up variables
    timeout-minutes: 5
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-amd-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      previous_version: ${{ steps.previous_release.outputs.previous_version }}
      previous_4x_version: ${{ steps.previous_4x.outputs.previous_4x_version }}
    steps:
      - id: matrix
        run: |
          matrix=$(jq -cn \
              --argjson distribution '${{ inputs.distribution }}' \
              --argjson architecture '${{ inputs.architecture }}' \
              '{distribution: $distribution, architecture: $architecture}'
          )
          echo "matrix=$matrix" >> $GITHUB_OUTPUT
      - uses: actions/checkout@v7
      - id: previous_release
        name: Get latest Wazuh release from GitHub
        run: |
          set -o pipefail
          CURRENT="$(bash build-scripts/product_version.sh)"
          PREVIOUS=$(curl -sfSL --retry 3 --retry-all-errors --retry-delay 5 --connect-timeout 10 --max-time 30 \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/wazuh/wazuh-indexer/releases | jq -r '.[].tag_name' | grep -vE 'alpha|beta|rc' | sed 's/^v//' | grep -E '^4\.[0-9]+\.[0-9]+$' | \
          grep -v "^${CURRENT}$" | sort -V | awk -v current="$CURRENT" '$0 < current' | tail -n1)

          echo "Current version: $CURRENT"
          echo "Latest release detected: $PREVIOUS"
          echo "previous_version=$PREVIOUS" >> $GITHUB_OUTPUT
      - id: previous_4x
        name: Get latest Wazuh 4.x release from GitHub
        run: |
          set -o pipefail
          PREVIOUS_4X=$(curl -sfSL --retry 3 --retry-all-errors --retry-delay 5 --connect-timeout 10 --max-time 30 \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/wazuh/wazuh-indexer/releases | jq -r '.[].tag_name' | grep -vE 'alpha|beta|rc' | sed 's/^v//' | \
            grep -E '^4\.[0-9]+\.[0-9]+$' | sort -V | tail -n1)

          echo "Latest 4.x release detected: $PREVIOUS_4X"
          echo "previous_4x_version=$PREVIOUS_4X" >> $GITHUB_OUTPUT

  build-wazuh-engine:
    needs: [compatibility-check, branches]
    uses: wazuh/wazuh/.github/workflows/5_builderpackage_engine-standalone.yml@main
    with:
      wazuh-branch: ${{ needs.branches.outputs.wazuh_ref }}
      build-type: "release"
      arch: ${{ inputs.architecture }}

  build:
    needs: [setup, branches, build-wazuh-engine]
    timeout-minutes: 90
    runs-on:
      - codebuild-github-actions-codebuild-runner-indexer-${{ matrix.architecture == 'arm64' && 'arm' || 'amd' }}-${{ github.run_id }}-${{ github.run_attempt }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    outputs:
      name: ${{ steps.package.outputs.name }}
    steps:
      - uses: actions/checkout@v7

      # Built by the build-wazuh-engine job
      - name: Download Wazuh Engine
        uses: actions/download-artifact@v8
        with:
          pattern: wazuh-engine-*-linux-${{ matrix.architecture == 'x64' && 'amd64' || 'arm64' }}
          merge-multiple: true
          path: ${{ github.workspace }}/artifacts/engine

      - name: Prepare workspace for container user
        run: |
          mkdir -p artifacts/snapshots artifacts/plugins artifacts/dist
          chown -R 1000:1000 "${{ github.workspace }}"

      # The ARM runner image currently ships without Docker Compose; install the
      # v2 plugin so builder.sh can run `docker compose`. No-op when it's already
      # present (e.g. the amd runner). TODO: remove once baked into the runner.
      - name: Ensure Docker Compose
        run: |
          if docker compose version >/dev/null 2>&1; then
            echo "Docker Compose already available."; exit 0
          fi
          COMPOSE_VERSION=v2.29.7
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -fsSL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-$(uname -m)" \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
          docker compose version

      # The ARM runner is a container whose overlayfs root can't nest overlay
      # mounts, so Docker/BuildKit must use the vfs storage driver; the ARM image
      # also doesn't start the daemon. No-op when a daemon is already running
      # (e.g. the amd runner). TODO: remove once baked into the runner.
      - name: Ensure Docker daemon
        run: |
          if docker info >/dev/null 2>&1; then
            echo "Docker daemon already running."; exit 0
          fi
          echo "Starting Docker daemon with the vfs storage driver..."
          # vfs + the classic image store avoid overlay mounts, which fail
          # (overlay-on-overlay) inside the containerized runner.
          mkdir -p /etc/docker
          echo '{"storage-driver":"vfs","features":{"containerd-snapshotter":false}}' > /etc/docker/daemon.json
          if command -v systemctl >/dev/null 2>&1 && systemctl start docker 2>/dev/null; then :; \
          elif command -v service >/dev/null 2>&1 && service docker start 2>/dev/null; then :; \
          else dockerd >/tmp/dockerd.log 2>&1 & fi
          for _ in $(seq 1 30); do docker info >/dev/null 2>&1 && break; sleep 1; done
          chmod 666 /var/run/docker.sock 2>/dev/null || true
          docker info

      - name: Build package with the Docker builder
        env:
          CTI_API_URL: ${{ vars.CTI_API_URL }}
        run: |
          ENGINE_TARBALL=$(find "${{ github.workspace }}/artifacts/engine" \
            -name 'wazuh-engine-*-linux-*.tar.gz' | head -n1)
          if [ -z "$ENGINE_TARBALL" ]; then
            echo "::error::Wazuh Engine tarball not found in artifacts/engine"
            ls -lR "${{ github.workspace }}/artifacts/engine" || true
            exit 1
          fi
          echo "Using engine tarball: $ENGINE_TARBALL"

          cd build-scripts/builder
          bash ./builder.sh \
            -p "${{ needs.branches.outputs.wazuh_plugins_ref }}" \
            -r "${{ needs.branches.outputs.reporting_plugin_ref }}" \
            -s "${{ needs.branches.outputs.security_analytics_plugin_ref }}" \
            -n "${{ needs.branches.outputs.notifications_plugin_ref }}" \
            -t "${{ needs.branches.outputs.alerting_plugin_ref }}" \
            -c "${{ needs.branches.outputs.common_utils_plugin_ref }}" \
            -e "$ENGINE_TARBALL" \
            -R "${{ inputs.revision }}" \
            -S "${{ inputs.is_stage }}" \
            -d "${{ matrix.distribution }}" \
            -a "${{ matrix.architecture }}"

      - name: Resolve built package name
        id: package
        run: |
          # Exclude min and fail on multiple matches so we never ship the min package.
          mapfile -t pkgs < <(find "${{ github.workspace }}/artifacts/dist" -maxdepth 1 -type f \
            -name 'wazuh-indexer*' \
            ! -name '*.sha512' \
            ! -name 'wazuh-indexer-min-*' \
            ! -name 'wazuh-indexer-min_*' | sort)
          if [ "${#pkgs[@]}" -eq 0 ]; then
            echo "::error::No assembled wazuh-indexer package found in artifacts/dist"
            ls -lR "${{ github.workspace }}/artifacts" || true
            exit 1
          fi
          if [ "${#pkgs[@]}" -gt 1 ]; then
            echo "::error::Multiple candidate packages found in artifacts/dist:"
            printf '  %s\n' "${pkgs[@]}"
            exit 1
          fi
          name=$(basename "${pkgs[0]}")
          echo "Built package: $name"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Test RPM package installation
        if: ${{ matrix.distribution == 'rpm' }}
        run: |
          docker pull redhat/ubi9:latest
          docker run --rm \
            -v "${{ github.workspace }}/artifacts/dist:/artifacts/dist" \
            redhat/ubi9:latest \
            bash -c "yum localinstall '/artifacts/dist/${{ steps.package.outputs.name }}' -y"

      - name: Test RPM package uninstallation
        if: ${{ matrix.distribution == 'rpm' }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/artifacts/dist:/artifacts/dist" \
            redhat/ubi9:latest \
            bash -c "yum localinstall '/artifacts/dist/${{ steps.package.outputs.name }}' -y && yum remove wazuh-indexer -y"

      - name: Test RPM package update stopping the indexer
        if: ${{ matrix.distribution == 'rpm' && needs.setup.outputs.previous_version >= '5.0' }}
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}/artifacts/dist:/artifacts/dist" \
            -v "${{ github.workspace }}/build-scripts/:/build-scripts/" \
            redhat/ubi9:latest \
            bash -c "bash /build-scripts/indexer_node_install.sh ${{ needs.setup.outputs.previous_version }} && \
                     systemctl stop wazuh-indexer && \
                     yum localinstall '/artifacts/dist/${{ steps.package.outputs.name }}' -y && \
                     if systemctl is-active --quiet wazuh-indexer; then echo 'Indexer running (unexpected)'; exit 1; else echo 'Indexer stopped (expected)'; fi"

      - name: Test RPM package update without stopping the indexer
        if: ${{ matrix.distribution == 'rpm' && needs.setup.outputs.previous_version >= '5.0' }}
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}/artifacts/dist:/artifacts/dist" \
            -v "${{ github.workspace }}/build-scripts/:/build-scripts/" \
            redhat/ubi9:latest \
            bash -c "bash /build-scripts/indexer_node_install.sh ${{ needs.setup.outputs.previous_version }} && \
                     yum localinstall '/artifacts/dist/${{ steps.package.outputs.name }}' -y && \
                     if systemctl is-active --quiet wazuh-indexer; then echo 'Indexer running (expected)'; else echo 'Indexer not running (unexpected)'; exit 1; fi"

      - name: Test RPM package refuses upgrade from 4.x
        if: ${{ matrix.distribution == 'rpm' && needs.setup.outputs.previous_4x_version != '' }}
        run: |
          cid=$(docker run -d --rm \
            --privileged \
            --cgroupns=host \
            -v /sys/fs/cgroup:/sys/fs/cgroup:rw \
            -v "${{ github.workspace }}/artifacts/dist:/artifacts/dist" \
            -v "${{ github.workspace }}/build-scripts/:/build-scripts/" \
            redhat/ubi9-init:latest /sbin/init)
          trap 'docker stop "$cid" >/dev/null 2>&1 || true' EXIT

          docker exec "$cid" bash -c '
            set -e
            bash /build-scripts/indexer_node_install.sh ${{ needs.setup.outputs.previous_4x_version }}
            installed_before=$(rpm -q wazuh-indexer)
            echo "Installed before upgrade: $installed_before"

            set +e
            out=$(yum localinstall "/artifacts/dist/${{ steps.package.outputs.name }}" -y 2>&1)
            rc=$?
            set -e
            echo "$out"

            if [ "$rc" -eq 0 ]; then
              echo "ERROR: upgrade unexpectedly succeeded"; exit 1
            fi
            if ! echo "$out" | grep -qF "Upgrade from Wazuh indexer versions prior to 5.x is not supported"; then
              echo "ERROR: expected block banner not found in output"; exit 1
            fi
            if ! echo "$out" | grep -qF "Detected installed version:"; then
              echo "ERROR: expected block banner not found in output"; exit 1
            fi

            installed_after=$(rpm -q wazuh-indexer)
            if [ "$installed_before" != "$installed_after" ]; then
              echo "ERROR: package state changed (before=$installed_before after=$installed_after)"; exit 1
            fi
            echo "OK: 5.x package correctly refused upgrade from $installed_after"
          '

      - name: Test DEB package installation
        if: ${{ matrix.distribution == 'deb' }}
        run: |
          bash build-scripts/run_in_systemd_container.sh "${{ github.workspace }}" '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            dpkg -i "/artifacts/dist/${{ steps.package.outputs.name }}"
            apt-get remove --purge wazuh-indexer -y
          '

      - name: Test DEB package update stopping the indexer
        if: ${{ matrix.distribution == 'deb' && needs.setup.outputs.previous_version >= '5.0' }}
        run: |
          bash build-scripts/run_in_systemd_container.sh "${{ github.workspace }}" '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            bash /build-scripts/indexer_node_install.sh ${{ needs.setup.outputs.previous_version }}
            systemctl stop wazuh-indexer
            dpkg -i --force-confnew "/artifacts/dist/${{ steps.package.outputs.name }}"
          '

      - name: Test DEB package update without stopping the indexer
        if: ${{ matrix.distribution == 'deb' && needs.setup.outputs.previous_version >= '5.0' }}
        run: |
          bash build-scripts/run_in_systemd_container.sh "${{ github.workspace }}" '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            bash /build-scripts/indexer_node_install.sh ${{ needs.setup.outputs.previous_version }}
            dpkg -i --force-confnew "/artifacts/dist/${{ steps.package.outputs.name }}"
          '

      - name: Test DEB package refuses upgrade from 4.x
        if: ${{ matrix.distribution == 'deb' && needs.setup.outputs.previous_4x_version != '' }}
        run: |
          bash build-scripts/run_in_systemd_container.sh "${{ github.workspace }}" '
            set -e
            export DEBIAN_FRONTEND=noninteractive
            bash /build-scripts/indexer_node_install.sh ${{ needs.setup.outputs.previous_4x_version }}
            installed_before=$(dpkg-query -W -f="\${Version}" wazuh-indexer)
            echo "Installed before upgrade: wazuh-indexer=$installed_before"

            set +e
            out=$(dpkg -i --force-confnew "/artifacts/dist/${{ steps.package.outputs.name }}" 2>&1)
            rc=$?
            set -e
            echo "$out"

            if [ "$rc" -eq 0 ]; then
              echo "ERROR: upgrade unexpectedly succeeded"; exit 1
            fi
            if ! echo "$out" | grep -qF "Upgrade from Wazuh indexer versions prior to 5.x is not supported"; then
              echo "ERROR: expected block banner not found in output"; exit 1
            fi
            if ! echo "$out" | grep -qF "Detected installed version:"; then
              echo "ERROR: expected block banner not found in output"; exit 1
            fi

            installed_after=$(dpkg-query -W -f="\${Version}" wazuh-indexer)
            if [ "$installed_before" != "$installed_after" ]; then
              echo "ERROR: package state changed (before=$installed_before after=$installed_after)"; exit 1
            fi
            echo "OK: 5.x package correctly refused upgrade from wazuh-indexer=$installed_after"
          '

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.package.outputs.name }}
          path: artifacts/dist/${{ steps.package.outputs.name }}
          if-no-files-found: error

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_INDEXER_ACTIONS_ROLE }}
          aws-region: "us-east-1"

      - name: Upload package to S3
        if: ${{ inputs.upload }}
        run: |
          src="artifacts/dist/${{ steps.package.outputs.name }}"
          dest="${{ vars.S3_PACKAGES_URI }}"
          aws s3 cp "$src" "$dest"
          s3uri="${dest}${{ steps.package.outputs.name }}"
          echo "::notice::S3 URI: ${s3uri}"

      - name: Upload checksum to S3
        if: ${{ inputs.upload && inputs.checksum }}
        run: |
          src="artifacts/dist/${{ steps.package.outputs.name }}.sha512"
          dest="${{ vars.S3_PACKAGES_URI }}"
          aws s3 cp "$src" "$dest"
          s3uri="${dest}${{ steps.package.outputs.name }}.sha512"
          echo "::notice::S3 sha512 URI: ${s3uri}"

      - name: Upload package artifact to S3
        run: |
          pkg_name="${{ steps.package.outputs.name }}"
          pkg_path="artifacts/dist/${pkg_name}"
          s3_stage_base="${{ env.CI_DEV_INTERNAL_BUCKET }}/${{ env.CI_ARTIFACTS_REPO }}/${{ env.CI_ARTIFACTS_WORKFLOW }}/staging_${{ github.run_id }}/${{ matrix.distribution }}_${{ matrix.architecture }}"

          if [ ! -f "$pkg_path" ]; then
            echo "::error::Package not found at ${pkg_path}"
            exit 1
          fi

          aws s3 cp "$pkg_path" "${s3_stage_base}/${pkg_name}"
          echo "::notice::Staged artifact in S3: ${s3_stage_base}/${pkg_name}"

  bundle-artifacts:
    name: Bundle workflow artifacts
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_INDEXER_ACTIONS_ROLE }}
          aws-region: "us-east-1"

      - name: Create and upload consolidated artifact ZIP
        run: |
          s3_base="${{ env.CI_DEV_INTERNAL_BUCKET }}/${{ env.CI_ARTIFACTS_REPO }}/${{ env.CI_ARTIFACTS_WORKFLOW }}"
          s3_stage_base="${s3_base}/staging_${{ github.run_id }}"
          zip_name="artifacts_${{ github.run_id }}.zip"

          rm -rf artifacts_staging
          mkdir -p artifacts_staging
          aws s3 cp "${s3_stage_base}/" artifacts_staging/ --recursive

          if [ -z "$(find artifacts_staging -type f -print -quit)" ]; then
            echo "::error::No staged artifacts found at ${s3_stage_base}"
            exit 1
          fi

          (cd artifacts_staging && zip -r "../${zip_name}" .)
          aws s3 cp "${zip_name}" "${s3_base}/${zip_name}"
          echo "::notice::Artifact uploaded to S3: ${s3_base}/${zip_name}"
