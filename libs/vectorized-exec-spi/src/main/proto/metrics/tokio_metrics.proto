syntax = "proto3";
package vectorized.metrics;

option java_package = "org.opensearch.vectorized.execution.metrics.proto";
option java_outer_classname = "TokioMetricsProto";

// Snapshot of actionable Tokio runtime metrics collected via Handle::metrics().
// Only metrics that provide actionable operational insight are retained.
// Counter fields are cumulative (monotonically increasing).
// Queue-depth fields are point-in-time gauges.
// Dropped fields are reserved to maintain wire compatibility.
// New metrics get new field numbers (29+) without breaking existing consumers.
message RuntimeMetrics {
  uint64 workers_count = 1;
  reserved 2, 3, 4;       // park_count (idle signal redundant with busy_duration)
  reserved 5, 6, 7;       // noop_count (subset of park, no actionable insight)
  reserved 8, 9, 10, 11;  // steal_count/operations (no user-facing remediation)
  reserved 12, 13, 14;    // local_schedule_count (no task attribution)
  uint64 total_overflow_count = 15;
  reserved 16, 17;        // min/max overflow (total is sufficient)
  uint64 total_polls_count = 18;
  reserved 19, 20;        // min/max polls (total is sufficient)
  uint64 total_busy_duration_ms = 21;
  reserved 22, 23;        // min/max busy_duration (total is sufficient)
  reserved 24, 25, 26;    // local_queue_depth (overflow + global_queue_depth cover this)
  uint64 global_queue_depth = 27;
  uint64 blocking_queue_depth = 28;
}

// Cumulative metrics from a single task monitor (tokio_metrics::TaskMetrics).
// Only actionable duration metrics are retained.
message TaskMonitorMetrics {
  uint64 total_poll_duration_ms = 1;
  uint64 total_scheduled_duration_ms = 2;
  uint64 total_idle_duration_ms = 3;
  reserved 4;  // slow_poll_count (50µs threshold meaningless for CPU-bound work)
  reserved 5;  // long_delay_count (redundant with scheduled_duration_ms)
  reserved 6;  // slow_poll_ratio (derived from dropped slow_poll_count)
}
