/*
 * SPI interfaces and data classes for plugin stats collection.
 * Consumed by sandbox plugins that report backend statistics
 * (e.g. native executor metrics, DataFusion stats).
 */

dependencies {
    api project(':libs:opensearch-core')
    api project(':libs:opensearch-common')
}

tasks.named('forbiddenApisMain').configure {
    replaceSignatureFiles 'jdk-signatures'
}

// ---- Property-based tests (jqwik / JUnit 5 Platform) ----

sourceSets {
    propertyTest {
        java {
            srcDir 'src/propertyTest/java'
        }
        compileClasspath += sourceSets.main.output
        runtimeClasspath += sourceSets.main.output
    }
}

configurations {
    propertyTestImplementation.extendsFrom implementation
    propertyTestRuntimeOnly.extendsFrom runtimeOnly
}

dependencies {
    propertyTestImplementation 'net.jqwik:jqwik:1.9.2'
    propertyTestImplementation 'org.junit.jupiter:junit-jupiter-api:5.11.3'
    propertyTestRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.11.3'
    propertyTestImplementation project(':libs:opensearch-core')
    propertyTestImplementation project(':libs:opensearch-x-content')
}

tasks.register('propertyTest', Test) {
    description = 'Run jqwik property-based tests'
    group = 'verification'
    useJUnitPlatform {
        includeEngines 'jqwik'
    }
    testClassesDirs = sourceSets.propertyTest.output.classesDirs
    classpath = sourceSets.propertyTest.runtimeClasspath
    // Disable the security manager for property tests (jqwik is not compatible)
    systemProperty 'tests.security.manager', 'false'
}
